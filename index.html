        ctx.font = withMixedFont(13);
        ctx.textAlign = 'center';
        ctx.fillText('双方生命值', layout.w / 2, hpUi.y - 8);
        const drawHpBtn = (rect, label, active) => {
          roundRect(rect.x, rect.y, rect.w, rect.h, 8, active ? '#5a48a0' : '#3d3558');
          ctx.strokeStyle = active ? 'rgba(255,230,150,0.5)' : 'rgba(255,255,255,0.2)';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.85)';
          ctx.font = withMixedFont(18, 'bold');
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);
          ctx.textBaseline = 'alphabetic';
        };
        drawHpBtn(hpUi.minus, '−', hp > PVP_HP_MIN);
        drawHpBtn(hpUi.plus, '+', hp < PVP_HP_MAX);
        roundRect(hpUi.value.x, hpUi.value.y, hpUi.value.w, hpUi.value.h, 8, 'rgba(28,22,48,0.9)');
        ctx.strokeStyle = 'rgba(180,140,255,0.35)';
        ctx.stroke();
        ctx.fillStyle = '#ffe9a8';
        ctx.font = withMixedFont(16, 'bold');
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${hp}`, hpUi.value.x + hpUi.value.w / 2, hpUi.value.y + hpUi.value.h / 2);
        ctx.textBaseline = 'alphabetic';
        ctx.font = withMixedFont(10);
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillText(`${PVP_HP_MIN} ~ ${PVP_HP_MAX}`, layout.w / 2, hpUi.y + hpUi.value.h + 14);
      }
      const btn = getPvpShapeConfirmBtn();
      setup.confirmBtn = btn;
      if (btn) {
        roundRect(btn.x, btn.y, btn.w, btn.h, 10, '#e85d4a');
        ctx.fillStyle = '#fff';
        ctx.font = withMixedFont(14, 'bold');
        ctx.fillText('下一步 · 选锦囊', btn.x + btn.w / 2, btn.y + btn.h / 2 + 4);
      }
    } else if (setup.phase === 'buff1') {
      setup.confirmBtn = drawPvpBuffCards(setup.buffChoices1, '玩家一 · 锦囊', setup.picked1);
    } else if (setup.phase === 'buff2') {
      setup.confirmBtn = drawPvpBuffCards(setup.buffChoices2, '玩家二 · 锦囊', setup.picked2);
    }
    const back = { x: cx - 50, y: layout.h - layout.safe.bottom - 52, w: 100, h: 36 };
    setup.backBtn = back;
    roundRect(back.x, back.y, back.w, back.h, 8, '#3d3558');
    ctx.fillStyle = '#fff';
    ctx.font = withMixedFont(13);
    ctx.fillText('返回', back.x + back.w / 2, back.y + back.h / 2 + 4);
  }

  function hitPvpSetup(p) {
    const setup = state.pvpSetup;
    if (!setup) return true;
    const back = setup.backBtn;
    if (back && p.x >= back.x && p.x <= back.x + back.w && p.y >= back.y && p.y <= back.y + back.h) {
      state.showPvpSetup = false;
      state.showModeSelect = true;
      return true;
    }
    if (setup.phase === 'shape') {
      for (const r of getPvpShapeRects()) {
        if (p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h) {
          setup.shape = r.id;
          return true;
        }
      }
      const hpUi = setup.hpControl || getPvpHpControlLayout();
      if (hpUi) {
        const hit = (rect) => p.x >= rect.x && p.x <= rect.x + rect.w && p.y >= rect.y && p.y <= rect.y + rect.h;
        let hp = clamp(setup.playerHp || PVP_PLAYER_HP, PVP_HP_MIN, PVP_HP_MAX);
        if (hit(hpUi.minus) && hp > PVP_HP_MIN) {
          setup.playerHp = Math.max(PVP_HP_MIN, hp - PVP_HP_STEP);
          playSfx('click');
          return true;
        }
        if (hit(hpUi.plus) && hp < PVP_HP_MAX) {
          setup.playerHp = Math.min(PVP_HP_MAX, hp + PVP_HP_STEP);
          playSfx('click');
          return true;
        }
      }
      const btn = setup.confirmBtn;
      if (btn && p.x >= btn.x && p.x <= btn.x + btn.w && p.y >= btn.y && p.y <= btn.y + btn.h) {
        setup.buffChoices1 = pickBuffChoicesN(PVP_BUFF_CHOICE_COUNT, pvpBuffFilter);
        setup.picked1 = [];
        setup.phase = 'buff1';
        playSfx('click');
        return true;
      }
    } else if (setup.phase === 'buff1') {
      const cards = getPvpSetupCardRects(setup.buffChoices1);
      for (const c of cards) {
        if (p.x >= c.x && p.x <= c.x + c.w && p.y >= c.y && p.y <= c.y + c.h) {
          const id = c.buff.id;
          const idx = setup.picked1.indexOf(id);
          if (idx >= 0) setup.picked1.splice(idx, 1);
          else if (setup.picked1.length < PVP_BUFF_PICK_COUNT) setup.picked1.push(id);
          playSfx('click');
          return true;
        }
      }
      const btn = setup.confirmBtn;
      if (btn && setup.picked1.length === PVP_BUFF_PICK_COUNT
        && p.x >= btn.x && p.x <= btn.x + btn.w && p.y >= btn.y && p.y <= btn.y + btn.h) {
        setup.buffChoices2 = pickBuffChoicesN(PVP_BUFF_CHOICE_COUNT, pvpBuffFilter);
        setup.picked2 = [];
        setup.phase = 'buff2';
        playSfx('click');
        return true;
      }
    } else if (setup.phase === 'buff2') {
      const cards = getPvpSetupCardRects(setup.buffChoices2);
      for (const c of cards) {
        if (p.x >= c.x && p.x <= c.x + c.w && p.y >= c.y && p.y <= c.y + c.h) {
          const id = c.buff.id;
          const idx = setup.picked2.indexOf(id);
          if (idx >= 0) setup.picked2.splice(idx, 1);
          else if (setup.picked2.length < PVP_BUFF_PICK_COUNT) setup.picked2.push(id);
          playSfx('click');
          return true;
        }
      }
      const btn = setup.confirmBtn;
      if (btn && setup.picked2.length === PVP_BUFF_PICK_COUNT
        && p.x >= btn.x && p.x <= btn.x + btn.w && p.y >= btn.y && p.y <= btn.y + btn.h) {
        launchPvpGame(setup.shape, [...setup.picked1], [...setup.picked2], setup.playerHp);
        return true;
      }
    }
    return true;
  }

  function drawLevelSelectBtn() {
    const ls = getLevelSelectBtnRect();
    if (!ls) return;
    roundRect(ls.x, ls.y, ls.w, ls.h, 8, 'rgba(70,55,110,0.88)');
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#d8c8ff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('选关', ls.x + ls.w / 2, ls.y + ls.h / 2);
    ctx.textBaseline = 'alphabetic';
  }

  function getDevMenuLayout() {
    if (!layout) return null;
    const pad = layout.pad;
    const pr = layout.padR;
    const cx = layout.w / 2;
    const contentW = layout.w - pad - pr;
    const titleY = layout.safe.top + 46;
    let y = layout.safe.top + 68;
    const rowH = 34;
    const gap = 8;
    const invincible = { x: pad, y, w: contentW, h: rowH };
    y += rowH + gap;
    const pickBtnW = 44;
    const levelLabelW = contentW - pickBtnW * 2 - gap * 2;
    const levelPrev = { x: pad, y, w: pickBtnW, h: rowH };
    const levelLabel = { x: pad + pickBtnW + gap, y, w: levelLabelW, h: rowH };
    const levelNext = { x: pad + pickBtnW + gap + levelLabelW + gap, y, w: pickBtnW, h: rowH };
    y += rowH + gap;
    const thirdW = (contentW - gap * 2) / 3;
    const jump = { x: pad, y, w: thirdW, h: rowH };
    const killBoss = { x: pad + thirdW + gap, y, w: thirdW, h: rowH };
    const nextLevel = { x: pad + (thirdW + gap) * 2, y, w: thirdW, h: rowH };
    y += rowH + gap;
    const clearBuffs = { x: pad, y, w: contentW, h: rowH };
    y += rowH + gap + 6;
    const buffCols = 4;
    const buffGap = 6;
    const buffCellW = (contentW - buffGap * (buffCols - 1)) / buffCols;
    const buffCellH = 46;
    const buffCells = BUFF_POOL.map((buff, i) => {
      const col = i % buffCols;
      const row = Math.floor(i / buffCols);
      return {
        id: buff.id,
        buff,
        x: pad + col * (buffCellW + buffGap),
        y: y + row * (buffCellH + buffGap),
        w: buffCellW,
        h: buffCellH
      };
    });
    const back = { x: cx - 60, y: layout.h - layout.safe.bottom - 46, w: 120, h: 36 };
    return {
      titleY, invincible, levelPrev, levelLabel, levelNext, jump, killBoss, nextLevel,
      clearBuffs, buffCells, back, buffSummaryY: y - 4
    };
  }

  function devAddBuff(buffId) {
    if (!state || state.mode !== 'campaign') return;
    const def = BUFF_POOL.find((b) => b.id === buffId);
    if (!canAddBuff(buffId)) {
      if (layout && def) {
        spawnPopup(layout.w / 2, layout.h * 0.32, `${def.name} 已达上限 ${getBuffMaxStack(buffId)}`, '#ffaa88', 14);
      }
      return;
    }
    state.runBuffs.push(buffId);
    state.mods = computeModsFromBuffs(state.runBuffs);
    applyMaxHpFromMods(state);
    if (buffId === 'shield') state.pendingTurnShield = (state.pendingTurnShield || 0) + 12;
    if (buffId === 'swift') state.action = Math.min(state.maxAction, state.action + 1);
    grantShuffleCards(state);
    if (buffId === 'expand') tryExpandBoard(state, 0.2);
    fx.displayPlayerHp = state.hp;
    saveGame();
    if (layout && def) spawnPopup(layout.w / 2, layout.h * 0.32, `+${def.name}`, '#b8ffd0', 14);
  }

  function devClearBuffs() {
    if (!state || state.mode !== 'campaign') return;
    state.runBuffs = [];
    state.mods = computeModsFromBuffs([]);
    const levelBonus = campaignLevelHpBonus(state.level || 1);
    state.maxHp = PLAYER_MAX_HP + levelBonus;
    state.hp = Math.min(state.hp, state.maxHp);
    state.shuffleCards = 0;
    fx.displayPlayerHp = state.hp;
    saveGame();
    if (layout) spawnPopup(layout.w / 2, layout.h * 0.32, '已清空锦囊', '#ccc', 14);
  }

  function toggleDevInvincible() {
    devInvincible = !devInvincible;
    saveDevSettings();
    if (!layout) return;
    if (devInvincible && state?.mode === 'campaign') {
      state.hp = state.maxHp;
      state.action = state.maxAction;
      fx.displayPlayerHp = state.hp;
    }
  }

  function devJumpToLevel(level) {
    if (!canUseDevMenu()) return;
    const lv = clamp(Math.floor(level), 1, MAX_LEVEL);
    const buffs = state.runBuffs || [];
    state = createGameState(lv, { buffs, skipTutorial: true, tutorialDone: true });
    state.showDevMenu = true;
    resetFx();
    selected = null;
    drag = null;
    inputLocked = false;
    devTargetLevel = lv;
    if (devLevelInput) devLevelInput.value = String(lv);
    if (layout) spawnPopup(layout.w / 2, layout.h * 0.3, `已跳转第 ${lv} 关`, '#ffe9a8', 15);
  }

  function devKillBoss() {
    if (!canUseDevMenu() || state.status !== 'playing' || state.boss.hp <= 0) return;
    state.boss.hp = 0;
    fx.bossHit = 600;
    onLevelVictory();
    state.status = 'win';
    closeDevMenu();
    openStarResult();
    if (layout) spawnPopup(layout.w / 2, layout.h * 0.32, '秒杀 Boss', '#ff8899', 14);
  }

  function hitDevBuffCell(p) {
    const ui = getDevMenuLayout();
    if (!ui) return null;
    for (const cell of ui.buffCells) {
      if (p.x >= cell.x && p.x <= cell.x + cell.w && p.y >= cell.y && p.y <= cell.y + cell.h) {
        return cell;
      }
    }
    return null;
  }

  function hitDevMenuScreen(p) {
    const ui = getDevMenuLayout();
    if (!ui) return true;
    const pad = 8;
    const hit = (r) => p.x >= r.x - pad && p.x <= r.x + r.w + pad && p.y >= r.y - pad && p.y <= r.y + r.h + pad;
    if (hit(ui.back)) {
      closeDevMenu();
      return true;
    }
    if (hit(ui.invincible)) {
      toggleDevInvincible();
      return true;
    }
    if (hit(ui.levelPrev)) {
      devTargetLevel = clamp(devTargetLevel - 1, 1, MAX_LEVEL);
      if (devLevelInput) devLevelInput.value = String(devTargetLevel);
      return true;
    }
    if (hit(ui.levelNext)) {
      devTargetLevel = clamp(devTargetLevel + 1, 1, MAX_LEVEL);
      if (devLevelInput) devLevelInput.value = String(devTargetLevel);
      return true;
    }
    if (hit(ui.levelLabel)) {
      if (devLevelInput) {
        devLevelInput.value = String(devTargetLevel);
        devLevelInput.focus();
        devLevelInput.select();
      }
      return true;
    }
    if (hit(ui.jump)) {
      readDevLevelInput();
      devJumpToLevel(devTargetLevel);
      return true;
    }
    if (hit(ui.killBoss)) {
      devKillBoss();
      return true;
    }
    if (hit(ui.nextLevel) && state.status === 'playing' && state.level < MAX_LEVEL) {
      devJumpToLevel(state.level + 1);
      return true;
    }
    if (hit(ui.clearBuffs)) {
      devClearBuffs();
      return true;
    }
    const devCell = hitDevBuffCell(p);
    if (devCell) {
      startBuffLongPress({ buff: devCell.buff, count: buffStackCount(devCell.id) });
      return true;
    }
    return true;
  }

  function drawDevMenu() {
    const ui = getDevMenuLayout();
    if (!ui) return;
    ctx.fillStyle = 'rgba(10,8,18,0.96)';
    ctx.fillRect(0, 0, layout.w, layout.h);
    const cx = layout.w / 2;
    ctx.fillStyle = '#fff';
    ctx.font = withMixedFont(20, 'bold');
    ctx.textAlign = 'center';
    ctx.fillText('开发者模式', cx, ui.titleY);
    ctx.font = withMixedFont(11);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('连续点击玩家人物 5 次进入 · 输入关卡号或 ◀▶ 后确认跳转', cx, ui.titleY + 20);

    const drawRowBtn = (r, label, bg, fg = '#fff') => {
      roundRect(r.x, r.y, r.w, r.h, 8, bg);
      ctx.fillStyle = fg;
      ctx.font = withMixedFont(12, 'bold');
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2);
      ctx.textBaseline = 'alphabetic';
    };

    drawRowBtn(ui.invincible, devInvincible ? '无敌：开' : '无敌：关', devInvincible ? '#2d6a42' : '#3d3558');
    drawRowBtn(ui.levelPrev, '◀', '#4a3d78');
    roundRect(ui.levelLabel.x, ui.levelLabel.y, ui.levelLabel.w, ui.levelLabel.h, 8, '#2a2838');
    ctx.strokeStyle = 'rgba(255,200,100,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(ui.levelLabel.x + 0.5, ui.levelLabel.y + 0.5, ui.levelLabel.w - 1, ui.levelLabel.h - 1);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = withMixedFont(10);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('点击输入关卡', ui.levelLabel.x + ui.levelLabel.w / 2, ui.levelLabel.y + ui.levelLabel.h / 2);
    ctx.textBaseline = 'alphabetic';
    syncDevLevelInput();
    drawRowBtn(ui.levelNext, '▶', '#4a3d78');
    const canKill = state.status === 'playing' && state.boss.hp > 0;
    const canNext = state.status === 'playing' && state.level < MAX_LEVEL;
    drawRowBtn(ui.jump, '确认跳转', '#5a4a88');
    drawRowBtn(ui.killBoss, '秒杀Boss', canKill ? '#7a3040' : '#2a2838', canKill ? '#fff' : 'rgba(255,255,255,0.35)');
    drawRowBtn(ui.nextLevel, '下一关', canNext ? '#3d4a68' : '#2a2838', canNext ? '#fff' : 'rgba(255,255,255,0.35)');
    drawRowBtn(ui.clearBuffs, '清空锦囊', '#4a3058');

    const summary = getBuffSummaryLines(state).join(' · ');
    if (summary) {
      ctx.font = withMixedFont(10);
      ctx.fillStyle = '#ffe9a8';
      ctx.textAlign = 'center';
      ctx.fillText(`当前：${summary}`, cx, ui.buffSummaryY);
    }

    ui.buffCells.forEach(({ x, y, w, h, buff }) => {
      const n = buffStackCount(buff.id);
      const maxN = getBuffMaxStack(buff.id);
      const atMax = n >= maxN;
      roundRect(x, y, w, h, 8, atMax ? '#2a2838' : (n > 0 ? '#4a3d78' : '#2a2838'));
      ctx.strokeStyle = atMax ? 'rgba(255,120,100,0.35)' : (n > 0 ? 'rgba(255,230,150,0.45)' : 'rgba(255,255,255,0.12)');
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
      ctx.textAlign = 'center';
      ctx.font = withEmojiFont(16);
      ctx.fillStyle = atMax ? 'rgba(255,255,255,0.35)' : '#fff';
      ctx.fillText(buff.emoji, x + w / 2, y + 18);
      ctx.font = withMixedFont(9, 'bold');
      ctx.fillStyle = atMax ? 'rgba(255,255,255,0.4)' : '#fff';
      ctx.fillText(buff.name, x + w / 2, y + h - 8);
      if (n > 0 || atMax) {
        ctx.fillStyle = atMax ? '#888' : '#ff5544';
        ctx.beginPath();
        ctx.arc(x + w - 6, y + 6, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px sans-serif';
        ctx.fillText(atMax ? '满' : String(n), x + w - 6, y + 9);
      }
    });

    drawRowBtn(ui.back, '返回游戏', '#3d3558');
  }

  function tutorialBack() {
    if (state.tutorialPage > 0) state.tutorialPage -= 1;
  }

  function tutorialAdvance() {
    if (state.tutorialPage >= TUTORIAL_PAGES.length - 1) {
      state.showTutorial = false;
      markTutorialSeen();
      saveGame();
    } else {
      state.tutorialPage += 1;
    }
  }

  function handlePrimaryAction() {
    if (inputLocked) return;
    if (state.showStarResult) {
      dismissStarResult();
      return;
    }
    if (state.buffPicker) return;
    if (isPvp()) {
      if (state.status === 'win' || state.status === 'lose') {
        startNewGame();
      }
      return;
    }
    if (state.status === 'win' && !state.canAdvance) return;
    if (state.status === 'playing') return;
    let next = state.level;
    const buffs = state.runBuffs || [];
    const prevStars = state.status === 'win' ? (state.winStars || 0) : 0;
    if (state.status === 'win' && state.level < MAX_LEVEL) next = state.level + 1;
    else if (state.status === 'lose') next = state.level;
    else if (state.status === 'win') {
      clearSave();
      state = createGameState(1, { buffs: [], skipTutorial: true, tutorialDone: true });
      resetFx();
      selected = null;
      drag = null;
      return;
    }
    state = createGameState(next, {
      buffs,
      ...getBuffShieldCarryover(),
      applyPendingShield: true,
      skipTutorial: true,
      tutorialDone: true,
      prevStarBonus: prevStars
    });
    resetFx();
    selected = null;
    drag = null;
  }

  function hitBuffCard(p, pad = BUFF_CARD_PAD) {
    const cards = getBuffCardRects();
    for (let i = 0; i < cards.length; i++) {
      const c = cards[i];
      if (p.x >= c.x - pad && p.x <= c.x + c.w + pad && p.y >= c.y - pad && p.y <= c.y + c.h + pad) return i;
    }
    return -1;
  }

  function onBuffCardPointerDown(p) {
    buffCardPress = null;
    const idx = hitBuffCard(p, BUFF_CARD_PAD);
    if (idx < 0) return;
    buffCardPress = { idx, x: p.x, y: p.y, t: Date.now() };
    const buff = state.buffPicker.choices[idx];
    startBuffLongPress({ buff, count: buffStackCount(buff.id) });
  }

  function tryConfirmBuffCardPick(p) {
    if (!state?.buffPicker || !buffCardPress || buffLongPressFired) {
      buffCardPress = null;
      return false;
    }
    const press = buffCardPress;
    buffCardPress = null;
    const elapsed = Date.now() - press.t;
    const dx = p.x - press.x;
    const dy = p.y - press.y;
    if (dx * dx + dy * dy > BUFF_CARD_PAD * BUFF_CARD_PAD * 4) return false;
    if (elapsed < BUFF_PICK_MIN_MS) return false;
    if (elapsed >= BUFF_LONG_PRESS_MS - 50) return false;
    const upIdx = hitBuffCard(p, BUFF_CARD_PAD);
    if (upIdx >= 0 && upIdx !== press.idx) return false;
    applyChosenBuff(state.buffPicker.choices[press.idx].id);
    return true;
  }

  function resetFx() {
    const patch = {
      swap: null, clearing: [], falls: [], beams: [], popups: [], projectiles: [], particles: [],
      bossShake: 0, playerShake: 0, bossHit: 0, playerHit: 0, bossCast: 0,
      bossHpFlash: 0, playerHpFlash: 0
    };
    if (isPvp()) {
      patch.displayPvpHp = state.pvp.players.map((p) => p.hp);
      patch.displayBossHp = state.pvp.players[1].hp;
      patch.displayPlayerHp = state.pvp.players[0].hp;
    } else if (state?.boss) {
      patch.displayBossHp = state.boss.hp;
      patch.displayPlayerHp = state.hp ?? PLAYER_MAX_HP;
    }
    Object.assign(fx, patch);
  }

  /** 菜单/按钮类点击须在 syncViewport 之前处理，否则坐标与热区会错位 */
  function handleMenuPointer(p) {
    if (buffDetail) {
      if (hitBuffDetailDismiss(p)) buffDetail = null;
      return true;
    }
    unlockAudio();
    if (hitAudioPanel(p)) return true;
    if (state?.showModeSelect) {
      unlockAudio();
      if (hitAudioPanel(p)) return true;
      const mode = hitModeSelect(p);
      if (mode === 'campaign') { playSfx('click'); startCampaignGame(); }
      else if (mode === 'levels') { playSfx('click'); openLevelSelect(); }
      else if (mode === 'pvp') { playSfx('click'); startPvpGame(); }
      return true;
    }
    if (state?.showLevelSelect) {
      return hitLevelSelectPointerDown(p);
    }
    if (state?.showStarResult) {
      if (hitStarResultContinue(p)) dismissStarResult();
      return true;
    }
    if (state?.showDevMenu) {
      return hitDevMenuScreen(p);
    }
    if (state?.showPvpSetup) {
      return hitPvpSetup(p);
    }
    if (state.buffPicker) {
      if (hitBuffPickerExit(p)) {
        exitGameSaveAndQuit();
        return true;
      }
      onBuffCardPointerDown(p);
      return true;
    }
    if (!state.showTutorial && hitGameMenu(p)) {
      return true;
    }
    if (hitLevelSelectBtn(p)) {
      openLevelSelect();
      return true;
    }
    if (state?.status === 'playing' && !state.showTutorial && hitShuffleCardBtn(p)) {
      const ok = useShuffleCard();
      if (ok) playSfx('click');
      else if (inputLocked && layout) {
        spawnPopup(layout.boardX + layout.boardSize / 2, layout.boardY + 18, '动画中，请稍候', '#ccc', 13);
      }
      return true;
    }
    if (expandedBuffSide) {
      if (hitExpandedBuffPanel(p)) return false;
      if (!hitHeroPortrait('ally', p) && !hitHeroPortrait('foe', p)) closeExpandedBuffPanel();
    }
    if (state?.status === 'playing' && !state.showTutorial) {
      if (isPvp()) {
        if (hitHeroPortrait('foe', p)) {
          toggleBuffPanel('foe');
          return true;
        }
        if (hitHeroPortrait('ally', p)) {
          toggleBuffPanel('ally');
          return true;
        }
      } else if (hitHeroPortrait('ally', p)) {
        toggleBuffPanel('ally');
        return true;
      }
    }
    if (canRegisterDevGesture() && hitBossArena(p)) {
      registerDevGestureTap();
      return true;
    }
    if (state.showTutorial) {
      if (hitTutorialPrev(p)) {
        tutorialBack();
        return true;
      }
      if (hitTutorialNext(p)) {
        tutorialAdvance();
        return true;
      }
      return true;
    }
    if (hitButton(p, 20)) {
      handlePrimaryAction();
      return true;
    }
    return false;
  }

  function onPointerDown(e) {
    if (e.cancelable) e.preventDefault();
    syncViewportNow();
    unlockAudio();
    clearBuffLongPress();
    buffLongPressFired = false;
    buffCardPress = null;
    if (!state?.showLevelSelect) levelSelectPress = null;
    const p = pointFromEvent(e);
    if (buffDetail) {
      if (hitBuffDetailDismiss(p)) buffDetail = null;
      menuHandledOnDown = true;
      return;
    }
    menuHandledOnDown = handleMenuPointer(p);
    if (!menuHandledOnDown) {
      const detailTarget = pickBuffDetailTarget(p);
      if (detailTarget) startBuffLongPress(detailTarget);
    }
    if (menuHandledOnDown) return;
    syncViewportNow();
    if (inputLocked || state.status !== 'playing') return;
    drag = { start: p, cell: cellAt(p.x, p.y) };
    selected = drag.cell;
  }

  function onPointerMove(e) {
    if (!audio.dragVolume) return;
    const p = pointFromEvent(e);
    setAudioVolumeFromX(p.x);
  }

  function onPointerUp(e) {
    if (audio.dragVolume) {
      audio.dragVolume = false;
      if (e.cancelable) e.preventDefault();
      return;
    }
    if (e.cancelable) e.preventDefault();
    clearBuffLongPress();
    if (buffLongPressFired) {
      buffLongPressFired = false;
      menuHandledOnDown = false;
      drag = null;
      selected = null;
      return;
    }
    if (menuHandledOnDown) {
      if (state?.showLevelSelect || state?.buffPicker) syncViewportNow();
      const p = pointFromEvent(e);
      if (!buffLongPressFired) {
        if (state?.buffPicker) {
          if (hitBuffPickerExit(p)) exitGameSaveAndQuit();
          else tryConfirmBuffCardPick(p);
        }
        else if (state?.showLevelSelect) tryConfirmLevelSelect(p);
        else if (state?.showDevMenu) {
          const cell = hitDevBuffCell(p);
          if (cell) devAddBuff(cell.id);
        }
      } else {
        buffCardPress = null;
      }
      menuHandledOnDown = false;
      return;
    }
    const p = pointFromEvent(e);
    if (buffDetail) return;
    if (state?.showDevMenu) return;
    if (!state.showTutorial && hitNewGameBtn(p)) {
      startNewGame();
      return;
    }
    if (hitButton(p, 20)) {
      handlePrimaryAction();
      return;
    }
    if (state.showTutorial) return;
    if (hitButton(p, 20)) return;
    if (!drag?.cell || inputLocked || state.status !== 'playing') {
      drag = null;
      selected = null;
      return;
    }
    const target = resolveSwapTarget(drag.cell, p, drag.start);
    if (target) trySwap(drag.cell, target);
    drag = null;
    selected = null;
  }

  function updateFx(dt) {
    animTime += dt;
    fx.popups = fx.popups.filter((p) => {
      p.life -= dt;
      p.y += p.vy * dt;
      p.scale = clamp(p.scale - dt * 0.0008, 0.8, 1.4);
      return p.life > 0;
    });
    fx.particles = fx.particles.filter((p) => {
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.00015 * dt;
      return p.life > 0;
    });
    fx.beams.forEach((b) => { b.t += dt; });
    fx.beams = fx.beams.filter((b) => b.t < b.dur);
    fx.projectiles.forEach((p) => { p.t += dt; });
    fx.projectiles = fx.projectiles.filter((p) => p.t < p.dur);
    ['bossShake', 'playerShake', 'bossHit', 'playerHit', 'bossCast', 'bossHpFlash', 'playerHpFlash'].forEach((k) => {
      if (fx[k] > 0) fx[k] -= dt;
    });
    if (isPvp() && state.pvp?.players) {
      if (!fx.displayPvpHp) fx.displayPvpHp = state.pvp.players.map((p) => p.hp);
      state.pvp.players.forEach((p, i) => {
        fx.displayPvpHp[i] += (p.hp - fx.displayPvpHp[i]) * Math.min(1, dt * 0.012);
      });
    } else if (state?.boss) {
    if (state.boss.hp <= 0) {
      fx.displayBossHp = 0;
    } else {
      fx.displayBossHp += (state.boss.hp - fx.displayBossHp) * Math.min(1, dt * 0.012);
    }
    fx.displayPlayerHp += (state.hp - fx.displayPlayerHp) * Math.min(1, dt * 0.012);
    }
  }

  function render() {
    if (!layout) return;
    if (state?.showModeSelect) {
      ctx.clearRect(0, 0, layout.w, layout.h);
      fillThemeBg();
      drawModeSelect();
      drawAudioPanel();
      return;
    }
    if (state?.showLevelSelect) {
      ctx.clearRect(0, 0, layout.w, layout.h);
      fillThemeBg();
      drawLevelSelect();
      drawAudioPanel();
      return;
    }
    if (state?.showDevMenu) {
      ctx.clearRect(0, 0, layout.w, layout.h);
      fillThemeBg();
      drawDevMenu();
      drawBuffDetailOverlay();
      return;
    }
    if (state?.showPvpSetup) {
      ctx.clearRect(0, 0, layout.w, layout.h);
      fillThemeBg();
      drawPvpSetup();
      drawAudioPanel();
      return;
    }
    if (!state) return;
    flushBossIntro();
    buffChipHitAreas = [];
    layout.buffDetailPanel = null;
    layout.expandedBuffPanel = null;
    ctx.clearRect(0, 0, layout.w, layout.h);
    drawBg();
    drawTitle();
    drawLevelSelectBtn();
    drawBossArena();
    drawDuelHpBar();
    drawBoard();
    drawPlayerArena();
    drawShuffleCardBtn();
    drawFx();
    if (state.showTutorial) {
      drawTutorial();
    } else if (state.showStarResult) {
      drawStarResultScreen();
    } else if (state.buffPicker) {
      drawResultOverlay();
      drawBuffPicker();
    } else {
      drawButton();
      if (state.status !== 'playing') drawResultOverlay();
    }
    drawBuffDetailOverlay();
    drawExpandedBuffPanels();
    if (!state.showTutorial && !state.buffPicker && !state.showStarResult) {
      drawAudioPanel();
    }
  }

  function drawModeSelect() {
    const cx = layout.w / 2;
    drawGameLogo(cx, layout.safe.top + 72, 88);
    ctx.fillStyle = THEME.text;
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(GAME_NAME, cx, layout.safe.top + 138);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = THEME.textMuted;
    ctx.fillText('选择游戏模式', cx, layout.safe.top + 162);
    const r = getModeSelectRects();
    if (!r) return;
    const maxCleared = getMaxClearedLevel();
    const items = [
      { key: 'campaign', label: '⚔️ 闯关冒险', sub: '100 关 · 10 Boss · 锦囊成长', color: '#7c5cff' }
    ];
    if (maxCleared >= 1) {
      items.push({
        key: 'levels',
        label: '📋 选关重玩',
        sub: `已通关 ${maxCleared} 关 · 任选已解锁关卡挑战`,
        color: '#5c8cff'
      });
    }
    items.push({ key: 'pvp', label: '👥 双人对战', sub: '同盘轮流 · 可设血量 · 五选三锦囊', color: '#e85d4a' });
    items.forEach((item) => {
      const b = r[item.key];
      if (!b) return;
      const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      g.addColorStop(0, item.color);
      g.addColorStop(1, '#2a2238');
      roundRect(b.x, b.y, b.w, b.h, 14, g);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 17px sans-serif';
      ctx.fillText(item.label, b.x + b.w / 2, b.y + b.h / 2 - 2);
      ctx.font = '11px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fillText(item.sub, b.x + b.w / 2, b.y + b.h / 2 + 16);
    });
  }

  function drawBg() {
    fillThemeBg();
    const midX = layout.w / 2;
    const g2 = ctx.createLinearGradient(midX, layout.boss.y, midX, layout.player.y + layout.player.h);
    g2.addColorStop(0, 'rgba(255,120,80,0.08)');
    g2.addColorStop(0.5, 'rgba(255,255,255,0.04)');
    g2.addColorStop(1, 'rgba(80,160,255,0.08)');
    ctx.fillStyle = g2;
    ctx.fillRect(layout.pad, layout.boss.y, layout.w - layout.pad * 2, layout.player.y + layout.player.h - layout.boss.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.setLineDash([6, 8]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(midX, layout.boss.y + layout.boss.h);
    ctx.lineTo(midX, layout.player.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,220,120,0.85)';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isPvp() ? '对战' : 'VS', midX, (layout.boss.y + layout.boss.h + layout.player.y) / 2);
  }

  function drawTitle() {
    const compact = layout.compact;
    const y0 = layout.headerTop + (compact ? 8 : 12);
    const ng = getNewGameBtnRect();
    if (ng && !state.showTutorial && !state.showModeSelect) {
      drawGameMenu();
    }
    ctx.fillStyle = '#fff';
    ctx.font = compact ? 'bold 15px sans-serif' : 'bold 17px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(GAME_NAME, layout.w / 2, y0);
    ctx.font = compact ? '11px sans-serif' : '12px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    if (isPvp()) {
      const active = getPvpPlayer(state.pvp.active);
      ctx.fillText(`双人对战 · ${active?.name || ''} 回合`, layout.w / 2, y0 + (compact ? 15 : 16));
    } else {
      const shapeLabel = BOARD_SHAPE_LABELS[state.levelData?.boardShape || 'full'];
      const levelLine = shapeLabel
        ? `第 ${state.level} / ${MAX_LEVEL} 关 · ${state.boss.name} · ${shapeLabel}`
        : `第 ${state.level} / ${MAX_LEVEL} 关 · ${state.boss.name}`;
      ctx.fillText(levelLine, layout.w / 2, y0 + (compact ? 15 : 16));
      if (hasStoredSave() && !compact) {
        ctx.font = '10px sans-serif';
        ctx.fillStyle = 'rgba(180,255,200,0.75)';
        ctx.fillText('本机已存档 · 关闭浏览器后可续玩', layout.w / 2, y0 + 28);
      }
    }
  }

  function drawHpBar(x, y, w, h, ratio, flash, ally) {
    const col = ally ? THEME.hpAlly : THEME.hpBoss;
    roundRect(x, y, w, h, h / 2, 'rgba(0,0,0,0.45)');
    roundRect(x, y, w * clamp(ratio, 0, 1), h, h / 2, flash > 0 ? '#fff' : col);
    if (flash > 0) {
      ctx.globalAlpha = flash / 500 * 0.4;
      roundRect(x, y, w, h, h / 2, '#fff');
      ctx.globalAlpha = 1;
    }
  }

  function drawDuelHpBar() {
    const d = layout.duel;
    roundRect(d.x, d.y, d.w, d.h, 10, THEME.duelPanel);
    const pad = 10;
    const barH = 10;
    const half = (d.w - pad * 3) / 2;

    if (isPvp()) {
      const p1 = getPvpPlayer(1);
      const p2 = getPvpPlayer(2);
      const hp1 = Math.max(0, Math.round(fx.displayPvpHp?.[0] ?? p1.hp));
      const hp2 = Math.max(0, Math.round(fx.displayPvpHp?.[1] ?? p2.hp));
      ctx.textAlign = 'left';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillStyle = state.pvp.active === 2 ? '#ffaa88' : '#ff9a8a';
      ctx.fillText(p2.name, d.x + pad, d.y + 16);
      ctx.textAlign = 'right';
      ctx.fillStyle = state.pvp.active === 1 ? '#a8ffd0' : '#8ee8b8';
      ctx.fillText(p1.name, d.x + d.w - pad, d.y + 16);
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = '#ffb0a5';
      ctx.textAlign = 'left';
      ctx.fillText(`${hp2} / ${p2.maxHp}`, d.x + pad, d.y + 32);
      ctx.fillStyle = '#b8ffd0';
      ctx.textAlign = 'right';
      ctx.fillText(`${hp1} / ${p1.maxHp}`, d.x + d.w - pad, d.y + 32);
      drawHpBar(d.x + pad, d.y + 36, half, barH, hp2 / p2.maxHp, fx.bossHpFlash, false);
      drawHpBar(d.x + d.w - pad - half, d.y + 36, half, barH, hp1 / p1.maxHp, fx.playerHpFlash, true);
      const sub = [];
      if (p2.shield > 0) sub.push(`🛡${p2.shield}`);
      if (p1.shield > 0) sub.push(`🛡${p1.shield}`);
      if (sub.length) {
        ctx.textAlign = 'center';
        ctx.font = '10px sans-serif';
        ctx.fillStyle = '#ffe9a8';
        ctx.fillText(sub.join('  '), d.x + d.w / 2, d.y + d.h - 6);
      }
      return;
    }

    const bossHp = state.boss.hp <= 0 ? 0 : Math.max(0, Math.round(fx.displayBossHp));
    const playerHp = Math.max(0, Math.round(fx.displayPlayerHp));
    const bossRatio = state.boss.hp <= 0 ? 0 : fx.displayBossHp / state.boss.maxHp;
    const playerRatio = fx.displayPlayerHp / state.maxHp;

    ctx.textAlign = 'left';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#ff9a8a';
    const ph = bossPhase();
    const phLabel = BOSS_PHASE_LABELS[state.boss.kind]?.[ph - 1];
    const bossTitle = phLabel ? `${state.boss.name}『${phLabel}』` : state.boss.name;
    ctx.fillText(bossTitle, d.x + pad, d.y + 16);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#8ee8b8';
    ctx.fillText('勇者', d.x + d.w - pad, d.y + 16);

    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#ffb0a5';
    ctx.textAlign = 'left';
    ctx.fillText(`${bossHp} / ${state.boss.maxHp}`, d.x + pad, d.y + 32);
    ctx.fillStyle = '#b8ffd0';
    ctx.textAlign = 'right';
    ctx.fillText(`${playerHp} / ${state.maxHp}`, d.x + d.w - pad, d.y + 32);

    drawHpBar(d.x + pad, d.y + 36, half, barH, bossRatio, fx.bossHpFlash, false);
    drawHpBar(d.x + d.w - pad - half, d.y + 36, half, barH, playerRatio, fx.playerHpFlash, true);

    if (state.boss.iceBarrier > 0) {
      ctx.textAlign = 'center';
      ctx.font = '10px sans-serif';
      ctx.fillStyle = 'rgba(160,230,255,0.95)';
      ctx.fillText(`冰盾 ×${state.boss.iceBarrier}`, d.x + d.w / 2, d.y + d.h - 6);
    } else if (state.boss.phantomMax > 0 && state.boss.phantomHp > 0) {
      ctx.textAlign = 'center';
      ctx.font = '10px sans-serif';
      ctx.fillStyle = 'rgba(180,140,255,0.9)';
      ctx.fillText(`影分身 ${Math.ceil(state.boss.phantomHp)}`, d.x + d.w / 2, d.y + d.h - 6);
    }
  }

  function drawBossArena() {
    const b = layout.boss;
    const shake = fx.bossShake > 0 ? Math.sin(animTime / 35) * 4 : 0;
    const hit = fx.bossHit > 0 ? Math.sin(animTime / 25) * 0.08 : 0;
    ctx.save();
    ctx.translate(b.x + shake, b.y);
    roundRect(0, 0, b.w, b.h, 14, THEME.arena);
    const scale = clamp(b.h / 88, 0.75, 1.15) * (1 + hit);
    if (isPvp()) {
      if (state.pvp.active === 2) {
        ctx.strokeStyle = `rgba(255,200,120,${0.55 + Math.sin(animTime / 200) * 0.2})`;
        ctx.lineWidth = 3;
        ctx.strokeRect(4, 4, b.w - 8, b.h - 8);
      }
      const p2 = getPvpPlayer(2);
      const heroLocalX = b.w / 2;
      const heroLocalY = b.h * 0.55;
      if (p2?.shield > 0) {
        ctx.fillStyle = '#ffe9a8';
        ctx.font = withMixedFont(12);
        ctx.textAlign = 'center';
        ctx.fillText(`🛡${p2.shield}`, b.w / 2, b.h - 8);
      }
      drawHeroCharacter(heroLocalX, heroLocalY, scale, 'down', 'p2');
      drawBuffHintLabel('foe', heroLocalX, heroLocalY, scale);
      ctx.restore();
      return;
    }
    drawBossCharacter(b.w / 2, b.h * 0.55, scale, 'down');
    if (state.boss.armor > 0) {
      for (let i = 0; i < state.boss.armor; i++) {
        ctx.fillStyle = '#c8b08a';
        roundRect(b.w / 2 - 28 + i * 14, 8, 10, 10, 3, '#c8b08a');
      }
    }
    ctx.restore();
  }

  function drawShuffleCardBtn() {
    if (isPvp()) return;
    const n = state.shuffleCards || 0;
    if (!layout?.shuffleCardBtn || n <= 0) return;
    if (state.status !== 'playing' || state.showTutorial || state.buffPicker) return;
    const b = layout.shuffleCardBtn;
    const pulse = 0.92 + Math.sin(animTime / 350) * 0.08;
    ctx.save();
    ctx.shadowColor = 'rgba(124, 92, 255, 0.45)';
    ctx.shadowBlur = 8 * pulse;
    const g = ctx.createLinearGradient(b.x, b.y, b.x + b.w, b.y + b.h);
    g.addColorStop(0, '#6b52c4');
    g.addColorStop(1, '#3d2d78');
    roundRect(b.x, b.y, b.w, b.h, 10, g);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = `rgba(255, 230, 150, ${0.85 * pulse})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = withEmojiFont(layout.compact ? 18 : 20);
    ctx.fillText('🍀', b.x + b.w / 2, b.y + b.h * 0.38);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${layout.compact ? 10 : 11}px sans-serif`;
    ctx.fillText('洗牌', b.x + b.w / 2, b.y + b.h * 0.72);
    ctx.fillStyle = '#ff5544';
    ctx.beginPath();
    ctx.arc(b.x + b.w - 5, b.y + 5, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText(String(n), b.x + b.w - 5, b.y + 8);
    ctx.restore();
  }

  function drawPlayerArena() {
    const p = layout.player;
    const shake = fx.playerShake > 0 ? Math.sin(animTime / 40) * 4 : 0;
    const hit = fx.playerHit > 0 ? Math.sin(animTime / 30) * 0.07 : 0;
    const worldX = p.x + shake;
    ctx.save();
    ctx.translate(worldX, p.y);
    roundRect(0, 0, p.w, p.h, 14, THEME.arena);
    const scale = clamp(p.h / 80, 0.75, 1.1) * (1 + hit);
    const card = layout.shuffleCardBtn;
    const heroLocalX = (state.shuffleCards > 0 && card && !isPvp())
      ? card.w + 8 + (p.w - card.w - 16) / 2
      : p.w / 2;
    if (isPvp() && state.pvp.active === 1) {
      ctx.strokeStyle = `rgba(120,255,200,${0.55 + Math.sin(animTime / 200) * 0.2})`;
      ctx.lineWidth = 3;
      ctx.strokeRect(4, 4, p.w - 8, p.h - 8);
    }
    const heroLocalY = p.h * 0.52;
    drawHeroCharacter(heroLocalX, heroLocalY, scale, 'up', 'p1');
    ctx.textAlign = 'center';
    if (!isPvp()) {
      ctx.fillStyle = '#b8f0ff';
      ctx.font = withMixedFont(12);
      ctx.fillText(`⚡${state.action}`, p.w / 2 - 36, p.h - 8);
      ctx.fillStyle = '#ffe9a8';
      ctx.fillText(`🛡${state.shield}`, p.w / 2 + 36, p.h - 8);
      drawBuffHintLabel('ally', heroLocalX, heroLocalY, scale);
    } else {
      const p1 = getPvpPlayer(1);
      if (p1.shield > 0) {
        ctx.fillStyle = '#ffe9a8';
        ctx.font = withMixedFont(12);
        ctx.fillText(`🛡${p1.shield}`, p.w / 2, p.h - 8);
      }
      drawBuffHintLabel('ally', heroLocalX, heroLocalY, scale);
    }
    ctx.restore();
  }

  function drawBossCharacter(cx, cy, scale, facing) {
    const bob = Math.sin(animTime / 580) * 2;
    const atk = fx.bossCast > 0 ? Math.sin(animTime / 45) * 0.05 : 0;
    ctx.save();
    ctx.translate(cx, cy + bob);
    ctx.scale(scale + atk, scale + atk);
    if (facing === 'down') ctx.scale(1, -1);
    if (fx.bossCast > 0) {
      ctx.strokeStyle = `rgba(255, 200, 100, ${fx.bossCast / 500})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, 48, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (state.boss.frozenTurns > 0) {
      ctx.fillStyle = 'rgba(180,230,255,0.35)';
      ctx.beginPath();
      ctx.arc(0, 0, 44, 0, Math.PI * 2);
      ctx.fill();
    }
    if (state.boss.kind === 'golem') drawGolemSprite();
    else if (state.boss.kind === 'assassin') drawAssassinSprite();
    else if (state.boss.kind === 'queen') drawQueenSprite();
    else if (state.boss.kind === 'lich') drawLichSprite();
    else if (state.boss.kind === 'mech') drawMechSprite();
    else if (state.boss.kind === 'voidlord') drawVoidlordSprite();
    else if (state.boss.kind === 'plague') drawPlagueSprite();
    else if (state.boss.kind === 'storm') drawStormSprite();
    else if (state.boss.kind === 'phoenix') drawPhoenixSprite();
    else if (state.boss.kind === 'abyss') drawAbyssSprite();
    else drawVoidlordSprite();
    ctx.restore();
  }

  function drawSpriteShadow(w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.ellipse(0, h, w, h * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSpriteEyes(x1, x2, y, glow, pupil) {
    ctx.fillStyle = glow;
    ctx.shadowColor = glow;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(x1, y, 5.5, 0, Math.PI * 2);
    ctx.arc(x2, y, 5.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = pupil;
    ctx.beginPath();
    ctx.arc(x1 + 1, y, 2.2, 0, Math.PI * 2);
    ctx.arc(x2 + 1, y, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(x1 - 1.5, y - 1.5, 1.2, 0, Math.PI * 2);
    ctx.arc(x2 - 1.5, y - 1.5, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHeroCharacter(cx, cy, scale, facing, variant = 'p1') {
    const bob = Math.sin(animTime / 480) * 2.5;
    const isP2 = variant === 'p2';
    const armorTop = isP2 ? '#ff7a58' : '#5b8cff';
    const armorBot = isP2 ? '#b83220' : '#2a4db8';
    const capeCol = isP2 ? '#8b2848' : '#c43a5a';
    const skin = '#ffd8a8';
    const hair = isP2 ? '#3a2018' : '#5a3820';
    ctx.save();
    ctx.translate(cx, cy + bob);
    ctx.scale(scale, scale);
    if (facing === 'up') ctx.scale(1, -1);
    drawSpriteShadow(26, 28);
    const capeWave = Math.sin(animTime / 400) * 5;
    const capeG = ctx.createLinearGradient(-20, 0, 20, 36);
    capeG.addColorStop(0, capeCol);
    capeG.addColorStop(1, '#4a1020');
    ctx.fillStyle = capeG;
    ctx.beginPath();
    ctx.moveTo(-10, 2);
    ctx.quadraticCurveTo(-26 + capeWave, 16, -18, 34);
    ctx.lineTo(18, 34);
    ctx.quadraticCurveTo(26 - capeWave, 16, 10, 2);
    ctx.closePath();
    ctx.fill();
    const bodyG = ctx.createLinearGradient(-18, 0, 18, 28);
    bodyG.addColorStop(0, armorTop);
    bodyG.addColorStop(0.55, isP2 ? '#e85030' : '#4a78e8');
    bodyG.addColorStop(1, armorBot);
    ctx.fillStyle = bodyG;
    roundRect(-18, 0, 36, 28, 8, bodyG);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-14, 4, 28, 18);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-12, 6, 10, 12);
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(0, -16, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = hair;
    ctx.beginPath();
    ctx.arc(0, -20, 15, Math.PI, 0);
    ctx.fill();
    if (isP2) {
      ctx.fillStyle = '#ff6040';
      ctx.beginPath();
      ctx.moveTo(-14, -24);
      ctx.lineTo(0, -36);
      ctx.lineTo(14, -24);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = '#e8c070';
      ctx.beginPath();
      ctx.moveTo(-13, -24);
      ctx.lineTo(0, -34);
      ctx.lineTo(13, -24);
      ctx.closePath();
      ctx.fill();
    }
    drawSpriteEyes(-5, 5, -15, isP2 ? '#ffb0a0' : '#8ed0ff', '#1a2848');
    ctx.fillStyle = 'rgba(255,180,160,0.35)';
    ctx.beginPath();
    ctx.arc(-9, -10, 3, 0, Math.PI * 2);
    ctx.arc(9, -10, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = armorTop;
    ctx.fillRect(-24, 6, 10, 20);
    ctx.fillRect(14, 6, 10, 20);
    ctx.strokeStyle = '#e8f4ff';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(16, -2);
    ctx.lineTo(32, -20);
    ctx.stroke();
    ctx.fillStyle = '#d8ecff';
    ctx.fillRect(28, -28, 7, 20);
    ctx.fillStyle = isP2 ? '#ffaa44' : '#88bbff';
    ctx.beginPath();
    ctx.arc(31, -30, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawQueenSprite() {
    const aura = ctx.createRadialGradient(0, -8, 4, 0, 0, 50);
    aura.addColorStop(0, 'rgba(255,120,60,0.35)');
    aura.addColorStop(1, 'rgba(255,60,20,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(0, 0, 50, 0, Math.PI * 2);
    ctx.fill();
    drawSpriteShadow(26, 32);
    const dress = ctx.createLinearGradient(0, -24, 0, 34);
    dress.addColorStop(0, '#ff6848');
    dress.addColorStop(0.6, '#c82838');
    dress.addColorStop(1, '#6a1028');
    ctx.fillStyle = dress;
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.bezierCurveTo(-30, 0, -28, 34, -24, 34);
    ctx.lineTo(24, 34);
    ctx.bezierCurveTo(28, 34, 30, 0, 0, -30);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffd080';
    ctx.beginPath();
    ctx.arc(0, -20, 15, 0, Math.PI * 2);
    ctx.fill();
    for (let i = -2; i <= 2; i++) {
      const fh = 12 + Math.sin(animTime / 200 + i) * 4;
      const cg = ctx.createLinearGradient(i * 8, -34 - fh, i * 8, -30);
      cg.addColorStop(0, '#fff0a0');
      cg.addColorStop(1, '#ff8844');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.moveTo(i * 8 - 5, -32);
      ctx.lineTo(i * 8, -32 - fh);
      ctx.lineTo(i * 8 + 5, -32);
      ctx.fill();
    }
    drawSpriteEyes(-4, 5, -20, '#ff5533', '#2a1020');
    const orb = ctx.createRadialGradient(20, 6, 2, 20, 6, 14);
    orb.addColorStop(0, '#fff8c0');
    orb.addColorStop(0.4, '#ffaa44');
    orb.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = orb;
    ctx.beginPath();
    ctx.arc(20, 6, 14, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawPhoenixSprite() {
    drawSpriteShadow(34, 34);
    const wingL = Math.sin(animTime / 280) * 8;
    const wingG = ctx.createLinearGradient(-40, -20, 0, 10);
    wingG.addColorStop(0, '#ff8844');
    wingG.addColorStop(1, '#cc4020');
    ctx.fillStyle = wingG;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.quadraticCurveTo(-42 + wingL, -28, -36, 8);
    ctx.lineTo(-10, 12);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = wingG;
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.quadraticCurveTo(42 - wingL, -28, 36, 8);
    ctx.lineTo(10, 12);
    ctx.closePath();
    ctx.fill();
    const bodyG = ctx.createLinearGradient(0, -20, 0, 30);
    bodyG.addColorStop(0, '#ffcc66');
    bodyG.addColorStop(0.5, '#ff8844');
    bodyG.addColorStop(1, '#cc5020');
    ctx.fillStyle = bodyG;
    ctx.beginPath();
    ctx.ellipse(0, 4, 18, 24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffeeaa';
    ctx.beginPath();
    ctx.arc(0, -14, 14, 0, Math.PI * 2);
    ctx.fill();
    drawSpriteEyes(-4, 4, -13, '#ff6622', '#401008');
    ctx.fillStyle = '#ff5020';
    ctx.shadowColor = '#ff6020';
    ctx.shadowBlur = 10 + Math.sin(animTime / 200) * 4;
    ctx.beginPath();
    ctx.moveTo(0, 20);
    ctx.quadraticCurveTo(8, 36, 0, 40);
    ctx.quadraticCurveTo(-8, 36, 0, 20);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawAbyssSprite() {
    const abyssG = ctx.createRadialGradient(0, 0, 6, 0, 0, 54);
    abyssG.addColorStop(0, 'rgba(80,40,160,0.5)');
    abyssG.addColorStop(0.5, 'rgba(20,8,48,0.9)');
    abyssG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = abyssG;
    ctx.beginPath();
    ctx.arc(0, 0, 54, 0, Math.PI * 2);
    ctx.fill();
    drawSpriteShadow(30, 36);
    const cloak = ctx.createLinearGradient(0, -36, 0, 36);
    cloak.addColorStop(0, '#4a3878');
    cloak.addColorStop(0.5, '#281848');
    cloak.addColorStop(1, '#080410');
    ctx.fillStyle = cloak;
    ctx.beginPath();
    ctx.moveTo(0, -40);
    ctx.bezierCurveTo(38, -14, 36, 30, 0, 38);
    ctx.bezierCurveTo(-36, 30, -38, -14, 0, -40);
    ctx.fill();
    ctx.fillStyle = '#1a1030';
    ctx.beginPath();
    ctx.arc(0, -10, 18, 0, Math.PI * 2);
    ctx.fill();
    drawSpriteEyes(-6, 6, -10, '#cc88ff', '#0a0018');
    ctx.strokeStyle = `rgba(120,80,220,${0.5 + Math.sin(animTime / 400) * 0.3})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const a = animTime / 600 + i * 2.1;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 26, Math.sin(a) * 18, 8, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawBoard() {
    const bx = layout.boardX;
    const by = layout.boardY;
    const bs = layout.boardSize;
    const bg = ctx.createLinearGradient(bx, by, bx + bs, by + bs);
    bg.addColorStop(0, THEME.boardInner);
    bg.addColorStop(1, THEME.boardOuter);
    roundRect(bx - 3, by - 3, bs + 6, bs + 6, 16, 'rgba(0,0,0,0.35)');
    roundRect(bx, by, bs, bs, 14, bg);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx + 14, by);
    ctx.lineTo(bx + bs - 14, by);
    ctx.quadraticCurveTo(bx + bs, by, bx + bs, by + 14);
    ctx.lineTo(bx + bs, by + bs - 14);
    ctx.quadraticCurveTo(bx + bs, by + bs, bx + bs - 14, by + bs);
    ctx.lineTo(bx + 14, by + bs);
    ctx.quadraticCurveTo(bx, by + bs, bx, by + bs - 14);
    ctx.lineTo(bx, by + 14);
    ctx.quadraticCurveTo(bx, by, bx + 14, by);
    ctx.closePath();
    ctx.stroke();
    const hidden = new Set();
    fx.clearing.forEach((it) => hidden.add(`${it.row}_${it.col}`));

    if (fx.swap) {
      const t = easeOutCubic(Math.min(1, fx.swap.t / fx.swap.dur));
      const a = cellCenter(fx.swap.from.row, fx.swap.from.col);
      const b = cellCenter(fx.swap.to.row, fx.swap.to.col);
      const ta = state.board[fx.swap.from.row][fx.swap.from.col];
      const tb = state.board[fx.swap.to.row][fx.swap.to.col];
      drawTile(ta, a.x + (b.x - a.x) * t, a.y + (b.y - a.y) * t, true);
      drawTile(tb, b.x + (a.x - b.x) * t, b.y + (a.y - b.y) * t, true);
      hidden.add(`${fx.swap.from.row}_${fx.swap.from.col}`);
      hidden.add(`${fx.swap.to.row}_${fx.swap.to.col}`);
    }

    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (hidden.has(`${r}_${c}`)) continue;
        const fall = fx.falls.find((f) => f.row === r && f.col === c);
        let oy = 0;
        if (fall) {
          const p = easeOutCubic(Math.min(1, fall.t / fall.dur));
          oy = -fall.distance * (layout.cellSize + layout.cellGap) * (1 - p);
          if (fall.isNew) oy -= (1 - easeOutBack(p)) * (layout.cellSize + layout.cellGap) * 0.25;
        }
        drawCell(state.board[r][c], r, c, oy);
      }
    }
    fx.clearing.forEach((it) => {
      if (!it.tile) return;
      const cen = cellCenter(it.row, it.col);
      drawTile(it.tile, cen.x, cen.y, false, it.scale, it.alpha);
    });
  }

  function drawCell(tile, row, col, oy) {
    const rect = cellRect(row, col);
    if (!cellActive(row, col)) {
      roundRect(rect.x, rect.y + oy, rect.s, rect.s, 9, THEME.cellEmpty);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(rect.x + 6, rect.y + oy + rect.s - 6);
      ctx.lineTo(rect.x + rect.s - 6, rect.y + oy + 6);
      ctx.stroke();
      return;
    }
    const sel = selected?.row === row && selected?.col === col;
    const pulse = sel ? 0.85 + Math.sin(animTime / 150) * 0.15 : 1;
    roundRect(rect.x, rect.y + oy, rect.s, rect.s, 9, sel ? `rgba(255,247,176,${pulse})` : 'rgba(255,255,255,0.12)');
    if (tile?.hazard && HAZARD_META[tile.hazard]) {
      const hz = HAZARD_META[tile.hazard];
      const hp = 0.88 + Math.sin(animTime / 220 + row + col) * 0.12;
      ctx.save();
      ctx.strokeStyle = hz.proj;
      ctx.lineWidth = 3;
      ctx.shadowColor = hz.color;
      ctx.shadowBlur = 10 * hp;
      ctx.beginPath();
      const rx = rect.x + 2;
      const ry = rect.y + oy + 2;
      const rw = rect.s - 4;
      const rh = rect.s - 4;
      const rr = 8;
      ctx.moveTo(rx + rr, ry);
      ctx.lineTo(rx + rw - rr, ry);
      ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + rr);
      ctx.lineTo(rx + rw, ry + rh - rr);
      ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - rr, ry + rh);
      ctx.lineTo(rx + rr, ry + rh);
      ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - rr);
      ctx.lineTo(rx, ry + rr);
      ctx.quadraticCurveTo(rx, ry, rx + rr, ry);
      ctx.closePath();
      ctx.stroke();
      ctx.globalAlpha = 0.32;
      ctx.fillStyle = hz.color;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    if (tile) drawTile(tile, rect.x + rect.s / 2, rect.y + rect.s / 2 + oy);
  }

  /** 按类型生成棋子外轮廓（用于裁剪与描边） */
  function traceItemShape(type, hs) {
    ctx.beginPath();
    if (type === 'ice') {
      const r = hs * 0.94;
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 2;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      return;
    }
    if (type === 'shield') {
      ctx.moveTo(0, -hs);
      ctx.lineTo(hs * 0.95, -hs * 0.52);
      ctx.lineTo(hs * 0.82, hs * 0.42);
      ctx.quadraticCurveTo(0, hs * 1.02, 0, hs * 1.02);
      ctx.quadraticCurveTo(0, hs * 1.02, -hs * 0.82, hs * 0.42);
      ctx.lineTo(-hs * 0.95, -hs * 0.52);
      ctx.closePath();
      return;
    }
    if (type === 'thunder') {
      ctx.moveTo(0, -hs * 0.96);
      ctx.lineTo(hs * 0.96, 0);
      ctx.lineTo(0, hs * 0.96);
      ctx.lineTo(-hs * 0.96, 0);
      ctx.closePath();
      return;
    }
    if (type === 'life') {
      const r = 11;
      const x = -hs;
      const y = -hs * 0.94;
      const w2 = hs * 2;
      const h2 = hs * 1.92;
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w2 - r, y);
      ctx.quadraticCurveTo(x + w2, y, x + w2, y + r);
      ctx.lineTo(x + w2, y + h2 - r);
      ctx.quadraticCurveTo(x + w2, y + h2, x + w2 - r, y + h2);
      ctx.lineTo(x + r, y + h2);
      ctx.quadraticCurveTo(x, y + h2, x, y + h2 - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      return;
    }
    const side = hs * 2;
    const r = 10;
    const x = -hs;
    const y = -hs;
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + side - r, y);
    ctx.quadraticCurveTo(x + side, y, x + side, y + r);
    ctx.lineTo(x + side, y + side - r);
    ctx.quadraticCurveTo(x + side, y + side, x + side - r, y + side);
    ctx.lineTo(x + r, y + side);
    ctx.quadraticCurveTo(x, y + side, x, y + side - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawItemTileBody(item, s) {
    const hs = s / 2;
    const type = item.id;
    ctx.save();
    traceItemShape(type, hs);
    ctx.clip();

    const g = ctx.createLinearGradient(0, -hs, 0, hs);
    g.addColorStop(0, item.accent);
    g.addColorStop(0.42, item.color);
    g.addColorStop(1, item.dark);
    ctx.fillStyle = g;
    ctx.fillRect(-hs, -hs, s, s);

    // 类型色带：小格子里也能靠色相区分
    const band = {
      flame: ['rgba(255,120,40,0.45)', 0.55],
      ice: ['rgba(120,220,255,0.5)', 0],
      life: ['rgba(80,220,120,0.45)', 0.58],
      shield: ['rgba(255,220,100,0.4)', 0],
      thunder: ['rgba(180,120,255,0.42)', 0.5]
    }[type];
    if (band) {
      const bg = ctx.createLinearGradient(0, -hs, 0, hs);
      bg.addColorStop(band[1], 'rgba(0,0,0,0)');
      bg.addColorStop(band[1] > 0.5 ? 1 : 0, band[0]);
      ctx.fillStyle = bg;
      ctx.fillRect(-hs, -hs, s, s);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.ellipse(-hs * 0.15, -hs * 0.28, hs * 0.5, hs * 0.2, -0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    traceItemShape(type, hs);
    ctx.strokeStyle = item.border;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.restore();
  }

  function drawTile(tile, cx, cy, emphasize, scale = 1, alpha = 1) {
    if (!tile) return;
    const s = layout.cellSize - 5;
    const item = ITEM_MAP[tile.type];
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    drawItemTileBody(item, s);
    const iconS = tile.special ? s * 0.48 : s * 0.64;
    drawItemIcon(tile.type, iconS);
    if (tile.special) drawSpecialPiece(tile.special, s);
    if (tile.hazard) drawHazardOverlay(tile.hazard, s);
    if (emphasize) {
      ctx.strokeStyle = 'rgba(255,255,255,0.95)';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(-s / 2, -s / 2, s, s);
    }
    ctx.restore();
  }

  function drawChevron(x, y, dir, size, fill, stroke) {
    ctx.beginPath();
    const w = size * 0.55;
    if (dir === 'left') {
      ctx.moveTo(x + size, y - w);
      ctx.lineTo(x, y);
      ctx.lineTo(x + size, y + w);
    } else if (dir === 'right') {
      ctx.moveTo(x - size, y - w);
      ctx.lineTo(x, y);
      ctx.lineTo(x - size, y + w);
    } else if (dir === 'up') {
      ctx.moveTo(x - w, y + size);
      ctx.lineTo(x, y);
      ctx.lineTo(x + w, y + size);
    } else {
      ctx.moveTo(x - w, y - size);
      ctx.lineTo(x, y);
      ctx.lineTo(x + w, y - size);
    }
    ctx.closePath();
    if (stroke) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.stroke();
    }
    ctx.fillStyle = fill;
    ctx.fill();
  }

  function drawDoubleChevron(x, y, horizontal, size, fill, stroke, towardStart) {
    const gap = size * 0.38;
    if (horizontal) {
      const d = towardStart ? 'left' : 'right';
      drawChevron(x - gap, y, d, size, fill, stroke);
      drawChevron(x + gap, y, d, size, fill, stroke);
    } else {
      const d = towardStart ? 'up' : 'down';
      drawChevron(x, y - gap, d, size, fill, stroke);
      drawChevron(x, y + gap, d, size, fill, stroke);
    }
  }

  /** 横扫/纵扫：叠在普通棋子上，用光带+双向箭头标识，无文字 */
  function drawSpecialPiece(sp, s) {
    ctx.save();
    const pulse = 0.88 + Math.sin(animTime / 280) * 0.12;
    const hs = s / 2;

    if (sp === 'row') {
      const beamH = Math.max(8, s * 0.38);
      const bg = ctx.createLinearGradient(0, -beamH / 2, 0, beamH / 2);
      bg.addColorStop(0, 'rgba(255, 210, 60, 0)');
      bg.addColorStop(0.25, `rgba(255, 235, 130, ${0.55 * pulse})`);
      bg.addColorStop(0.5, 'rgba(255, 248, 200, 0.95)');
      bg.addColorStop(0.75, `rgba(255, 235, 130, ${0.55 * pulse})`);
      bg.addColorStop(1, 'rgba(255, 210, 60, 0)');
      ctx.fillStyle = bg;
      ctx.fillRect(-hs, -beamH / 2, s, beamH);

      ctx.shadowColor = '#ffc107';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = '#fff8e1';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(-hs + 3, 0);
      ctx.lineTo(hs - 3, 0);
      ctx.stroke();
      ctx.shadowBlur = 0;

      const arr = Math.max(6, s * 0.16);
      drawDoubleChevron(-hs + arr + 5, 0, true, arr, '#fffde7', '#f9a825', true);
      drawDoubleChevron(hs - arr - 5, 0, true, arr, '#fffde7', '#f9a825', false);

      ctx.strokeStyle = `rgba(255, 193, 7, ${0.85 * pulse})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(-hs + 1, -hs + 1, s - 2, s - 2);
      ctx.setLineDash([]);
    } else if (sp === 'col') {
      const beamW = Math.max(8, s * 0.38);
      const bg = ctx.createLinearGradient(-beamW / 2, 0, beamW / 2, 0);
      bg.addColorStop(0, 'rgba(60, 180, 255, 0)');
      bg.addColorStop(0.25, `rgba(120, 210, 255, ${0.55 * pulse})`);
      bg.addColorStop(0.5, 'rgba(200, 240, 255, 0.95)');
      bg.addColorStop(0.75, `rgba(120, 210, 255, ${0.55 * pulse})`);
      bg.addColorStop(1, 'rgba(60, 180, 255, 0)');
      ctx.fillStyle = bg;
      ctx.fillRect(-beamW / 2, -hs, beamW, s);

      ctx.shadowColor = '#29b6f6';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = '#e1f5fe';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(0, -hs + 3);
      ctx.lineTo(0, hs - 3);
      ctx.stroke();
      ctx.shadowBlur = 0;

      const arr = Math.max(6, s * 0.16);
      drawDoubleChevron(0, -hs + arr + 5, false, arr, '#e3f7ff', '#0288d1', true);
      drawDoubleChevron(0, hs - arr - 5, false, arr, '#e3f7ff', '#0288d1', false);

      ctx.strokeStyle = `rgba(41, 182, 246, ${0.85 * pulse})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(-hs + 1, -hs + 1, s - 2, s - 2);
      ctx.setLineDash([]);
    } else if (sp === 'bomb') {
      const r = s * 0.38;
      ctx.fillStyle = `rgba(255, 120, 40, ${0.35 * pulse})`;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ff6d00';
      ctx.lineWidth = 2.5;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + animTime / 450;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * r * 0.35, Math.sin(a) * r * 0.35);
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        ctx.stroke();
      }
      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.2);
      core.addColorStop(0, '#fff');
      core.addColorStop(1, '#ff3d00');
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2);
      ctx.fill();
    } else if (sp === 'rainbow') {
      const hues = ['#ff5252', '#ffb74d', '#fff176', '#69f0ae', '#40c4ff', '#b388ff'];
      hues.forEach((col, i) => {
        ctx.strokeStyle = col;
        ctx.lineWidth = 2.5;
        ctx.globalAlpha = 0.65 + Math.sin(animTime / 220 + i * 0.9) * 0.25;
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.2 + i * 2.2, i * 0.55, i * 0.55 + Math.PI * 1.35);
        ctx.stroke();
      });
      ctx.globalAlpha = 1;
      const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.18);
      rg.addColorStop(0, '#fff');
      rg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawStoneBoulder(s) {
    const rg = ctx.createLinearGradient(-s * 0.15, -s * 0.3, s * 0.2, s * 0.25);
    rg.addColorStop(0, '#d4d4e0');
    rg.addColorStop(0.45, '#9a9aaa');
    rg.addColorStop(1, '#5c5c6a');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.moveTo(-s * 0.32, s * 0.08);
    ctx.lineTo(-s * 0.26, -s * 0.22);
    ctx.lineTo(-s * 0.05, -s * 0.32);
    ctx.lineTo(s * 0.22, -s * 0.2);
    ctx.lineTo(s * 0.3, s * 0.05);
    ctx.lineTo(s * 0.12, s * 0.28);
    ctx.lineTo(-s * 0.12, s * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ececf4';
    ctx.lineWidth = 1.8;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(50, 48, 60, 0.75)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-s * 0.12, -s * 0.05);
    ctx.lineTo(s * 0.08, s * 0.1);
    ctx.moveTo(s * 0.05, -s * 0.12);
    ctx.lineTo(-s * 0.1, s * 0.15);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(-s * 0.08, -s * 0.14, s * 0.1, s * 0.05, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawChainLinks(s) {
    const ly = s * 0.05;
    ctx.strokeStyle = '#7a7a8a';
    ctx.lineWidth = 2.5;
    ctx.fillStyle = '#a8a8b8';
    [-s * 0.22, s * 0.22].forEach((lx) => {
      ctx.beginPath();
      ctx.ellipse(lx, ly, 5, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    });
    ctx.beginPath();
    ctx.moveTo(-s * 0.17, ly);
    ctx.lineTo(s * 0.17, ly);
    ctx.stroke();
    ctx.fillStyle = '#8a8a98';
    ctx.fillRect(-3, ly - 5, 6, 10);
  }

  function drawHazardOverlay(hazard, s) {
    if (!HAZARD_META[hazard]) return;
    ctx.save();
    const pulse = 0.88 + Math.sin(animTime / 200 + s * 0.1) * 0.12;

    if (hazard === 'stone') {
      ctx.fillStyle = `rgba(55, 52, 68, ${0.58 * pulse})`;
      roundRect(-s / 2, -s / 2, s, s, 10, `rgba(55, 52, 68, ${0.58 * pulse})`);
      drawStoneBoulder(s);
      drawChainLinks(s);
      ctx.strokeStyle = `rgba(210, 205, 225, ${0.85 * pulse})`;
      ctx.lineWidth = 2.5;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(-s / 2 + 2, -s / 2 + 2, s - 4, s - 4);
      ctx.setLineDash([]);
    } else if (hazard === 'fire') {
      ctx.fillStyle = `rgba(255, 70, 10, ${0.38 * pulse})`;
      roundRect(-s / 2, -s / 2, s, s, 10, `rgba(255, 70, 10, ${0.38 * pulse})`);
      ctx.strokeStyle = `rgba(255, 180, 60, ${0.75 * pulse})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(-s / 2 + 1, -s / 2 + 1, s - 2, s - 2);
      for (let i = 0; i < 5; i++) {
        const fh = s * (0.26 + Math.sin(animTime / 90 + i * 1.3) * 0.12) * pulse;
        const fx = -s * 0.2 + i * s * 0.1;
        const g = ctx.createLinearGradient(fx, s * 0.25, fx, s * 0.25 - fh);
        g.addColorStop(0, '#ff8f00');
        g.addColorStop(0.5, '#ff5722');
        g.addColorStop(1, 'rgba(255, 200, 0, 0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(fx - 4, s * 0.22);
        ctx.lineTo(fx, s * 0.22 - fh);
        ctx.lineTo(fx + 4, s * 0.22);
        ctx.fill();
      }
    } else if (hazard === 'frost') {
      ctx.fillStyle = `rgba(120, 210, 255, ${0.52 * pulse})`;
      roundRect(-s / 2, -s / 2, s, s, 10, `rgba(120, 210, 255, ${0.52 * pulse})`);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2.5;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + animTime / 800;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * s * 0.42, Math.sin(a) * s * 0.42);
        ctx.stroke();
      }
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
        const r = s * 0.14;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    } else if (hazard === 'vine') {
      ctx.fillStyle = `rgba(40, 120, 50, ${0.35 * pulse})`;
      roundRect(-s / 2, -s / 2, s, s, 10, `rgba(40, 120, 50, ${0.35 * pulse})`);
      ctx.strokeStyle = '#1b5e20';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(i * s * 0.12, s * 0.32);
        ctx.quadraticCurveTo(i * s * 0.38 + Math.sin(animTime / 400) * 2, 0, i * s * 0.08, -s * 0.32);
        ctx.stroke();
        ctx.fillStyle = '#43a047';
        ctx.beginPath();
        ctx.ellipse(i * s * 0.38, -s * 0.05, 5, 7, i * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (hazard === 'shadow') {
      const g = ctx.createRadialGradient(0, 0, s * 0.05, 0, 0, s * 0.5);
      g.addColorStop(0, 'rgba(120, 70, 200, 0.88)');
      g.addColorStop(1, 'rgba(15, 5, 35, 0.94)');
      roundRect(-s / 2, -s / 2, s, s, 10, g);
      ctx.strokeStyle = `rgba(180, 140, 255, ${0.7 * pulse})`;
      ctx.lineWidth = 2.5;
      ctx.strokeRect(-s / 2 + 1, -s / 2 + 1, s - 2, s - 2);
      ctx.fillStyle = '#ff4466';
      ctx.shadowColor = '#ff1744';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.ellipse(-s * 0.08, -s * 0.02, s * 0.09, s * 0.11, 0, 0, Math.PI * 2);
      ctx.ellipse(s * 0.1, -s * 0.02, s * 0.07, s * 0.09, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.arc(-s * 0.08, -s * 0.02, s * 0.04, 0, Math.PI * 2);
      ctx.arc(s * 0.1, -s * 0.02, s * 0.035, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawItemIcon(type, s) {
    const k = s / 28;
    ctx.save();
    ctx.scale(k, k);
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 4;

    if (type === 'flame') {
      const fg = ctx.createLinearGradient(0, -14, 0, 12);
      fg.addColorStop(0, '#fff9c4');
      fg.addColorStop(0.4, '#ff9800');
      fg.addColorStop(1, '#e65100');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.moveTo(0, -14);
      ctx.bezierCurveTo(10, -6, 8, 6, 0, 12);
      ctx.bezierCurveTo(-8, 6, -10, -6, 0, -14);
      ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.bezierCurveTo(4, -2, 3, 4, 0, 7);
      ctx.bezierCurveTo(-3, 4, -4, -2, 0, -8);
      ctx.fill();
    }

    if (type === 'ice') {
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.strokeStyle = '#b3e5fc';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -14);
      ctx.lineTo(11, -4);
      ctx.lineTo(7, 12);
      ctx.lineTo(-7, 12);
      ctx.lineTo(-11, -4);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.lineTo(0, 8);
      ctx.moveTo(-6, -1);
      ctx.lineTo(6, -1);
      ctx.stroke();
    }

    if (type === 'life') {
      const hg = ctx.createLinearGradient(0, -10, 0, 12);
      hg.addColorStop(0, '#e8ffe8');
      hg.addColorStop(1, '#2e7d32');
      ctx.fillStyle = hg;
      ctx.beginPath();
      ctx.moveTo(0, 10);
      ctx.bezierCurveTo(-14, -2, -8, -12, 0, -8);
      ctx.bezierCurveTo(8, -12, 14, -2, 0, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(0, -2, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    if (type === 'shield') {
      const sg = ctx.createLinearGradient(0, -12, 0, 12);
      sg.addColorStop(0, '#fffde7');
      sg.addColorStop(0.5, '#ffca28');
      sg.addColorStop(1, '#f57f17');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(12, -7);
      ctx.lineTo(10, 6);
      ctx.quadraticCurveTo(0, 14, 0, 14);
      ctx.quadraticCurveTo(0, 14, -10, 6);
      ctx.lineTo(-12, -7);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.75)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(-1, -4, 2, 8);
    }

    if (type === 'thunder') {
      ctx.fillStyle = '#fff59d';
      ctx.strokeStyle = '#4a148c';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(4, -14);
      ctx.lineTo(-6, 2);
      ctx.lineTo(1, 2);
      ctx.lineTo(-2, 14);
      ctx.lineTo(10, -2);
      ctx.lineTo(3, -2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.moveTo(2, -10);
      ctx.lineTo(-2, 0);
      ctx.lineTo(2, 0);
      ctx.lineTo(0, 8);
      ctx.lineTo(6, -2);
      ctx.lineTo(2, -2);
      ctx.closePath();
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawBuffPicker() {

      g.addColorStop(1, atMax ? '#1a1828' : '#2a2238');

      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.textAlign = 'center';

      ctx.font = withEmojiFont(26);
      ctx.fillText(buff.emoji, x + cardW / 2, cardY + 38);
      ctx.font = withMixedFont(12, 'bold');
      ctx.fillText(buff.name, x + cardW / 2, cardY + 58);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      const descFont = withMixedFont(11);
      const descLines = wrapCanvasText(buff.desc, cardW - 12, descFont);
      let dy = cardY + 74;

      descLines.forEach((ln) => {
        ctx.fillText(ln, x + cardW / 2, dy);
        dy += 13;
      });
      ctx.fillStyle = '#ffe9a8';

      const stackHint = n > 0 ? `已叠 ${n}/${maxN} · ` : '';
      const tipLines = wrapCanvasText(`${stackHint}${buff.tip || ''}`, cardW - 10, 'bold 9px sans-serif');

      roundRect(exitBtn.x, exitBtn.y, exitBtn.w, exitBtn.h, 10, '#3d3558');
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = withMixedFont(13, 'bold');
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('保存并退出', exitBtn.x + exitBtn.w / 2, exitBtn.y + exitBtn.h / 2);
      ctx.textBaseline = 'alphabetic';
    }
  }

  function drawFx() {
    fx.beams.forEach((beam) => {
      const p = beam.t / beam.dur;
      const a = 1 - p;
      ctx.save();
      ctx.globalAlpha = a * 0.75;
      if (beam.type === 'row') {
        const y = cellCenter(beam.row, beam.col).y;
        ctx.fillStyle = '#fff6a0';
        ctx.fillRect(layout.boardX, y - layout.cellSize / 2, layout.boardSize, layout.cellSize);
      } else if (beam.type === 'col') {
        const x = cellCenter(beam.row, beam.col).x;
        ctx.fillStyle = '#fff6a0';
        ctx.fillRect(x - layout.cellSize / 2, layout.boardY, layout.cellSize, layout.boardSize);
      } else if (beam.type === 'bomb') {
        const c = cellCenter(beam.row, beam.col);
        ctx.strokeStyle = '#ffd56a';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(c.x, c.y, layout.cellSize * (0.8 + p), 0, Math.PI * 2);
        ctx.stroke();
      } else if (beam.type === 'spawn') {
        const c = cellCenter(beam.row, beam.col);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(c.x, c.y, layout.cellSize * 0.45 * (1 + p * 0.5), 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    });

    fx.projectiles.forEach((proj) => {
      const t = easeOutCubic(Math.min(1, proj.t / proj.dur));
      const x = proj.fromX + (proj.toX - proj.fromX) * t;
      const y = proj.fromY + (proj.toY - proj.fromY) * t;
      ctx.fillStyle = proj.color || '#a09080';
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.fill();
    });

    fx.particles.forEach((p) => {
      ctx.globalAlpha = clamp(p.life / 400, 0, 1);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    fx.popups.forEach((p) => {
      const a = clamp(p.life / 350, 0, 1);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.font = `bold ${Math.floor(p.size * p.scale)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 3;
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    });
  }

  function drawButton() {
    if (!isPvp() && state.status === 'playing' && !state.showStarResult) return;
    const b = layout.button;
    const label = btnLabel();
    const disabled = state.showStarResult || state.buffPicker || (state.status === 'win' && !state.canAdvance)
      || (isPvp() && state.status === 'playing');
    const color = disabled ? '#555' : state.status === 'lose' ? '#e44b3f' : state.status === 'win' ? '#5cd68a' : '#7c5cff';
    roundRect(b.x, b.y, b.w, b.h, 14, color);
    ctx.fillStyle = '#fff';
    const fontSize = clamp(Math.floor(b.h * 0.34), 12, 14);
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, b.x + b.w / 2, b.y + b.h / 2);
    ctx.textBaseline = 'alphabetic';
  }

  function btnLabel() {
    if (state.showStarResult) return '选择锦囊';
    if (state.buffPicker) return '请先选择强化';
    if (isPvp()) {
      if (state.status === 'win') return `玩家${state.pvp.winner}获胜 · 再来一局`;
      if (state.status === 'lose') return '再来一局';
      if (state.status === 'playing') return '对战进行中';
      return '返回选模式';
    }
    if (state.status === 'win' && !state.canAdvance) return '请先选择强化';
    if (state.status === 'win' && state.level < MAX_LEVEL) return '进入下一关';
    if (state.status === 'lose') return `重试第 ${state.level} 关`;
    if (state.status === 'win') return '再来一轮';
    return '继续';
  }

  function drawTutorial() {
    ctx.save();
    ctx.fillStyle = 'rgba(15,12,22,0.94)';
    ctx.fillRect(0, 0, layout.w, layout.h);
    const compact = layout.compact;
    const cx = layout.w / 2;
    const page = TUTORIAL_PAGES[state.tutorialPage || 0];
    const pageIdx = state.tutorialPage || 0;
    const singlePage = TUTORIAL_PAGES.length <= 1;
    const textTop = layout.safe.top + (compact ? 40 : 48);
    const lineH = compact ? 19 : 22;
    const bodyFont = withMixedFont(compact ? 12 : 13);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#fff';
    ctx.font = withMixedFont(compact ? 17 : 20, 'bold');
    ctx.fillText('快速上手', cx, textTop);
    ctx.font = withMixedFont(compact ? 15 : 17, 'bold');
    ctx.fillStyle = '#ffe9a8';
    ctx.fillText(page.title, cx, textTop + (compact ? 24 : 28));
    let y = textTop + (compact ? 48 : 54);
    page.lines.forEach((line) => {
      ctx.font = bodyFont;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillText(line, cx, y);

    if (!singlePage) {
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = '11px sans-serif';
      ctx.fillText(`${pageIdx + 1} / ${TUTORIAL_PAGES.length}`, cx, layout.button.y - 28);
      for (let i = 0; i < TUTORIAL_PAGES.length; i++) {
        ctx.fillStyle = i === pageIdx ? '#ffe566' : 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.arc(cx - (TUTORIAL_PAGES.length - 1) * 6 + i * 12, layout.button.y - 40, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    const last = pageIdx >= TUTORIAL_PAGES.length - 1;

    if (singlePage) {
      const btn = layout.button;
      roundRect(btn.x, btn.y, btn.w, btn.h, 14, '#7c5cff');
      ctx.fillStyle = '#fff';

      ctx.fillText('开始战斗', btn.x + btn.w / 2, btn.y + btn.h / 2 + 6);

      const prev = layout.tutorialPrevBtn;

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px sans-serif';
        ctx.fillText('上一页', prev.x + prev.w / 2, prev.y + prev.h / 2 + 6);
        roundRect(next.x, next.y, next.w, next.h, 14, '#7c5cff');
        ctx.fillText(last ? '开始战斗' : '下一页', next.x + next.w / 2, next.y + next.h / 2 + 6);
      } else {
        const btn = layout.button;
        roundRect(btn.x, btn.y, btn.w, btn.h, 14, '#7c5cff');
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px sans-serif';
        ctx.fillText(last ? '开始战斗' : '下一页', btn.x + btn.w / 2, btn.y + btn.h / 2 + 6);
      }
      ctx.font = '11px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('使用底部按钮翻页', cx, layout.button.y - 8);
