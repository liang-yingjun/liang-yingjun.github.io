  function drawResultOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(layout.boardX, layout.boardY, layout.boardSize, layout.boardSize);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    const cx = layout.boardX + layout.boardSize / 2;
    const cy = layout.boardY + layout.boardSize / 2;
    if (state.status === 'win') {
      ctx.fillText(state.level >= MAX_LEVEL ? '通关！' : '胜利！', cx, cy - 10);
    } else {
      ctx.fillText('失败', cx, cy - 10);
    }
  }

  function roundRect(x, y, w, h, r, color) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  function loop(ts) {
    const dt = Math.min(32, ts - lastFrame || 16);
    lastFrame = ts;
    updateFx(dt);
    tickAudio(ts);
    render();
    requestAnimationFrame(loop);
  }

  let lastTapAt = 0;
  let menuHandledOnDown = false;
  let buffCardPress = null;
  let levelSelectPress = null;
  function guardDoubleTap(fn) {
    return (e) => {
      const menuOpen = state?.buffPicker || state?.showStarResult || state?.showLevelSelect
        || state?.showModeSelect || state?.showDevMenu || state?.showPvpSetup;
      if (!menuOpen) {
        const now = Date.now();
        if (now - lastTapAt < 280) return;
        lastTapAt = now;
      }
      fn(e);
    };
  }

  function bindInput() {
    const opts = { passive: false };
    canvas.addEventListener('pointerdown', guardDoubleTap(onPointerDown), opts);
    canvas.addEventListener('pointermove', onPointerMove, opts);
    canvas.addEventListener('pointerup', onPointerUp, opts);
    canvas.addEventListener('pointercancel', onPointerUp, opts);
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    if (devLevelInput) {
      devLevelInput.addEventListener('input', () => {
        const raw = devLevelInput.value.trim();
        if (raw === '') return;
        const n = parseInt(raw, 10);
        if (Number.isFinite(n)) devTargetLevel = clamp(n, 1, MAX_LEVEL);
      });
      devLevelInput.addEventListener('blur', readDevLevelInput);
      devLevelInput.addEventListener('change', readDevLevelInput);
      devLevelInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          readDevLevelInput();
          devJumpToLevel(devTargetLevel);
        }
      });
    }
  }

  bindInput();
  document.addEventListener('pointerdown', () => unlockAudio(), { passive: true, capture: true });
  window.addEventListener('touchstart', () => {
    unlockAudio();
    if (!state?.buffPicker && !state?.showTutorial) syncViewportNow();
  }, { passive: true });
  window.addEventListener('resize', scheduleResize);
  window.addEventListener('orientationchange', () => {
    setTimeout(syncViewportNow, 80);
    setTimeout(syncViewportNow, 320);
  });
  window.addEventListener('scroll', lockPageScroll, { passive: true });
  window.addEventListener('pagehide', saveGame);
  window.addEventListener('beforeunload', saveGame);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      saveGame();
      audio.bgmNeedsRestart = true;
    } else {
      setTimeout(syncViewportNow, 50);
      resumeAudioIfNeeded(true);
    }
  });
  window.addEventListener('pageshow', (e) => {
    syncViewportNow();
    resumeAudioIfNeeded(true);
    if (e.persisted) {
      const snap = loadGame();
      if (snap) {
        restoreGame(snap);
        resetFx();
        syncViewportNow();
      }
    }
  });
  if (window.visualViewport) {
    const vv = window.visualViewport;
    vv.addEventListener('resize', onViewportChange);
    vv.addEventListener('scroll', onViewportChange);
  }
  window.addEventListener('focus', () => {
    syncViewportNow();
    resumeAudioIfNeeded(true);
  });

  clearLegacySaves();
  loadDevSettings();
  loadAudioSettings();
  const saved = loadGame();
  if (saved) {
    syncProgressFromSave(saved);
    restoreGame(saved);
    resetFx();
  } else {
    state = { showModeSelect: true, status: 'menu' };
  }
  doResize();
  // UC 等浏览器首屏地址栏高度不稳定，延迟再对齐两次
  setTimeout(syncViewportNow, 400);
  setTimeout(syncViewportNow, 1000);
  if (saved && layout) {
    spawnPopup(layout.w / 2, layout.h * 0.28, `已恢复第 ${saved.level} 关进度`, '#b8ffd0', 15);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
