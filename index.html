<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1520">
  <meta name="color-scheme" content="dark">
  <title>消消斗阵 - 试玩版</title>
  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      background: #1a1520;
    }
    #gameStage {
      position: fixed;
      inset: 0;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      background: #1a1520;
    }
    #devLevelInput {
      display: none;
      position: absolute;
      z-index: 10;
      margin: 0;
      padding: 0 6px;
      border: 2px solid rgba(255, 200, 100, 0.55);
      border-radius: 8px;
      background: rgba(16, 12, 28, 0.96);
      color: #fff;
      font: bold 15px sans-serif, "PingFang SC", "Microsoft YaHei";
      text-align: center;
      box-sizing: border-box;
      outline: none;
      -moz-appearance: textfield;
    }
    #devLevelInput:focus {
      border-color: rgba(255, 220, 140, 0.9);
      box-shadow: 0 0 0 2px rgba(255, 200, 100, 0.2);
    }
    #devLevelInput::-webkit-outer-spin-button,
    #devLevelInput::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body>
<div id="gameStage"><canvas id="gameCanvas"></canvas><input id="devLevelInput" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" enterkeyhint="go" aria-label="跳转关卡"></div>
<script>
(() => {
  const GAME_NAME = '消消斗阵';
  /** 固定设计分辨率：逻辑布局始终按此尺寸计算，屏幕侧仅整体等比缩放 */
  const DESIGN_W = 390;
  const DESIGN_H = 844;
  const IS_DESKTOP = !/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  const IS_IOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const IS_UC = /UCBrowser|UCWEB|UBrowser/i.test(navigator.userAgent);
  const BOARD_SIZE = 9;
  const MIN_DRAG = 10;
  const PLAYER_MAX_HP = 130;
  const PVP_PLAYER_HP = 300;
  const PVP_HP_MIN = 200;
  const PVP_HP_MAX = 1000;
  const PVP_HP_STEP = 50;

  /** 暗色界面配色 */
  const THEME = {
    bgTop: '#1e1830',
    bgMid: '#322a48',
    bgBottom: '#14101c',
    text: '#ffffff',
    textMuted: 'rgba(255,255,255,0.6)',
    textDark: '#ffffff',
    panel: 'rgba(40,32,60,0.88)',
    panelSolid: '#3d3558',
    btnGhost: '#3d3558',
    btnGhostText: '#ffffff',
    arena: 'rgba(0,0,0,0.28)',
    duelPanel: 'rgba(0,0,0,0.35)',
    hpBoss: '#ff9a8a',
    hpAlly: '#8ee8b8',
    boardOuter: '#b8a888',
    boardInner: '#d4c4a8',
    cellEmpty: 'rgba(0,0,0,0.42)'
  };

  function fillThemeBg() {
    const g = ctx.createLinearGradient(0, 0, 0, layout.h);
    g.addColorStop(0, THEME.bgTop);
    g.addColorStop(0.35, THEME.bgMid);
    g.addColorStop(0.65, '#2a2438');
    g.addColorStop(1, THEME.bgBottom);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, layout.w, layout.h);
  }
  const PVP_BUFF_PICK_COUNT = 3;
  const PVP_BUFF_CHOICE_COUNT = 5;
  /** 前 10 关 Boss HP +15%，11~20 关 +10%，21 关起 +3% */
  function bossHpLevelMul(level) {
    if (level <= 10) return 1.15;
    if (level <= 20) return 1.10;
    return 1.03;
  }
  const STONE_CAP = 8;
  const MIN_MOVES = 6;
  /** Boss 攻击无视护盾的基础概率 */
  const BOSS_TRUE_DAMAGE_BASE = 0.18;
  /** Boss 闪避玩家伤害的基础概率 */
  const BOSS_DODGE_BASE = 0.10;

  const ITEMS = [
    { id: 'flame', emoji: '🔥', color: '#e84838', accent: '#ffb088', dark: '#8c2218', border: '#ffd54f', damage: 4 },
    { id: 'ice', emoji: '❄️', color: '#2e8fd9', accent: '#b8ecff', dark: '#145a8c', border: '#e1f5fe', damage: 3 },
    { id: 'life', emoji: '💚', color: '#2dad58', accent: '#9ef0b8', dark: '#156b38', border: '#c8ffd4', damage: 2 },
    { id: 'shield', emoji: '🛡️', color: '#c9921e', accent: '#ffe9a0', dark: '#7a5510', border: '#fff8e0', damage: 2 },
    { id: 'thunder', emoji: '⚡', color: '#7b4fd9', accent: '#d4b8ff', dark: '#3d2270', border: '#f0e6ff', damage: 3 }
  ];
  const ITEM_MAP = Object.fromEntries(ITEMS.map((i) => [i.id, i]));

  const MAX_LEVEL = 100;
  const BOSS_SEGMENT = 10;
  const HAZARD_META = {
    stone: { label: '石化', color: '#8a8a95', proj: '#a09080', locked: true },
    fire: { label: '点燃', color: '#ff6a30', proj: '#ff7040', locked: false },
    frost: { label: '寒霜', color: '#7ad4ff', proj: '#9ce8ff', locked: true },
    vine: { label: '藤蔓', color: '#4db85a', proj: '#6fdc7a', locked: true },
    shadow: { label: '暗影', color: '#7b5cff', proj: '#9b67ff', locked: true }
  };
  /** Canvas 绘制 emoji 时使用的字体栈（与 sans-serif 混用） */
  const EMOJI_FONT = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';

  /** 纯 emoji 一行（如锦囊卡片图标） */
  function withEmojiFont(sizePx, weight = '') {
    return weight ? `${weight} ${sizePx}px ${EMOJI_FONT}` : `${sizePx}px ${EMOJI_FONT}`;
  }

  /** 中文 + emoji 混排：必须先 sans-serif，否则手机上中文会变方框/乱码 */
  function withMixedFont(sizePx, weight = '') {
    const w = weight ? `${weight} ` : '';
    return `${w}${sizePx}px sans-serif, "PingFang SC", "Microsoft YaHei", ${EMOJI_FONT}`;
  }

  const PVP_BUFF_IDS = new Set([
    'sharp', 'shield', 'heal', 'vitality', 'flame', 'ember', 'frostbite', 'spring', 'chain', 'focus', 'expand'
  ]);
  const PVP_SHAPE_IDS = [
    'full', 'ring', 'convex', 'concave', 'cross', 'diamond', 'split', 'pillars', 'zigzag', 'fortress'
  ];
  const BUFF_POOL = [
    { id: 'sharp', name: '锋锐之刃', desc: '全部伤害 +12%', emoji: '⚔️', tip: '伤害×1.12', scope: 'run' },
    { id: 'shield', name: '铁壁意志', desc: '下关首回合 +12 护盾（仅该回合）', emoji: '🛡️', tip: '下关首回合+12盾', scope: 'turn' },
    { id: 'swift', name: '迅捷步伐', desc: '每关开局 +1 行动力', emoji: '⚡', tip: '开局行动+1', scope: 'run' },
    { id: 'heal', name: '生命涌泉', desc: '生命上限 +10（立即生效）', emoji: '💚', tip: '上限+10', scope: 'run' },
    { id: 'regen', name: '复苏之泉', desc: '玩家回合结束 25% 净化石化，每选+2 格上限', emoji: '💧', tip: '25%清石化', scope: 'run' },
    { id: 'bulwark', name: '坚守之躯', desc: 'Boss 每回合反击固定 -2 伤', emoji: '🏰', tip: '反击-2', scope: 'run' },
    { id: 'sanctuary', name: '圣域护佑', desc: 'Boss 反击伤害 -15%', emoji: '✝️', tip: '反击×0.85', scope: 'run' },
    { id: 'aegis', name: '天佑护盾', desc: '每回合结束 +2 护盾', emoji: '🌟', tip: '回合末+2盾', scope: 'run' },
    { id: 'thorns', name: '荆棘反刺', desc: '受 Boss 反击后反弹 4 伤', emoji: '🌵', tip: '受击反伤4', scope: 'run' },
    { id: 'vitality', name: '强健体魄', desc: '生命上限 +12（立即生效）', emoji: '💪', tip: '上限+12', scope: 'run' },
    { id: 'flame', name: '烈焰之心', desc: '火焰每次 +2 伤害', emoji: '🔥', tip: '火焰+2/颗', scope: 'run' },
    { id: 'ember', name: '余烬灼烧', desc: '燃烧跳伤 +4/层', emoji: '🕯️', tip: '燃烧+4', scope: 'run' },
    { id: 'frostbite', name: '极寒指环', desc: '冻结概率 +15%', emoji: '❄️', tip: '冻结+15%', scope: 'run' },
    { id: 'spring', name: '春华恬静', desc: '每次消除生命棋 +3 血', emoji: '🌸', tip: '生命消+3血', scope: 'run' },
    { id: 'break', name: '破岩之力', desc: '无视 Boss 5% 减伤', emoji: '💥', tip: '穿透5%', scope: 'run' },
    { id: 'chain', name: '连锁大师', desc: '连锁伤害 +10%', emoji: '🔗', tip: '连锁×1.10', scope: 'run' },
    { id: 'lucky', name: '幸运洗牌', desc: '每关获 1 张洗牌锦囊', emoji: '🍀', tip: '洗牌牌+1', scope: 'run' },
    { id: 'expand', name: '拓土开疆', desc: '每关开始 20% 几率拓开 1 连通格', emoji: '🗺️', tip: '20%拓格+1', scope: 'run' },
    { id: 'focus', name: '猎杀专注', desc: 'Boss 半血以下伤害 +10%', emoji: '🎯', tip: '残血伤害+10%', scope: 'run' },
    { id: 'spark', name: '疾风步法', desc: '有效交换 10% 不耗行动力', emoji: '💨', tip: '10%省行动', scope: 'run' }
  ];
  /** 同锦囊本局最多叠加次数（部分锦囊在 computeMods 内另有数值上限） */
  const BUFF_MAX_STACK = 3;

  function getBuffMaxStack(buffId) {
    const def = BUFF_POOL.find((b) => b.id === buffId);
    return def?.maxStack ?? BUFF_MAX_STACK;
  }

  function getUniqueBuffEntries(runBuffs) {
    const order = [];
    const counts = {};
    (runBuffs || []).forEach((id) => {
      if (!counts[id]) order.push(id);
      counts[id] = (counts[id] || 0) + 1;
    });
    return order.map((id) => ({
      id,
      buff: BUFF_POOL.find((b) => b.id === id),
      count: counts[id]
    })).filter((e) => e.buff);
  }

  function getSideRunBuffs(side) {
    if (isPvp()) {
      const p = side === 'foe' ? getPvpPlayer(2) : getPvpPlayer(1);
      return p?.runBuffs || [];
    }
    return state?.runBuffs || [];
  }

  /** 面板展示用：仅被动锦囊，不含已耗尽的洗牌牌 */
  function getDisplayBuffEntries(runBuffs) {
    return getUniqueBuffEntries(runBuffs);
  }

  function getHeroPortraitRect(side) {
    if (!layout || !state) return null;
    const arena = side === 'foe' ? layout.boss : layout.player;
    if (!arena) return null;
    const card = side === 'ally' && !isPvp() ? layout.shuffleCardBtn : null;
    const heroLocalX = (side === 'ally' && (state.shuffleCards || 0) > 0 && card && !isPvp())
      ? card.w + 8 + (arena.w - card.w - 16) / 2
      : arena.w / 2;
    const heroLocalY = side === 'foe' ? arena.h * 0.55 : arena.h * 0.52;
    const scale = clamp(arena.h / (side === 'foe' ? 88 : 80), 0.75, 1.15);
    const r = 34 * scale;
    return {
      x: arena.x + heroLocalX - r,
      y: arena.y + heroLocalY - r,
      w: r * 2,
      h: r * 2
    };
  }

  function hitHeroPortrait(side, p) {
    const buffs = getSideRunBuffs(side);
    if (!buffs.length) return false;
    if (side === 'ally' && hitShuffleCardBtn(p)) return false;
    const r = getHeroPortraitRect(side);
    if (!r) return false;
    const pad = 10;
    return p.x >= r.x - pad && p.x <= r.x + r.w + pad
      && p.y >= r.y - pad && p.y <= r.y + r.h + pad;
  }

  function closeExpandedBuffPanel() {
    expandedBuffSide = null;
  }

  function toggleBuffPanel(side) {
    const buffs = getSideRunBuffs(side);
    if (!buffs.length) return;
    expandedBuffSide = expandedBuffSide === side ? null : side;
    playSfx('click');
  }

  function hitExpandedBuffPanel(p) {
    const panel = layout?.expandedBuffPanel;
    if (!panel) return false;
    return p.x >= panel.x && p.x <= panel.x + panel.w && p.y >= panel.y && p.y <= panel.y + panel.h;
  }

  function wrapCanvasText(text, maxWidth, font) {
    ctx.font = font;
    const lines = [];
    let line = '';
    for (const ch of text) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line);
        line = ch;
      } else line = test;
    }
    if (line) lines.push(line);
    return lines;
  }

  function measureWrappedHeight(text, maxWidth, font, lineHeight) {
    return wrapCanvasText(text, maxWidth, font).length * lineHeight;
  }

  let buffChipHitAreas = [];
  let buffDetail = null;
  let buffLongPressTimer = 0;
  let buffLongPressTarget = null;
  let buffLongPressFired = false;
  const BUFF_CARD_PAD = 14;
  const BUFF_PICK_MIN_MS = 70;
  const BUFF_LONG_PRESS_MS = 580;

  function clearBuffLongPress() {
    if (buffLongPressTimer) clearTimeout(buffLongPressTimer);
    buffLongPressTimer = 0;
    buffLongPressTarget = null;
  }

  function startBuffLongPress(target) {
    clearBuffLongPress();
    if (!target) return;
    buffLongPressTarget = target;
    buffLongPressTimer = setTimeout(() => {
      buffDetail = target;
      buffLongPressFired = true;
      buffLongPressTimer = 0;
    }, BUFF_LONG_PRESS_MS);
  }

  function pickBuffDetailTarget(p) {
    for (const chip of buffChipHitAreas) {
      if (p.x >= chip.x && p.x <= chip.x + chip.w && p.y >= chip.y && p.y <= chip.y + chip.h) {
        return { buff: chip.buff, count: chip.count };
      }
    }
    if (state?.buffPicker) {
      const cards = getBuffCardRects();
      for (const card of cards) {
        if (p.x >= card.x && p.x <= card.x + card.w && p.y >= card.y && p.y <= card.y + card.h) {
          return { buff: card.buff, count: buffStackCount(card.buff.id) };
        }
      }
    }
    if (state?.showDevMenu) {
      const ui = getDevMenuLayout();
      if (ui) {
        for (const cell of ui.buffCells) {
          if (p.x >= cell.x && p.x <= cell.x + cell.w && p.y >= cell.y && p.y <= cell.y + cell.h) {
            return { buff: cell.buff, count: buffStackCount(cell.buff.id) };
          }
        }
      }
    }
    return null;
  }

  function hitBuffDetailDismiss(p) {
    if (!buffDetail || !layout) return false;
    const panel = layout.buffDetailPanel;
    if (!panel) return true;
    return !(p.x >= panel.x && p.x <= panel.x + panel.w && p.y >= panel.y && p.y <= panel.y + panel.h);
  }

  function drawOneBuffChip(x, y, size, entry, worldX = 0, worldY = 0) {
    const chip = { ...entry, x: worldX + x, y: worldY + y, w: size, h: size };
    roundRect(x, y, size, size, 7, 'rgba(48,40,72,0.92)');
    ctx.strokeStyle = 'rgba(255,230,150,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, size - 1, size - 1);
    ctx.textAlign = 'center';
    ctx.font = withEmojiFont(layout.compact ? 13 : 14);
    ctx.fillStyle = '#fff';
    ctx.fillText(entry.buff.emoji, x + size / 2, y + size * 0.68);
    if (entry.count > 0) {
      ctx.fillStyle = '#ff5544';
      ctx.beginPath();
      ctx.arc(x + size - 2, y + 2, 6.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px sans-serif';
      ctx.fillText(String(entry.count), x + size - 2, y + 5);
    }
    return chip;
  }

  /** 锦囊图标横排在头像两侧，过多时最多两排 */
  function splitChipRows(entries, maxW, size, gap, maxRows = 2) {
    if (!entries.length) return [];
    const oneRowW = entries.length * size + (entries.length - 1) * gap;
    if (oneRowW <= maxW || entries.length <= 1) return [entries];
    const perRow = Math.ceil(entries.length / maxRows);
    const rows = [];
    for (let i = 0; i < entries.length; i += perRow) {
      rows.push(entries.slice(i, i + perRow));
    }
    return rows.slice(0, maxRows);
  }

  function drawBuffChipsBesideHero(runBuffs, heroCX, heroCY, heroScale, worldX = 0, worldY = 0, arenaW = 0) {
    const entries = getUniqueBuffEntries(runBuffs);
    if (!entries.length) return [];
    const size = layout.compact ? 20 : 22;
    const hGap = 3;
    const vGap = 3;
    const sideGap = 5;
    const heroHalfW = 28 * heroScale;
    const margin = 4;
    const mid = Math.ceil(entries.length / 2);
    const leftEntries = entries.slice(0, mid);
    const rightEntries = entries.slice(mid);
    const chips = [];
    const leftMaxW = Math.max(size, heroCX - heroHalfW - sideGap - margin);
    const rightMaxW = Math.max(size, (arenaW || heroCX * 2) - heroCX - heroHalfW - sideGap - margin);

    const drawSide = (list, side, maxW) => {
      if (!list.length) return;
      const rows = splitChipRows(list, maxW, size, hGap, 2);
      const totalH = rows.length * size + (rows.length - 1) * vGap;
      let y = heroCY - totalH / 2;
      rows.forEach((row) => {
        const totalW = row.length * size + (row.length - 1) * hGap;
        let x = side === 'left'
          ? heroCX - heroHalfW - sideGap - totalW
          : heroCX + heroHalfW + sideGap;
        if (arenaW > 0) {
          if (side === 'left') x = Math.max(margin, x);
          else x = Math.min(arenaW - margin - totalW, x);
        }
        row.forEach((e) => {
          chips.push(drawOneBuffChip(x, y, size, e, worldX, worldY));
          x += size + hGap;
        });
        y += size + vGap;
      });
    };
    drawSide(leftEntries, 'left', leftMaxW);
    drawSide(rightEntries, 'right', rightMaxW);
    return chips;
  }

  function drawBuffDetailOverlay() {
    if (!buffDetail || !layout) return;
    const { buff, count } = buffDetail;
    const pad = 14;
    const maxW = Math.min(layout.w - layout.pad - layout.padR - 24, 320);
    const titleFont = withMixedFont(15, 'bold');
    const bodyFont = withMixedFont(12);
    const tipFont = withMixedFont(11);
    const titleLines = wrapCanvasText(buff.name, maxW - pad * 2, titleFont);
    const descLines = wrapCanvasText(buff.desc, maxW - pad * 2, bodyFont);
    const tipLines = buff.tip ? wrapCanvasText(`效果：${buff.tip}`, maxW - pad * 2, tipFont) : [];
    const stackLine = count > 0 ? `当前等级：${count} / ${getBuffMaxStack(buff.id)}` : '';
    const stackLines = stackLine ? [stackLine] : [];
    const lineH = 17;
    const panelH = pad * 2 + 28 + titleLines.length * 18 + 8
      + descLines.length * lineH + (tipLines.length ? 8 + tipLines.length * 15 : 0)
      + (stackLines.length ? 10 + stackLines.length * 15 : 0);
    const panelW = maxW;
    const panelX = (layout.w - panelW) / 2;
    const panelY = clamp(layout.h * 0.28, layout.safe.top + 40, layout.h - panelH - layout.safe.bottom - 24);
    layout.buffDetailPanel = { x: panelX, y: panelY, w: panelW, h: panelH };

    ctx.fillStyle = 'rgba(6,4,12,0.55)';
    ctx.fillRect(0, 0, layout.w, layout.h);
    roundRect(panelX, panelY, panelW, panelH, 14, 'rgba(24,18,36,0.98)');
    ctx.strokeStyle = 'rgba(255,220,120,0.45)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(panelX + 0.5, panelY + 0.5, panelW - 1, panelH - 1);

    let y = panelY + pad + 8;
    ctx.textAlign = 'center';
    ctx.font = withEmojiFont(26);
    ctx.fillStyle = '#fff';
    ctx.fillText(buff.emoji, panelX + panelW / 2, y + 20);
    y += 34;
    ctx.font = titleFont;
    ctx.fillStyle = '#ffe9a8';
    titleLines.forEach((ln) => {
      ctx.fillText(ln, panelX + panelW / 2, y);
      y += 18;
    });
    y += 6;
    ctx.font = bodyFont;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    descLines.forEach((ln) => {
      ctx.fillText(ln, panelX + panelW / 2, y);
      y += lineH;
    });
    if (tipLines.length) {
      y += 6;
      ctx.font = tipFont;
      ctx.fillStyle = '#b8e8ff';
      tipLines.forEach((ln) => {
        ctx.fillText(ln, panelX + panelW / 2, y);
        y += 15;
      });
    }
    if (stackLines.length) {
      y += 4;
      ctx.font = withMixedFont(11, 'bold');
      ctx.fillStyle = '#ffcc88';
      stackLines.forEach((ln) => {
        ctx.fillText(ln, panelX + panelW / 2, y);
        y += 15;
      });
    }
    ctx.font = withMixedFont(10);

      const boss = bossForLevel(lv);
      const baseHp = 220 + tier * 165 + tier * tier * 14;
      const hp = Math.floor(baseHp * (1 + sub * 0.065) * bossHpLevelMul(lv));
      const reduction = Math.min(0.40, tier * 0.016 + sub * 0.011 + Math.floor(tier / 4) * 0.008);
      const counter = 7 + tier * 2 + Math.floor(sub / 2) + Math.floor(tier / 3);
      const base = {
        boss,
        hp,
        reduction,
        counter,
        boardShape: boardShapeForLevel(lv)
      };
      assignBossLevelStats(base, boss, tier, sub);
      levels.push(base);
    }
    return levels;

    const rows = BOARD_SHAPE_ROWS[shapeId] || BOARD_SHAPE_ROWS.full;
    return rows.map((line) => line.split('').map((ch) => ch === '1'));
  }

  function cellActive(r, c, mask = state?.boardMask) {
    if (!inBounds(r, c)) return false;
    if (!mask) return true;
    return !!mask[r][c];
  }

  function inBounds(r, c) {
    return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE;
  }

  const stage = document.getElementById('gameStage');
  const canvas = document.getElementById('gameCanvas');
  const devLevelInput = document.getElementById('devLevelInput');
  const ctx = canvas.getContext('2d');
  let layout = null;
  let state = null;
  let drag = null;
  let selected = null;
  let inputLocked = false;
  let devInvincible = false;
  let devTargetLevel = 1;

  const LEVEL_SELECT_COLS = 5;
  let lastFrame = 0;
  let animTime = 0;
  let lastScreen = { w: 0, h: 0, scale: 0 };
  let resizeTimer = null;
  let viewportRaf = 0;

  const fx = {
    swap: null,
    clearing: [],
    falls: [],
    beams: [],
    popups: [],
    projectiles: [],
    particles: [],
    bossShake: 0,

    bossHit: 0,

    displayBossHp: 320,
    displayPlayerHp: PLAYER_MAX_HP,
    displayPvpHp: [PVP_PLAYER_HP, PVP_PLAYER_HP],
    bossHpFlash: 0,
    playerHpFlash: 0
  };

  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
  const easeOutBack = (t) => {
    const c = 1.70158;
    return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
  };
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  const audio = {
    ctx: null,
    master: null,
    bgmGain: null,
    sfxGain: null,
    bgmTimer: null,
    bgmStep: 0,
    unlocked: false,
    panelOpen: false,
    dragVolume: false,
    bgmNeedsRestart: false,
    settings: { musicOn: true, sfxOn: true, volume: 0.65 }
  };

  const BGM_CHORDS = [
    [261.63, 329.63, 392.00],
    [196.00, 246.94, 293.66],
    [220.00, 261.63, 329.63],
    [174.61, 220.00, 261.63]
  ];
  const BGM_NOTES = [523.25, 587.33, 659.25, 783.99, 880.00, 987.77, 1046.50];
  const BGM_MELODY_PATTERN = [
    0, 2, 4, 4, 2, 0, 2, 4, 5, 4, 2, 0, 2, 4, 5, 6,
    4, 5, 4, 2, 0, 2, 4, 2, 0, -1, 2, 4, 5, 4, 2, 0,
    2, 4, 5, 4, 2, 0, -1, 2, 4, 6, 5, 4, 2, 0, 2, 4
  ];

  function loadAudioSettings() {
    try {
      const raw = localStorage.getItem(AUDIO_KEY);
      if (raw) Object.assign(audio.settings, JSON.parse(raw));
      audio.settings.volume = clamp(audio.settings.volume, 0, 1);
    } catch (_) {}
  }

  function saveAudioSettings() {
    try { localStorage.setItem(AUDIO_KEY, JSON.stringify(audio.settings)); } catch (_) {}
  }

  function ensureAudio() {
    if (audio.ctx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audio.ctx = new Ctx();
    audio.master = audio.ctx.createGain();
    audio.bgmGain = audio.ctx.createGain();
    audio.sfxGain = audio.ctx.createGain();
    audio.bgmGain.connect(audio.master);
    audio.sfxGain.connect(audio.master);
    audio.master.connect(audio.ctx.destination);
    applyAudioVolumes();
  }

  function applyAudioVolumes() {
    const v = audio.settings.volume;
    if (audio.master) audio.master.gain.value = v;
    if (audio.bgmGain) audio.bgmGain.gain.value = audio.settings.musicOn ? 0.32 : 0;
    if (audio.sfxGain) audio.sfxGain.gain.value = audio.settings.sfxOn ? 0.78 : 0;
  }

  function stopBgm() {
    if (audio.bgmTimer) clearInterval(audio.bgmTimer);
    audio.bgmTimer = null;
    audio.bgmStep = 0;
  }

  function playToneAt(t, freq, type, dur, peak, dest, detune = 0) {
    if (!audio.ctx || !dest || peak <= 0 || audio.ctx.state !== 'running') return;
    const osc = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.value = Math.max(40, freq);
    osc.detune.value = detune;
    const end = t + Math.max(0.05, dur);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(peak, t + 0.02);
    g.gain.linearRampToValueAtTime(0.001, end);
    osc.connect(g);
    g.connect(dest);
    osc.start(t);
    osc.stop(end + 0.05);
  }

  function playNoiseAt(t, dur, peak, dest, freq = 9000) {
    if (!audio.ctx || !dest) return;
    const len = Math.max(1, Math.floor(audio.ctx.sampleRate * dur));
    const buf = audio.ctx.createBuffer(1, len, audio.ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    const src = audio.ctx.createBufferSource();
    src.buffer = buf;
    const g = audio.ctx.createGain();
    const f = audio.ctx.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.value = freq;
    g.gain.setValueAtTime(peak, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f);
    f.connect(g);
    g.connect(dest);
    src.start(t);
    src.stop(t + dur + 0.02);
  }

  function playPadChord(t, freqs, dur, peak, dest) {
    freqs.forEach((f, i) => {
      const osc = audio.ctx.createOscillator();
      const g = audio.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      const st = t + i * 0.02;
      g.gain.setValueAtTime(0.0001, st);
      g.gain.linearRampToValueAtTime(peak * (1 - i * 0.12), st + 0.35);
      g.gain.linearRampToValueAtTime(0.0001, st + dur);
      osc.connect(g);
      g.connect(dest);
      osc.start(st);
      osc.stop(st + dur + 0.05);
    });
  }

  function playFilterSweep(t, dest, f0, f1, dur, peak, q = 7) {
    if (!audio.ctx || !dest) return;
    const len = Math.max(1, Math.floor(audio.ctx.sampleRate * dur));
    const buf = audio.ctx.createBuffer(1, len, audio.ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    const src = audio.ctx.createBufferSource();
    src.buffer = buf;
    const bp = audio.ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = q;
    bp.frequency.setValueAtTime(f0, t);
    bp.frequency.exponentialRampToValueAtTime(Math.max(60, f1), t + dur);
    const g = audio.ctx.createGain();
    g.gain.setValueAtTime(peak, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(bp);
    bp.connect(g);
    g.connect(dest);
    src.start(t);
    src.stop(t + dur + 0.03);
  }

  function playSabreSwipe(t, dest, intensity = 1, offset = 0) {
    const st = t + offset;
    playFilterSweep(st, dest, 6200 * intensity, 280, 0.055 + intensity * 0.02, 0.11 * intensity, 9);
    playToneAt(st, 1400 * intensity, 'sine', 0.04, 0.035 * intensity, dest);
    playToneAt(st + 0.018, 900, 'triangle', 0.03, 0.02 * intensity, dest);
  }

  function playMatchPop(t, dest, pitch = 1, offset = 0) {
    const st = t + offset;
    const f0 = 523 * pitch;
    playToneAt(st, f0, 'sine', 0.08, 0.1 * pitch, dest);
    playToneAt(st + 0.02, f0 * 1.26, 'triangle', 0.06, 0.075 * pitch, dest);
    playToneAt(st + 0.035, f0 * 1.5, 'sine', 0.05, 0.055 * pitch, dest);
    playNoiseAt(st, 0.022, 0.02 * pitch, dest, 7500);
  }

  function playAttackImpact(t, dest, heavy = false) {
    playToneAt(t, heavy ? 55 : 75, 'sine', 0.18, heavy ? 0.14 : 0.11, dest);
    playNoiseAt(t, 0.04, heavy ? 0.1 : 0.07, dest, 400);
    playToneAt(t + 0.025, heavy ? 120 : 160, 'square', 0.06, heavy ? 0.07 : 0.05, dest);
    playFilterSweep(t + 0.01, dest, 800, 120, 0.08, heavy ? 0.06 : 0.045, 4);
  }

  function playMagicWhoosh(t, dest) {
    playFilterSweep(t, dest, 200, 1800, 0.28, 0.07, 3);
    playToneAt(t + 0.05, 110, 'sine', 0.35, 0.05, dest);
    playNoiseAt(t + 0.1, 0.15, 0.04, dest, 1200);
  }

  function scheduleBgmBeat(step) {
    if (!audio.ctx || !audio.settings.musicOn) return;
    const t = audio.ctx.currentTime + 0.05;
    const beat = step % 8;
    const bar = Math.floor(step / 8) % BGM_CHORDS.length;
    const chord = BGM_CHORDS[bar];
    const melIdx = BGM_MELODY_PATTERN[step % BGM_MELODY_PATTERN.length];

    if (beat === 0) {
      playPadChord(t, chord, 2.4, 0.02, audio.bgmGain);
    }
    if (beat === 0 || beat === 4) {
      playToneAt(t, chord[0] * 0.5, 'triangle', 0.28, 0.038, audio.bgmGain);
    }
    if (beat === 2 || beat === 6) {
      chord.forEach((f, i) => playToneAt(t + i * 0.035, f * 2, 'sine', 0.1, 0.014, audio.bgmGain));
    }
    if (melIdx >= 0) {
      const accent = beat % 4 === 0 ? 0.042 : 0.032;
      playToneAt(t, BGM_NOTES[melIdx], 'triangle', 0.2, accent, audio.bgmGain, bar * 3);
    }
  }

  function startBgm() {
    stopBgm();
    if (!audio.ctx || audio.ctx.state !== 'running' || !audio.settings.musicOn) return;
    scheduleBgmBeat(0);
    audio.bgmTimer = setInterval(() => {
      if (!audio.ctx || audio.ctx.state !== 'running') return;
      audio.bgmStep += 1;
      scheduleBgmBeat(audio.bgmStep);
    }, 360);
  }

  async function initAudio() {
    try {
      if (!audio.ctx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return false;
        audio.ctx = new Ctx();
        audio.master = audio.ctx.createGain();
        audio.bgmGain = audio.ctx.createGain();
        audio.sfxGain = audio.ctx.createGain();
        audio.bgmGain.connect(audio.master);
        audio.sfxGain.connect(audio.master);
        audio.master.connect(audio.ctx.destination);
      }
      if (audio.ctx.state === 'suspended') await audio.ctx.resume();
      applyAudioVolumes();
      return audio.ctx.state === 'running';
    } catch (_) {
      return false;
    }
  }

  function syncAudio(forceBgm = false) {
    initAudio().then((ok) => {
      if (!ok) return;
      audio.unlocked = true;
      if (!audio.settings.musicOn) {
        stopBgm();
        return;
      }
      if (forceBgm || !audio.bgmTimer || audio.bgmNeedsRestart) {
        audio.bgmNeedsRestart = false;
        startBgm();
      }
    });
  }

  function unlockAudio() {
    syncAudio(true);
  }

  function resumeAudioIfNeeded(forceRestart = false) {
    if (forceRestart) audio.bgmNeedsRestart = true;
    syncAudio(forceRestart || audio.bgmNeedsRestart);
  }

  function ensureBgmPlaying() {
    syncAudio(true);
  }

  let audioWatchAt = 0;
  function tickAudio(now) {
    if (!audio.settings.musicOn) return;
    if (now - audioWatchAt < 1200) return;
    audioWatchAt = now;
    if (!audio.unlocked) return;
    if (!audio.ctx || audio.ctx.state !== 'running' || !audio.bgmTimer) {
      audio.bgmNeedsRestart = true;
      syncAudio(true);
    }
  }

  function playSfx(kind, opts = {}) {
    if (!audio.settings.sfxOn) return;
    initAudio().then((ok) => {
      if (!ok || !audio.ctx || audio.ctx.state !== 'running') return;
      audio.unlocked = true;
      applyAudioVolumes();
      if (audio.settings.musicOn && (!audio.bgmTimer || audio.bgmNeedsRestart)) {
        audio.bgmNeedsRestart = false;
        startBgm();
      }
      const t = audio.ctx.currentTime;
      const dest = audio.sfxGain;
    const chain = opts.chain || 2;
    const count = opts.count || 3;
    switch (kind) {
      case 'click':
        playToneAt(t, 720, 'sine', 0.04, 0.05, dest);
        break;
      case 'swap':
        playFilterSweep(t, dest, 1800, 600, 0.05, 0.035, 5);
        break;
      case 'match':
        playMatchPop(t, dest, 1, 0);
        break;
      case 'clear': {
        const pops = clamp(Math.ceil(count / 2), 1, 4);
        for (let i = 0; i < pops; i++) playMatchPop(t, dest, 0.95 + count * 0.03, i * 0.04);
        break;
      }
      case 'combo': {
        const n = clamp(chain, 2, 6);
        for (let i = 0; i < Math.min(n, 5); i++) playMatchPop(t, dest, 1 + chain * 0.05, i * 0.035);
        break;
      }
      case 'bossHit':
        playAttackImpact(t, dest, !!opts.big);
        break;
      case 'hit':
        playAttackImpact(t, dest, !!opts.big);
        break;
      case 'trueHit':
        playFilterSweep(t, dest, 3000, 200, 0.14, 0.1, 8);
        playToneAt(t + 0.03, 180, 'sawtooth', 0.15, 0.09, dest);
        playNoiseAt(t, 0.08, 0.06, dest, 2000);
        break;
      case 'block':
        playToneAt(t, 520, 'sine', 0.08, 0.07, dest);
        playToneAt(t + 0.04, 780, 'triangle', 0.1, 0.05, dest);
        break;
      case 'bossCast':
        playMagicWhoosh(t, dest);
        break;
      case 'shield':
        [660, 880, 1100].forEach((f, i) => playToneAt(t + i * 0.05, f, 'sine', 0.14, 0.05 - i * 0.01, dest));
        break;
      case 'heal':
        [392, 494, 587, 698].forEach((f, i) => playToneAt(t + i * 0.07, f, 'sine', 0.16, 0.055, dest));
        break;
      case 'buff':
        [440, 554, 659, 880].forEach((f, i) => playToneAt(t + i * 0.09, f, 'triangle', 0.14, 0.05, dest));
        break;
      case 'win':
        [392, 494, 587, 784, 988].forEach((f, i) => playToneAt(t + i * 0.11, f, 'sine', 0.28, 0.08 - i * 0.008, dest));
        break;
      case 'lose':
        playToneAt(t, 196, 'triangle', 0.4, 0.07, dest);
        playToneAt(t + 0.2, 147, 'sine', 0.5, 0.05, dest);
        break;
      case 'special':
        playSabreSwipe(t, dest, 1.3, 0);
        playSabreSwipe(t, dest, 1.1, 0.045);
        playMagicWhoosh(t + 0.05, dest);
        break;
      default:
        playToneAt(t, 400, 'sine', 0.08, 0.06, dest);
    }
    });
  }

  function getAudioMiniBtnRect() {
    if (!layout) return null;
    if (layout.audioBtn) return { ...layout.audioBtn };
    const safe = layout.safe;
    return {
      x: layout.w - layout.padR - 38,
      y: layout.h - safe.bottom - 88,
      w: 36,
      h: 36
    };
  }

  function getAudioPanelLayout() {
    if (!layout) return null;
    const miniBtn = getAudioMiniBtnRect();
    const w = Math.min(268, layout.w - layout.pad - layout.padR);
    const h = 112;
    const x = clamp(miniBtn.x + miniBtn.w - w, layout.pad, layout.w - layout.padR - w);
    const y = miniBtn.y - h - 8;
    const rowH = 28;
    const btnW = Math.floor((w - 36) / 2);
    const sliderX = x + 16;
    const sliderW = w - 32;
    return {
      x, y, w, h,
      miniBtn,
      closeBtn: { x: x + w - 30, y: y + 8, w: 22, h: 22 },
      musicBtn: { x: x + 16, y: y + 38, w: btnW, h: rowH },
      sfxBtn: { x: x + 16 + btnW + 4, y: y + 38, w: btnW, h: rowH },
      slider: { x: sliderX, y: y + 78, w: sliderW, h: 12 },
      sliderKnob(wVal) {
        const kx = sliderX + sliderW * clamp(wVal, 0, 1) - 8;
        return { x: kx, y: y + 74, w: 16, h: 20 };
      }
    };
  }

  function setAudioVolumeFromX(px) {
    const ui = getAudioPanelLayout();
    if (!ui) return;
    audio.settings.volume = clamp((px - ui.slider.x) / ui.slider.w, 0, 1);
    applyAudioVolumes();
    saveAudioSettings();
  }

  function drawAudioPanel() {
    if (!layout) return;
    const mini = getAudioMiniBtnRect();
    if (!mini) return;
    layout.audioPanel = audio.panelOpen ? getAudioPanelLayout() : { miniBtn: mini };

    // 迷你音量按钮
    const miniGrad = ctx.createLinearGradient(mini.x, mini.y, mini.x, mini.y + mini.h);
    miniGrad.addColorStop(0, 'rgba(72,58,110,0.95)');
    miniGrad.addColorStop(1, 'rgba(38,28,58,0.95)');
    roundRect(mini.x, mini.y, mini.w, mini.h, 9, miniGrad);
    ctx.strokeStyle = audio.panelOpen ? 'rgba(255,210,100,0.75)' : 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = withEmojiFont(15);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const muted = !audio.settings.musicOn && !audio.settings.sfxOn;
    ctx.fillText(muted ? '🔇' : '🔊', mini.x + mini.w / 2, mini.y + mini.h / 2);
    ctx.textBaseline = 'alphabetic';
    if (!audio.panelOpen) return;

    const ui = layout.audioPanel;
    const panelGrad = ctx.createLinearGradient(ui.x, ui.y, ui.x, ui.y + ui.h);
    panelGrad.addColorStop(0, 'rgba(48,36,78,0.98)');
    panelGrad.addColorStop(0.55, 'rgba(28,22,48,0.98)');
    panelGrad.addColorStop(1, 'rgba(18,14,32,0.98)');
    roundRect(ui.x, ui.y, ui.w, ui.h, 14, panelGrad);
    ctx.strokeStyle = 'rgba(180,140,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 标题栏
    ctx.fillStyle = 'rgba(255,245,220,0.92)';
    ctx.font = withMixedFont(12, 'bold');
    ctx.textAlign = 'left';
    ctx.fillText('🎧  音频', ui.x + 14, ui.y + 22);
    const close = ui.closeBtn;
    roundRect(close.x, close.y, close.w, close.h, 6, 'rgba(255,255,255,0.08)');
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = withMixedFont(14);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('×', close.x + close.w / 2, close.y + close.h / 2);
    ctx.textBaseline = 'alphabetic';

    const drawToggle = (rect, icon, label, on) => {
      const tg = ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.h);
      if (on) {
        tg.addColorStop(0, 'rgba(110,160,255,0.55)');
        tg.addColorStop(1, 'rgba(72,110,220,0.45)');
      } else {
        tg.addColorStop(0, 'rgba(55,48,75,0.85)');
        tg.addColorStop(1, 'rgba(38,32,55,0.9)');
      }
      roundRect(rect.x, rect.y, rect.w, rect.h, 8, tg);
      ctx.strokeStyle = on ? 'rgba(180,210,255,0.5)' : 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = on ? '#fff' : 'rgba(255,255,255,0.5)';
      ctx.font = withEmojiFont(11);
      ctx.textAlign = 'left';
      ctx.fillText(icon, rect.x + 8, rect.y + rect.h / 2 + 4);
      ctx.font = withMixedFont(10, on ? 'bold' : 'normal');
      ctx.fillText(label, rect.x + 26, rect.y + rect.h / 2 + 4);
      ctx.textAlign = 'right';
      ctx.font = withMixedFont(9);
      ctx.fillStyle = on ? 'rgba(200,255,200,0.9)' : 'rgba(255,180,180,0.7)';
      ctx.fillText(on ? 'ON' : 'OFF', rect.x + rect.w - 8, rect.y + rect.h / 2 + 4);
    };
    drawToggle(ui.musicBtn, '🎵', '背景音乐', audio.settings.musicOn);
    drawToggle(ui.sfxBtn, '⚔️', '战斗音效', audio.settings.sfxOn);

    // 音量滑条
    const s = ui.slider;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = withMixedFont(9);
    ctx.textAlign = 'left';
    ctx.fillText('主音量', s.x, s.y - 6);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,230,150,0.9)';
    ctx.font = withMixedFont(9, 'bold');
    ctx.fillText(`${Math.round(audio.settings.volume * 100)}%`, s.x + s.w, s.y - 6);
    roundRect(s.x, s.y, s.w, s.h, 6, 'rgba(0,0,0,0.4)');
    const fillW = Math.max(4, s.w * audio.settings.volume);
    const fillGrad = ctx.createLinearGradient(s.x, s.y, s.x + fillW, s.y);
    fillGrad.addColorStop(0, 'rgba(140,100,255,0.85)');
    fillGrad.addColorStop(1, 'rgba(255,200,120,0.9)');
    roundRect(s.x, s.y, fillW, s.h, 6, fillGrad);
    const knob = ui.sliderKnob(audio.settings.volume);
    roundRect(knob.x, knob.y, knob.w, knob.h, 8, '#fff8e8');
    ctx.strokeStyle = 'rgba(180,140,80,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function hitAudioPanel(p) {
    const mini = getAudioMiniBtnRect();
    if (!mini) return false;
    const hit = (r) => r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
    if (hit(mini)) {
      audio.panelOpen = !audio.panelOpen;
      playSfx('click');
      return true;
    }
    if (!audio.panelOpen) return false;
    const ui = getAudioPanelLayout();
    if (!hit({ x: ui.x, y: ui.y, w: ui.w, h: ui.h })) {
      audio.panelOpen = false;
      return false;
    }
    if (hit(ui.closeBtn)) {
      audio.panelOpen = false;
      playSfx('click');
      return true;
    }
    if (hit(ui.musicBtn)) {
      audio.settings.musicOn = !audio.settings.musicOn;
      applyAudioVolumes();
      if (audio.settings.musicOn) ensureBgmPlaying(); else stopBgm();
      saveAudioSettings();
      playSfx('click');
      return true;
    }
    if (hit(ui.sfxBtn)) {
      audio.settings.sfxOn = !audio.settings.sfxOn;
      applyAudioVolumes();
      saveAudioSettings();
      playSfx('click');
      return true;
    }
    if (hit(ui.slider) || hit(ui.sliderKnob(audio.settings.volume))) {
      setAudioVolumeFromX(p.x);
      audio.dragVolume = true;
      return true;
    }
    return true;
  }

  function drawGameLogo(cx, cy, size) {
    ctx.save();
    ctx.translate(cx, cy);
    const r = size / 2;
    const g = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r);
    g.addColorStop(0, 'rgba(140,110,255,0.55)');
    g.addColorStop(1, 'rgba(30,20,50,0.9)');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,230,150,0.55)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    const gems = [
      { x: 0, y: -r * 0.22, c: '#ff6a6a', s: r * 0.28 },
      { x: -r * 0.34, y: r * 0.2, c: '#5ad4ff', s: r * 0.24 },
      { x: r * 0.34, y: r * 0.2, c: '#ffe566', s: r * 0.24 }
    ];
    gems.forEach((gem) => {
      ctx.beginPath();
      ctx.arc(gem.x, gem.y, gem.s, 0, Math.PI * 2);
      ctx.fillStyle = gem.c;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(r * 0.42)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('消', 0, 1);
    ctx.restore();
  }

  function boardToSave(board) {
    return board.map((row) => row.map((t) => (t ? { type: t.type, special: t.special || null, hazard: t.hazard || null } : null)));
  }

  function boardFromSave(rows) {
    return rows.map((row) => row.map((cell) => (cell ? createTile(cell.type, cell.special, cell.hazard) : null)));
  }

  function clearLegacySaves() {
    LEGACY_SAVE_KEYS.forEach((key) => {
      try {
        localStorage.removeItem(key);
      } catch (_) {}
    });
  }

  function loadDevSettings() {
    try {
      const raw = localStorage.getItem(DEV_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      devInvincible = !!d.invincible;
    } catch (_) {}
  }

  function saveDevSettings() {
    try {
      localStorage.setItem(DEV_KEY, JSON.stringify({ invincible: devInvincible }));
    } catch (_) {}
  }

  function isDevInvincible() {
    return devInvincible && !isPvp() && state?.mode === 'campaign';
  }

  function canUseDevMenu() {
    return state?.mode === 'campaign' && !state.showModeSelect && !state.showLevelSelect;
  }

  function canRegisterDevGesture() {
    return canUseDevMenu() && state.status === 'playing'
      && !state.showTutorial && !state.showDevMenu && !state.buffPicker;
  }

  function hitBossArena(p) {
    if (!layout || !state || isPvp()) return false;
    const box = layout.boss;
    const pad = 8;
    return p.x >= box.x - pad && p.x <= box.x + box.w + pad
      && p.y >= box.y - pad && p.y <= box.y + box.h + pad;
  }

  function hitPlayerArena(p) {
    if (!layout || !state || isPvp()) return false;
    if (hitShuffleCardBtn(p)) return false;
    const box = layout.player;
    const pad = 8;
    return p.x >= box.x - pad && p.x <= box.x + box.w + pad
      && p.y >= box.y - pad && p.y <= box.y + box.h + pad;
  }

  function registerDevGestureTap() {
    const now = Date.now();
    if (now - devGestureLastTap > 3000) devGestureTapCount = 0;
    devGestureLastTap = now;
    devGestureTapCount += 1;
    if (devGestureTapCount >= 5) {
      devGestureTapCount = 0;
      openDevMenu();
      return true;
    }
    return false;
  }

  function openDevMenu() {
    if (!canUseDevMenu()) return;
    devTargetLevel = state.level || 1;
    state.showDevMenu = true;
    inputLocked = false;
    selected = null;
    drag = null;
    syncDevLevelInput();
  }

  function closeDevMenu() {
    if (state) state.showDevMenu = false;
    if (devLevelInput) {
      devLevelInput.blur();
      devLevelInput.style.display = 'none';
    }
  }

  function readDevLevelInput() {
    if (!devLevelInput) return;
    const raw = devLevelInput.value.trim();
    if (raw === '') return;
    const n = parseInt(raw, 10);
    if (Number.isFinite(n)) devTargetLevel = clamp(n, 1, MAX_LEVEL);
    if (document.activeElement !== devLevelInput) {
      devLevelInput.value = String(devTargetLevel);
    }
  }

  function syncDevLevelInput() {
    if (!devLevelInput) return;
    if (!state?.showDevMenu || !layout) {
      devLevelInput.style.display = 'none';
      return;
    }
    const ui = getDevMenuLayout();
    if (!ui) return;
    const r = ui.levelLabel;
    devLevelInput.style.display = 'block';
    devLevelInput.style.left = r.x + 'px';
    devLevelInput.style.top = r.y + 'px';
    devLevelInput.style.width = r.w + 'px';
    devLevelInput.style.height = r.h + 'px';
    if (document.activeElement !== devLevelInput) {
      devLevelInput.value = String(devTargetLevel);
    }
  }

  function loadProgress() {
    try {
      const raw = localStorage.getItem(PROGRESS_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (!p.stars || typeof p.stars !== 'object') p.stars = {};
        return sanitizeProgress(p);
      }
    } catch (_) {}
    return { maxCleared: 0, stars: {} };
  }

  /** 修正历史存档里「当前关卡推进」误标为已通关的问题 */
  function sanitizeProgress(p) {
    const stars = p.stars || {};
    let maxFromStars = 0;
    for (const k of Object.keys(stars)) {
      const lv = parseInt(k, 10);
      if (lv >= 1 && lv <= MAX_LEVEL) maxFromStars = Math.max(maxFromStars, lv);
    }
    const mc = p.maxCleared || 0;
    if (maxFromStars > mc) {
      p.maxCleared = maxFromStars;
    } else if (maxFromStars > 0 && mc > maxFromStars) {
      const starCount = Object.keys(stars).length;
      if (starCount < mc) p.maxCleared = maxFromStars;
    }
    return p;
  }

  function isLevelUnlocked(level) {
    const lv = clamp(Math.floor(level), 1, MAX_LEVEL);
    return lv <= getMaxSelectableLevel();
  }

  function levelBaseAction(level) {
    return Math.min(MAX_PLAYER_ACTION, 16 + Math.floor((level - 1) * 0.5));
  }

  function getBossTrueDamageChance() {
    if (!state || isPvp()) return 0;
    const seg = Math.floor((state.level - 1) / BOSS_SEGMENT);
    return clamp(BOSS_TRUE_DAMAGE_BASE + seg * 0.02 + (state.level - 1) * 0.0015, 0, 0.38);
  }

  function getBossDodgeChance() {
    if (!state || isPvp()) return 0;
    const seg = Math.floor((state.level - 1) / BOSS_SEGMENT);
    let c = clamp(BOSS_DODGE_BASE + seg * 0.015 + (state.level - 1) * 0.001, 0, 0.28);
    if (state.bossDodgeStrip) c = Math.max(0, c - state.bossDodgeStrip);
    return c;
  }

  function getBuffShieldCarryover(src = state) {
    if (!src) return { pendingTurnShield: 0 };
    return { pendingTurnShield: src.pendingTurnShield || 0 };
  }

  function applyBufferedTurnShield(s) {
    if (!s?.pendingTurnShield) return;
    const amt = s.pendingTurnShield;
    s.shield = Math.min(40, s.shield + amt);
    s.activeTurnShield = amt;
    s.pendingTurnShield = 0;
  }

  function expireBuffTurnShield() {
    if (!state?.activeTurnShield) return;
    const strip = Math.min(state.shield, state.activeTurnShield);
    state.shield -= strip;
    state.activeTurnShield = 0;
  }

  function resolveStartAction(state) {
    if (state?.startAction > 0) return state.startAction;
    const mods = state?.mods || computeModsFromBuffs(state?.runBuffs || []);
    return Math.min(state?.maxAction || MAX_PLAYER_ACTION, levelBaseAction(state?.level || 1) + (mods.startAction || 0));
  }

  function calcLevelStars(hp, maxHp, action, startAction) {
    const hr = maxHp > 0 ? hp / maxHp : 0;
    const base = Math.max(1, startAction || 1);
    const ar = Math.min(1, action / base);
    if (hr >= 0.30 && ar >= 0.30) return 3;
    if (hr >= 0.15 && ar >= 0.15) return 2;
    return 1;
  }

  function recordLevelResult(level, stars) {
    const cleared = clamp(Math.floor(level), 1, MAX_LEVEL);
    const star = clamp(Math.floor(stars), 1, 3);
    const p = loadProgress();
    if (!p.stars || typeof p.stars !== 'object') p.stars = {};
    const key = String(cleared);
    const prev = p.stars[key] || 0;
    if (star > prev) p.stars[key] = star;
    if (cleared > (p.maxCleared || 0)) p.maxCleared = cleared;
    saveProgress(p);
  }

  function getLevelStars(level) {
    const lv = clamp(Math.floor(level), 1, MAX_LEVEL);
    if (!isLevelUnlocked(lv)) return 0;
    const stored = loadProgress().stars?.[String(lv)];
    return stored ? clamp(stored, 1, 3) : 0;
  }

  function getTotalStars() {
    const maxC = getMaxClearedLevel();
    let total = 0;
    for (let lv = 1; lv <= maxC; lv++) total += getLevelStars(lv);
    return total;
  }

  function onLevelVictory() {
    playSfx('win');
    const startAction = resolveStartAction(state);
    const stars = calcLevelStars(state.hp, state.maxHp, state.action, startAction);
    recordLevelResult(state.level, stars);
    state.winStars = stars;
  }

  function drawStarRating(cx, cy, filled, total = 3, fontPx = 9, fancy = false) {
    const gap = fontPx * (fancy ? 1.15 : 0.95);
    const x0 = cx - ((total - 1) * gap) / 2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${fontPx}px sans-serif`;
    for (let i = 0; i < total; i++) {
      const on = i < filled;
      if (fancy && on) {
        ctx.shadowColor = '#ffd54f';
        ctx.shadowBlur = fontPx * 0.9;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.fillStyle = on ? '#ffd54f' : 'rgba(255,255,255,0.22)';
      ctx.fillText(on ? '★' : '☆', x0 + i * gap, cy);
    }
    ctx.shadowBlur = 0;
    ctx.textBaseline = 'alphabetic';
  }

  function starResultLabel(stars) {
    if (stars >= 3) return '完美通关';
    if (stars >= 2) return '出色表现';
    return '险胜过关';
  }

  function getStarRewardDesc(stars) {
    if (stars >= 3) return '下关开局 +1 行动力';
    if (stars >= 2) return '下关开局 +5 护盾';
    return '下关无额外嘉奖';
  }

  function applyPrevStarBonus(s, stars) {
    if (!s || isPvp() || !stars) return;
    if (stars >= 3) {
      s.action = Math.min(s.maxAction, s.action + 1);
      if (layout) spawnPopup(layout.w / 2, layout.h * 0.3, '三星嘉奖 · +1 行动', '#ffd54f', 15, true);
    } else if (stars >= 2) {
      s.shield = Math.min(40, (s.shield || 0) + 5);
      if (layout) spawnPopup(layout.w / 2, layout.h * 0.3, '双星嘉奖 · +5 护盾', '#b8d4ff', 15, true);
    }
  }

  /** 连锁/大消除称号与小奖励 */
  function resolveComboMoment(chain, matches) {
    if (isPvp() || !layout || !state) return;
    const maxCells = matches.reduce((m, x) => Math.max(m, x.cells?.length || 0), 0);
    let entry = null;
    if (chain >= 6) entry = { title: '天地惊变！', sub: '+3 护盾', color: '#ff8899', reward: 'shield3', big: true };
    else if (chain >= 5) entry = { title: '惊天动地！', sub: '下击必中', color: '#ffb088', reward: 'antiDodge', big: true };
    else if (chain >= 4) entry = { title: '狂风骤雨！', sub: '下击伤害 +8%', color: '#ffe9a8', reward: 'dmg8', big: true };
    else if (chain >= 3) entry = { title: '势如破竹！', sub: '下击伤害 +5%', color: '#b8ffd0', reward: 'dmg5', big: false };
    else if (chain >= 2) entry = { title: '连击！', sub: '', color: '#ffffff', reward: null, big: false };
    else if (maxCells >= 7) entry = { title: '满堂红！', sub: '下击伤害 +5%', color: '#ffd54f', reward: 'dmg5', big: true };
    else if (maxCells >= 5) entry = { title: '大快朵颐！', sub: '', color: '#c8e8ff', reward: null, big: false };
    if (!entry) return;
    const y = layout.h * (entry.big ? 0.32 : 0.36);
    spawnPopup(layout.w / 2, y, entry.title, entry.color, entry.big ? 20 : 16, entry.big);
    if (entry.sub) spawnPopup(layout.w / 2, y + 24, entry.sub, 'rgba(255,255,255,0.88)', 12);
    applyComboReward(entry.reward);
  }

  function applyComboReward(reward) {
    if (!reward || !state) return;
    if (reward === 'dmg5') state.nextDamageBonus = (state.nextDamageBonus || 0) + 0.05;
    if (reward === 'dmg8') state.nextDamageBonus = (state.nextDamageBonus || 0) + 0.08;
    if (reward === 'shield3') state.shield = Math.min(40, (state.shield || 0) + 3);
    if (reward === 'antiDodge') state.bossDodgeStrip = 0.15;
  }

  function clearComboCarry() {
    if (!state) return;
    state.nextDamageBonus = 0;
    state.bossDodgeStrip = 0;
  }

  function getLevelSelectPageCount() {
    return Math.ceil(MAX_LEVEL / LEVEL_SELECT_PAGE_SIZE);
  }

  function openStarResult() {
    state.showStarResult = true;
    state.canAdvance = false;
    inputLocked = false;
    drag = null;
    selected = null;
    saveGame();
  }

  function dismissStarResult() {
    if (!state?.showStarResult) return;
    state.showStarResult = false;
    openBuffPicker();
  }

  function getStarResultLayout() {
    if (!layout) return null;
    const cardW = Math.min(320, layout.w - 40);
    const cardH = clamp(layout.h * 0.5, 320, 400);
    const cardX = (layout.w - cardW) / 2;
    const cardY = layout.safe.top + 48;
    const btnW = Math.min(220, cardW - 48);
    const btnH = 44;
    const continueBtn = {
      x: layout.w / 2 - btnW / 2,
      y: cardY + cardH - btnH - 20,
      w: btnW,
      h: btnH
    };
    return { cardX, cardY, cardW, cardH, continueBtn };
  }

  function hitStarResultContinue(p) {
    const ui = getStarResultLayout();
    if (!ui) return false;
    const b = ui.continueBtn;
    const pad = 12;
    return p.x >= b.x - pad && p.x <= b.x + b.w + pad && p.y >= b.y - pad && p.y <= b.y + b.h + pad;
  }

  function drawStarResultScreen() {
    const ui = getStarResultLayout();
    if (!ui || !state) return;
    const cx = layout.w / 2;
    const pulse = 0.92 + Math.sin(animTime / 380) * 0.08;
    ctx.fillStyle = 'rgba(8,6,16,0.88)';
    ctx.fillRect(0, 0, layout.w, layout.h);
    const glow = ctx.createRadialGradient(cx, ui.cardY + ui.cardH * 0.35, 20, cx, ui.cardY + ui.cardH * 0.4, layout.h * 0.55);
    glow.addColorStop(0, 'rgba(255,200,100,0.22)');
    glow.addColorStop(0.45, 'rgba(100,70,180,0.28)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, layout.w, layout.h);

    const cardG = ctx.createLinearGradient(ui.cardX, ui.cardY, ui.cardX, ui.cardY + ui.cardH);
    cardG.addColorStop(0, 'rgba(48,38,72,0.98)');
    cardG.addColorStop(0.5, 'rgba(32,26,48,0.98)');
    cardG.addColorStop(1, 'rgba(24,18,36,0.98)');
    roundRect(ui.cardX, ui.cardY, ui.cardW, ui.cardH, 18, cardG);
    ctx.strokeStyle = 'rgba(255,210,120,0.55)';
    ctx.lineWidth = 2;
    ctx.stroke();

    const innerX = ui.cardX + 16;
    const innerW = ui.cardW - 32;
    let y = ui.cardY + 36;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffe9a8';
    ctx.font = withMixedFont(13);
    ctx.fillText(state.level >= MAX_LEVEL ? '恭喜通关！' : '关卡胜利', cx, y);
    y += 28;
    ctx.fillStyle = '#fff';
    ctx.font = withMixedFont(26, 'bold');
    ctx.fillText(`第 ${state.level} 关`, cx, y);
    y += 36;
    const stars = state.winStars || 1;
    drawStarRating(cx, y, stars, 3, 36 * pulse, true);
    y += 38;
    ctx.fillStyle = stars >= 3 ? '#ffd54f' : stars >= 2 ? '#c8e8ff' : 'rgba(255,255,255,0.75)';
    ctx.font = withMixedFont(15, 'bold');
    ctx.fillText(starResultLabel(stars), cx, y);
    y += 22;
    ctx.fillStyle = stars >= 3 ? '#b8ffd0' : stars >= 2 ? '#c8e8ff' : 'rgba(255,255,255,0.45)';
    ctx.font = withMixedFont(12);
    ctx.fillText(`评星嘉奖：${getStarRewardDesc(stars)}`, cx, y);
    y += 24;

    const drawStatBar = (label, cur, max, color, icon) => {
      const barH = 10;
      const pct = max > 0 ? clamp(cur / max, 0, 1) : 0;
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = withMixedFont(12);
      ctx.textAlign = 'left';
      ctx.fillText(`${icon} ${label}`, innerX, y);
      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText(`${Math.round(pct * 100)}%`, innerX + innerW, y);
      y += 10;
      roundRect(innerX, y, innerW, barH, 5, 'rgba(255,255,255,0.12)');
      if (pct > 0) roundRect(innerX, y, innerW * pct, barH, 5, color);
      y += 22;
    };
    drawStatBar('剩余生命', state.hp, state.maxHp, '#5cd68a', '❤️');
    const startAction = resolveStartAction(state);
    drawStatBar('剩余行动', state.action, startAction, '#7c9cff', '⚡');
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = withMixedFont(10);
    ctx.fillText('三星：生命≥30% 且 行动≥30% · 二星：均≥15%', cx, y + 4);

    const b = ui.continueBtn;
    const btnG = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    btnG.addColorStop(0, '#8b6cff');
    btnG.addColorStop(1, '#5a3dcc');
    roundRect(b.x, b.y, b.w, b.h, 12, btnG);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = withMixedFont(15, 'bold');
    ctx.textBaseline = 'middle';
    ctx.fillText('选择锦囊 →', b.x + b.w / 2, b.y + b.h / 2);
    ctx.textBaseline = 'alphabetic';
  }

  function saveProgress(progress) {
    try {
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
    } catch (_) {}
  }

  function getMaxClearedLevel() {
    return loadProgress().maxCleared || 0;
  }

  /** 可选关上限：已通关关 + 当前进行中的关 */
  function getMaxSelectableLevel() {
    let max = getMaxClearedLevel();
    if (state?.mode === 'campaign' && state?.level) {
      max = Math.max(max, state.level);
    } else if (hasStoredSave()) {
      const snap = loadGame();
      if (snap?.mode === 'campaign' && snap.level) max = Math.max(max, snap.level);
    }
    return max;
  }

  function recordLevelCleared(level) {
    const cleared = clamp(Math.floor(level), 1, MAX_LEVEL);
    const p = loadProgress();
    if (cleared > (p.maxCleared || 0)) {
      p.maxCleared = cleared;
      saveProgress(p);
    }
  }

  function syncProgressFromSave(data) {
    if (!data || data.mode === 'pvp') return;
    if (data.status === 'win') {
      recordLevelResult(data.level, data.winStars || 1);
    }
  }

  function isValidSaveData(data) {
    if (!data || data.saveSchema !== 2 || data.build !== SAVE_BUILD) return false;
    if (data.mode === 'pvp') {
      return !!data.pvp?.players?.length && data.board?.length === BOARD_SIZE;
    }
    if (data.level < 1 || data.level > MAX_LEVEL) return false;
    if (!data.board || !Array.isArray(data.board) || data.board.length !== BOARD_SIZE) return false;
    const maxBuffs = expectedMaxBuffs(data.level, data.status, !!data.buffPicker);
    if ((data.runBuffs?.length || 0) > maxBuffs) return false;
    if (!isValidRunBuffStacks(data.runBuffs)) return false;
    for (const row of data.board) {
      if (!Array.isArray(row) || row.length !== BOARD_SIZE) return false;
      for (const cell of row) {
        if (!cell) continue;
        if (!VALID_ITEM_TYPES.has(cell.type)) return false;
      }
    }
    return true;
  }

  function expectedMaxBuffs(level, status, hasBuffPicker) {
    if (hasBuffPicker) return level;
    if (status === 'win') return level;
    return Math.max(0, level - 1);
  }

  function saveGame() {
    if (!state || state.showTutorial || state.showModeSelect || state.showLevelSelect || state.status === 'menu') return;
    const payload = {
      saveSchema: 2,
      build: SAVE_BUILD,
      mode: state.mode || 'campaign',
      level: state.level,
      runBuffs: [...(state.runBuffs || [])],
      tutorialDone: !state.showTutorial,
      status: state.status,
      hp: state.hp,
      action: state.action,
      startAction: state.startAction || 0,
      shield: state.shield,
      pendingTurnShield: state.pendingTurnShield || 0,
      activeTurnShield: state.activeTurnShield || 0,
      shuffleCards: state.shuffleCards,
      shuffleCount: state.shuffleCount,
      recoverCount: state.recoverCount,
      turn: state.turn,
      canAdvance: state.canAdvance,
      showStarResult: !!state.showStarResult,
      winStars: state.winStars || 0,
      boss: {
        hp: state.boss.hp,
        armor: state.boss.armor || 0,
        burns: (state.boss.burns || []).map((b) => ({ ...b })),
        frozenTurns: state.boss.frozenTurns || 0,

      },

        }))
      } : null,
      buffPicker: state.buffPicker ? { choices: state.buffPicker.choices.map((c) => c.id) } : null,
      savedAt: Date.now()
    };

  function hasStoredSave() {

      return !!localStorage.getItem(SAVE_KEY);
    } catch {
      return false;
    }

  function loadGame() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      if (!isValidSaveData(data)) {
        clearSave();
        return null;
      }
      return data;
    } catch {
      clearSave();
      return null;
    }
  }

  function clearSave() {

  function applyPvpBuffsToPlayer(player, buffIds) {
    if (!player) return;
    const ids = (buffIds || []).filter(Boolean);
    player.runBuffs = [...ids];
    player.mods = computeModsFromBuffs(ids);
    player.maxHp = (player.baseHp || PVP_PLAYER_HP) + (player.mods.maxHpBonus || 0);
    player.hp = player.maxHp;
    if (ids.includes('shield')) {
      player.shield = Math.min(40, player.shield + 12);

  function getActiveMods() {

  function createPvpState(shapeId = 'full', buffs1 = [], buffs2 = [], baseHp = PVP_PLAYER_HP) {
    const hpBase = clamp(Math.floor(baseHp), PVP_HP_MIN, PVP_HP_MAX);
    const mask = maskFromShape(shapeId);
    let board;
    let n = 0;
    do {
      board = createRandomBoard(mask);
      n += 1;
    } while ((findMatches(board).length || countMoves(board, mask) < MIN_MOVES) && n < 150);
    const p1 = createPvpPlayer(1, '玩家一', '#5ad4ff', hpBase);
    const p2 = createPvpPlayer(2, '玩家二', '#ff8a6a', hpBase);
    applyPvpBuffsToPlayer(p1, buffs1);
    applyPvpBuffsToPlayer(p2, buffs2);
    const gs = {
      mode: 'pvp',
      level: 0,
      board,
      boardMask: cloneMask(mask),
      action: 99,
      maxAction: 99,
      hp: hpBase,
      maxHp: hpBase,
      shield: 0,
      recoverCount: 0,
      turn: 0,
      status: 'playing',
      shuffleCount: 0,
      shuffleCards: 0,
      showTutorial: false,
      tutorialPage: 0,
      runBuffs: [],
      buffPicker: null,
      canAdvance: true,
      mods: {},
      showModeSelect: false,
      showPvpSetup: false,
      boss: { kind: 'hero2', name: '玩家二', hp: 1, maxHp: 1 },
      levelData: { boardShape: shapeId },
      pvp: {
        active: 1,
        players: [p1, p2],
        winner: null
      }
    };
    if (p1.mods.expandChance) tryExpandBoard(gs, p1.mods.expandChance);
    if (p2.mods.expandChance) tryExpandBoard(gs, p2.mods.expandChance);
    reconcileBoardWithMask(gs.board, gs.boardMask);
    return gs;

  function getModeSelectRects() {
    if (!layout) return null;
    const cx = layout.w / 2;
    const w = Math.min(280, layout.w - 48);
    const h = 50;
    const gap = 12;
    const hasLevels = getMaxClearedLevel() >= 1;
    const count = hasLevels ? 3 : 2;
    const totalH = count * h + (count - 1) * gap;
    const startY = layout.h * 0.54 - totalH / 2;
    const rects = {
      campaign: { x: cx - w / 2, y: startY, w, h }
    };
    if (hasLevels) {
      rects.levels = { x: cx - w / 2, y: startY + h + gap, w, h };
      rects.pvp = { x: cx - w / 2, y: startY + (h + gap) * 2, w, h };
    } else {
      rects.pvp = { x: cx - w / 2, y: startY + h + gap, w, h };
    }
    return rects;
  }

  function hitModeSelect(p) {
    const r = getModeSelectRects();
    if (!r) return null;
    const pad = 8;
    const keys = ['campaign', 'levels', 'pvp'];
    for (const key of keys) {
      const b = r[key];
      if (!b) continue;
      if (p.x >= b.x - pad && p.x <= b.x + b.w + pad && p.y >= b.y - pad && p.y <= b.y + b.h + pad) return key;
    }
    return null;
  }

  function restoreBuffPicker(ids) {
    const choices = ids.map((id) => BUFF_POOL.find((b) => b.id === id)).filter(Boolean)
      .filter((b) => canAddBuff(b.id));
    const used = new Set(choices.map((b) => b.id));
    let pool = BUFF_POOL.filter((b) => canAddBuff(b.id) && !used.has(b.id));
    while (choices.length < 3 && pool.length) {
      const i = Math.floor(Math.random() * pool.length);
      choices.push(pool.splice(i, 1)[0]);
      used.add(choices[choices.length - 1].id);
    }
    if (choices.length) {
      state.buffPicker = { choices: choices.slice(0, 3) };
      state.status = 'win';
      state.canAdvance = false;
      return;
    }
    openBuffPicker();
  }

  function restoreGame(data) {
    if (data.mode === 'pvp') {
      restorePvpGame(data);
      return;
    }
    const tutorialDone = !!data.tutorialDone;
    state = createGameState(data.level, {
      buffs: data.runBuffs || [],
      skipTutorial: true,
      tutorialDone,
      skipSave: true
    });
    if (data.board && Array.isArray(data.board) && data.board.length === BOARD_SIZE) {
      state.board = boardFromSave(data.board);
    }
    if (data.boardMask?.length === BOARD_SIZE) {
      state.boardMask = data.boardMask.map((row) => row.map((v) => !!v));
    }
    reconcileBoardWithMask(state.board, state.boardMask);
    state.hp = clamp(data.hp ?? state.hp, 0, state.maxHp);
    state.action = clamp(data.action ?? state.action, 0, state.maxAction);
    state.startAction = data.startAction || resolveStartAction(state);
    state.shield = data.shield ?? state.shield;
    state.pendingTurnShield = data.pendingTurnShield || 0;
    state.activeTurnShield = data.activeTurnShield || 0;
    state.shuffleCards = data.shuffleCards ?? state.shuffleCards;
    state.shuffleCount = data.shuffleCount ?? 0;
    state.recoverCount = data.recoverCount ?? 0;
    state.turn = data.turn ?? 0;
    state.status = data.status || 'playing';
    state.canAdvance = data.canAdvance !== false;
    state.showStarResult = !!data.showStarResult;
    state.winStars = data.winStars || 0;
    const b = data.boss;
    if (b) {
      state.boss.hp = clamp(b.hp ?? state.boss.hp, 0, state.boss.maxHp);
      state.boss.armor = b.armor ?? 0;
      state.boss.burns = (b.burns || []).map((x) => ({ turns: x.turns }));
      state.boss.frozenTurns = b.frozenTurns || 0;
      state.boss.vulnerableBonus = b.vulnerableBonus || 0;
      state.boss.vulnerableTurns = b.vulnerableTurns || 0;
      state.boss.vulnerableJustApplied = !!b.vulnerableJustApplied;
      state.boss.phantomHp = b.phantomHp ?? state.boss.phantomHp;
      state.boss.firstArmorDone = !!b.firstArmorDone;
      state.boss.iceBarrier = b.iceBarrier || 0;
      state.boss.rebirthDone = !!b.rebirthDone;
      state.boss.phase = clamp(b.phase ?? getBossHpPhase(state.boss), 1, 3);
    }
    fx.displayBossHp = state.boss.hp;
    fx.displayPlayerHp = state.hp;
    if (data.buffPicker?.choices?.length && !state.showStarResult) restoreBuffPicker(data.buffPicker.choices);
    else state.buffPicker = null;
    syncProgressFromSave(data);
    saveGame();
  }

  function restorePvpGame(data) {
    state = createPvpState();
    if (data.board?.length === BOARD_SIZE) state.board = boardFromSave(data.board);
    state.turn = data.turn ?? 0;
    state.status = data.status || 'playing';
    if (data.pvp) {
      state.pvp.active = data.pvp.active ?? 1;
      state.pvp.winner = data.pvp.winner ?? null;
      (data.pvp.players || []).forEach((snap, i) => {
        const p = state.pvp.players[i];
        if (!p || !snap) return;
        Object.assign(p, snap);
      });
    }
    fx.displayPvpHp = state.pvp.players.map((p) => p.hp);
    saveGame();
  }

        stoneOnFirstArmor: data.stoneOnFirstArmor || 0,
        initialStone: data.initialStone || 0,
        periodicStoneEvery: data.periodicStoneEvery || 0,
        periodicStoneCount: data.periodicStoneCount || 0,
        halfStoneEvery: data.halfStoneEvery || 0,
        halfStoneCount: data.halfStoneCount || 0,
        halfStoneExtra: data.halfStoneExtra || 0,
        stoneOverflowDamage: data.stoneOverflowDamage || 0,
        stealEvery: data.stealEvery || 0,
        lowActionDmg: data.lowActionDmg || 0,
        phantomHp: data.phantomHp || 0,
        phantomMax: data.phantomHp || 0,
        igniteEvery: data.igniteEvery || 0,
        igniteCount: data.igniteCount || 0,
        igniteBurnOnClear: data.igniteBurnOnClear || 0,
        frozenTurns: 0,

        phase: 1
      },
      levelData: data,

    };
    const skillFields = [
      'armorEvery', 'maxArmor', 'stoneOnArmor', 'stoneOnFirstArmor', 'initialStone',
      'periodicStoneEvery', 'periodicStoneCount', 'halfStoneEvery', 'halfStoneCount',
      'halfStoneExtra', 'stoneOverflowDamage', 'slamEvery', 'slamDmg', 'frostEvery', 'frostCount',
      'stealEvery', 'backstabDmg', 'lowActionDmg', 'shadowEvery', 'shadowCount', 'poisonEvery', 'poisonCount',
      'igniteEvery', 'igniteCount', 'igniteBurnOnClear', 'scorchEvery', 'scorchDmg', 'vineEvery', 'vineCount',
      'drainEvery', 'drainHeal', 'curseEvery', 'curseShield', 'iceShieldEvery', 'iceShieldMax',
      'overloadEvery', 'overloadStone', 'overloadFrost', 'pulseEvery', 'pulseShield', 'barrageEvery', 'barrageDmg',
      'voidDrainEvery', 'voidDrainDmg', 'voidLeech', 'entropyEvery', 'entropyDmg', 'reductionBoost',

      'squallEvery', 'squallDmg', 'squallThreshold', 'hailEvery', 'hailCount', 'boltEvery', 'boltDmg',
      'staticEvery', 'staticCut', 'featherEvery', 'featherCount', 'rebirthPct', 'rebirthHeal', 'rebirthAsh',
      'dreadEvery', 'dreadDmg', 'dreadShadow', 'oblivionEvery', 'oblivionDmg'
    ];
    skillFields.forEach((key) => {

    });

  function computeModsFromBuffs(runBuffs) {
    const m = {
      damageMult: 1, flameBonus: 0, freezeBonus: 0, extraDamage: 0,
      bossReductionCut: 0, chainMult: 1, shuffleCardsPerLevel: 0,
      startShield: 0, startAction: 0,
      turnHeal: 0, turnShield: 0, counterReduce: 0, counterReducePct: 0,
      thornsDmg: 0, maxHpBonus: 0, burnBonus: 0, lifeMatchHeal: 0,
      stonePurgeMax: 0, expandChance: 0, focusBonus: 0, sparkChance: 0
    };
    runBuffs.forEach((id) => {
      if (id === 'sharp') m.damageMult += 0.12;
      if (id === 'swift') m.startAction += 1;
      if (id === 'heal') m.maxHpBonus += 10;
      if (id === 'regen') m.stonePurgeMax = Math.min(6, m.stonePurgeMax + 2);
      if (id === 'bulwark') m.counterReduce += 2;
      if (id === 'sanctuary') m.counterReducePct += 0.15;
      if (id === 'aegis') m.turnShield += 2;
      if (id === 'thorns') m.thornsDmg += 4;
      if (id === 'vitality') m.maxHpBonus += 12;
      if (id === 'flame') m.flameBonus += 2;
      if (id === 'ember') m.burnBonus += 4;
      if (id === 'frostbite') m.freezeBonus += 0.15;
      if (id === 'spring') m.lifeMatchHeal += 3;
      if (id === 'break') m.bossReductionCut += 0.05;
      if (id === 'chain') m.chainMult += 0.1;
      if (id === 'lucky') m.shuffleCardsPerLevel += 1;
      if (id === 'expand') m.expandChance = Math.min(0.6, m.expandChance + 0.2);
      if (id === 'focus') m.focusBonus += 0.1;
      if (id === 'spark') m.sparkChance = Math.min(0.35, m.sparkChance + 0.1);
    });
    return m;
  }

  function campaignLevelHpBonus(level) {
    return Math.floor((level - 1) / 3) * 15;
  }

  function applyMaxHpFromMods(s) {
    const levelBonus = campaignLevelHpBonus(s.level || 1);
    const target = PLAYER_MAX_HP + levelBonus + (s.mods?.maxHpBonus || 0);
    if (target <= s.maxHp) return;
    const delta = target - s.maxHp;
    s.maxHp = target;
    s.hp = Math.min(s.maxHp, s.hp + delta);
  }

  function grantShuffleCards(s) {
    s.shuffleCards = s.mods.shuffleCardsPerLevel || 0;
  }

  function applyLevelStartBonuses(s) {
    const m = s.mods;
    if (m.startAction) {
      s.action = Math.min(s.maxAction, s.action + m.startAction);
    }
    if (m.expandChance) tryExpandBoard(s, m.expandChance);
  }

  function cloneMask(mask) {
    return mask.map((row) => row.slice());
  }

  /** 可与当前棋盘四连通的空洞格（拓格候选） */
  function getExpandCandidates(mask) {
    const candidates = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (mask[r][c]) continue;
        const linked = [[1, 0], [-1, 0], [0, 1], [0, -1]].some(([dr, dc]) => {
          const nr = r + dr;
          const nc = c + dc;
          return inBounds(nr, nc) && mask[nr][nc];
        });
        if (linked) candidates.push({ row: r, col: c });
      }
    }
    return candidates;
  }

  /** 锦囊：概率将 1 个邻接空洞纳入有效格，保证棋盘连通 */
  function tryExpandBoard(gameState, chance) {
    if (!chance || !gameState.boardMask) return false;
    if (Math.random() >= chance) return false;
    const cands = getExpandCandidates(gameState.boardMask);
    if (!cands.length) return false;
    const pick = cands[Math.floor(Math.random() * cands.length)];
    gameState.boardMask = cloneMask(gameState.boardMask);
    gameState.boardMask[pick.row][pick.col] = true;
    if (!gameState.board[pick.row][pick.col]) {
      gameState.board[pick.row][pick.col] = createTile(pickType(gameState.board, pick.row, pick.col));
    }
    if (layout) {
      spawnPopup(layout.boardX + layout.boardSize / 2, layout.boardY + 14, '拓土开疆 · 棋盘+1', '#b8d4ff', 14);
    }
    return true;
  }

  /** 玩家回合结束：概率净化石化，成功时最多净化 maxCount 格，并立即生成新棋子 */
  async function tryPurgeStoneHazards(chance, maxCount, boardState = state) {
    if (!boardState?.board || !maxCount || maxCount <= 0) return 0;
    if (Math.random() >= chance) return 0;
    const board = boardState.board;
    let purged = 0;
    const purgedCells = [];
    while (purged < maxCount) {
      const list = [];
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          if (board[r][c]?.hazard === 'stone') list.push({ row: r, col: c });
        }
      }
      if (!list.length) break;
      const pick = list[Math.floor(Math.random() * list.length)];
      board[pick.row][pick.col] = createTile(pickType(board, pick.row, pick.col));
      purgedCells.push(pick);
      purged += 1;
    }
    if (!purged) return 0;
    purgedCells.forEach(({ row, col }) => {
      fx.beams.push({ type: 'spawn', row, col, t: 0, dur: 320 });
      if (layout) {
        const cen = cellCenter(row, col);
        burstParticles(cen.x, cen.y, '#c8e8ff', 6);
      }
    });
    if (layout) {
      if (purged === 1) {
        const cen = cellCenter(purgedCells[0].row, purgedCells[0].col);
        spawnPopup(cen.x, cen.y, '净化石化', '#c8e8ff', 13);
      } else {
        spawnPopup(layout.w / 2, layout.h * 0.4, `复苏之泉 · 净化 ${purged} 格`, '#b8ffd0', 14);
      }
    }
    await sleep(280);
    return purged;
  }

  async function tryRegenStonePurgeAfterPlayerTurn(mods) {
    if (!mods?.stonePurgeMax || !state || state.status !== 'playing') return 0;
    if (!isPvp() && state.boss?.hp <= 0) return 0;
    return tryPurgeStoneHazards(STONE_PURGE_CHANCE, mods.stonePurgeMax, state);
  }

    if (m.startAction) lines.push(`开局动+${m.startAction}`);
    if (m.turnShield) lines.push(`回合末+${m.turnShield}盾`);

  function pickBuffChoicesExcluding(excludeIds = [], poolFilter = null) {

  function createStableBoard(mask = state?.boardMask) {
    let board;
    let n = 0;
    do {
      board = createRandomBoard(mask);
      n += 1;
    } while ((findMatches(board).length || countMoves(board, mask) < MIN_MOVES) && n < 150);
    return board;
  }

  function createRandomBoard(mask = state?.boardMask) {
    const board = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
      board[r] = [];
      for (let c = 0; c < BOARD_SIZE; c++) {
        board[r][c] = cellActive(r, c, mask) ? createTile(pickType(board, r, c)) : null;
      }
    }
    return board;
  }

  /** 按掩码修正棋盘：空洞格清空，有效格补棋 */
  function reconcileBoardWithMask(board, mask) {
    if (!board || !mask) return;
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (!cellActive(r, c, mask)) board[r][c] = null;
        else if (!board[r][c]) board[r][c] = createTile(pickType(board, r, c));
      }
    }
  }

  function pickType(board, row, col) {
    const all = ITEMS.map((i) => i.id);
    const ok = all.filter((t) => {
      const l1 = col > 0 ? board[row][col - 1] : null;
      const l2 = col > 1 ? board[row][col - 2] : null;
      const u1 = row > 0 ? board[row - 1][col] : null;
      const u2 = row > 1 ? board[row - 2][col] : null;
      return !(l1 && l2 && l1.type === t && l2.type === t) && !(u1 && u2 && u1.type === t && u2.type === t);
    });
    return ok[Math.floor(Math.random() * ok.length)] || all[0];
  }

  function countBlockedHazards(board = state.board) {
    return countHazard('stone', board) + countHazard('frost', board) + countHazard('vine', board) + countHazard('shadow', board);
  }

  function applyHazardTiles(hazard, count, gameState = state) {
    const cap = STONE_CAP;
    const room = Math.max(0, cap - countBlockedHazards(gameState.board));
    const actual = Math.min(count, room);
    if (actual < count && gameState.boss.stoneOverflowDamage) {
      dealBossDamageToPlayer(gameState.boss.stoneOverflowDamage);
    }
    const meta = HAZARD_META[hazard];
    const list = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        const t = gameState.board[r][c];
        if (t && cellActive(r, c, gameState.boardMask) && !t.special && !t.hazard) list.push({ row: r, col: c, tile: t });
      }
    }
    for (let i = 0; i < actual && list.length; i++) {
      const pick = list.splice(Math.floor(Math.random() * list.length), 1)[0];
      pick.tile.hazard = hazard;
      if (layout) {
        const cell = cellCenter(pick.row, pick.col);
        fx.projectiles.push({
          fromX: layout.boss.cx,
          fromY: layout.boss.cy + layout.boss.h * 0.35,
          toX: cell.x,
          toY: cell.y,
          t: 0,
          dur: 360,
          color: meta?.proj || '#aaa'
        });
      }
    }
    fx.bossCast = 500;
    fx.bossShake = 200;
  }

  function stoneTiles(count, gameState) {
    applyHazardTiles('stone', count, gameState);
  }

  function igniteTiles(count, gameState) {

  function hurtBoss(dmg, big = false) {
    if (dmg > 0) {
      const dodgeChance = getBossDodgeChance();
      if (state.bossDodgeStrip) state.bossDodgeStrip = 0;
      if (Math.random() < dodgeChance) {
        playSfx('block');
        spawnPopup(layout.boss.cx, layout.boss.cy - 12, '闪避', '#c8b0ff', 16, true);
        burstParticles(layout.boss.cx, layout.boss.cy, '#9b67ff', 6);
        return;
      }
    }
    if (dmg > 0) playSfx('bossHit', { big });
    let real = dmg;
    const b = state.boss;
    if (b.iceBarrier > 0) {
      const block = Math.min(real, 14 * b.iceBarrier);
      real -= block;
      b.iceBarrier--;
      if (block > 0) spawnPopup(layout.boss.cx, layout.boss.cy + 20, `冰盾 -${block}`, '#9ce8ff', 13);
    }
    if (b.phantomHp > 0) {
      const absorbed = Math.min(b.phantomHp, Math.floor(dmg * 0.3));
      b.phantomHp -= absorbed;
      real = dmg - absorbed;
    }
    state.boss.hp = Math.max(0, state.boss.hp - real);
    syncBossPhase();
    if (state.boss.hp > 0) tryPhoenixRebirth();
    if (state.boss.hp <= 0) fx.displayBossHp = 0;
    fx.bossHit = 420;
    fx.bossShake = big ? 320 : 180;
    fx.bossHpFlash = 500;
    spawnPopup(layout.boss.cx, layout.boss.cy - 8, `-${real}`, '#ff6b5a', big ? 26 : 20, big);
    burstParticles(layout.boss.cx, layout.boss.cy + 10, '#ff8a65', 8);
  }

  function hurtPvpPlayer(pid, dmg, big = false) {
    const p = getPvpPlayer(pid);
    if (!p || dmg <= 0) return;
    const cen = pvpActorCenter(pid);
    const used = Math.min(p.shield, dmg);
    const hpDmg = dmg - used;
    p.shield -= used;
    if (hpDmg > 0) {
      p.hp = Math.max(0, p.hp - hpDmg);
      if (fx.displayPvpHp) fx.displayPvpHp[pid - 1] = p.hp;
      if (pid === 1) { fx.playerHit = 420; fx.playerShake = 280; fx.playerHpFlash = 500; }
      else { fx.bossHit = 420; fx.bossShake = big ? 320 : 180; fx.bossHpFlash = 500; }
      spawnPopup(cen.x, cen.y + (pid === 1 ? 8 : -8), `-${hpDmg}`, '#ff5566', big ? 22 : 18, big);
      burstParticles(cen.x, cen.y, '#ff8899', 6);
      playSfx('hit', { big });
    } else if (used > 0) {
      spawnPopup(cen.x, cen.y, '格挡', '#ffd56a', 14);
      playSfx('block');
    }
  }

  function healPvpPlayer(pid, amt) {
    const p = getPvpPlayer(pid);
    if (!p || amt <= 0) return;
    const before = p.hp;
    p.hp = Math.min(p.maxHp, p.hp + amt);
    const gained = p.hp - before;
    if (gained > 0) {
      if (fx.displayPvpHp) fx.displayPvpHp[pid - 1] = p.hp;
      const cen = pvpActorCenter(pid);
      spawnPopup(cen.x, cen.y - 12, `+${gained}`, '#8ee8b8', 15);
    }
  }

  /** Boss 对玩家的伤害：先扣护盾，小概率真伤无视护盾 */
  function dealBossDamageToPlayer(dmg, opts = {}) {
    if (dmg <= 0 && !opts.blocked) return;
    if (isPvp()) {
      if (opts.blocked) {
        const cen = pvpActorCenter(state.pvp.active);
        spawnPopup(cen.x, cen.y - 20, '格挡', '#ffd56a', 16);
        return;
      }
      hurtPvpPlayer(state.pvp.active, dmg, opts.big);
      return;
    }
    if (isDevInvincible() && dmg > 0) {
      spawnPopup(layout.player.cx, layout.player.cy - 20, '无敌', '#b8ffd0', 14);
      return;
    }
    if (opts.blocked) {
      hurtPlayer(0, true);
      return;
    }
    const isTrue = opts.trueDamage || Math.random() < getBossTrueDamageChance();
    if (!isTrue) {
      const used = Math.min(state.shield, dmg);
      const hpDmg = dmg - used;
      state.shield -= used;
      if (hpDmg > 0) hurtPlayer(hpDmg);
      else hurtPlayer(0, true);
      return;
    }
    hurtPlayer(dmg);
    spawnPopup(layout.player.cx, layout.player.cy - 28, '真伤', '#ff4060', 14, true);
    playSfx('trueHit');
  }

  function hurtPlayer(dmg, blocked = false) {
    if (isPvp()) {
      if (blocked) {
