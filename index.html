    if (isDevInvincible() && dmg > 0) {
      spawnPopup(layout.player.cx, layout.player.cy - 20, '无敌', '#b8ffd0', 14);
      return;
    }
    if (blocked) {
      playSfx('block');
      spawnPopup(layout.player.cx, layout.player.cy - 20, '格挡', '#ffd56a', 16);

  /** 从 CSS 安全区变量读取，回退到经验值 */
  function readSafeInsets() {
    const s = getComputedStyle(document.documentElement);
    const px = (v) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : 0;
    };
    const top = Math.max(px(s.getPropertyValue('--sat')), IS_IOS ? 44 : (IS_DESKTOP ? 12 : 24));
    const bottom = Math.max(px(s.getPropertyValue('--sab')), IS_IOS ? 22 : 12);
    return {
      top,
      bottom,
      left: px(s.getPropertyValue('--sal')),
      right: px(s.getPropertyValue('--sar'))
    };
  }

  /**
   * iOS / UC：visualViewport.offsetTop 常错乱导致顶白边、底按钮被裁。
   * 统一用 innerWidth/innerHeight，舞台始终贴屏幕中心，不用 offset 定位。
   */
  function getVisibleScreen() {
    const iw = window.innerWidth;
    const ih = window.innerHeight;
    if (IS_IOS || IS_UC) {
      return {
        w: Math.max(200, Math.round(iw)),
        h: Math.max(320, Math.round(ih)),
        left: 0,
        top: 0
      };
    }
    const vv = window.visualViewport;
    const vw = vv?.width ?? iw;
    const vh = vv?.height ?? ih;
    return {
      w: Math.max(200, Math.round(Math.min(vw, iw))),
      h: Math.max(320, Math.round(Math.min(vh, ih))),
      left: Math.round(vv?.offsetLeft ?? 0),
      top: Math.round(vv?.offsetTop ?? 0)
    };
  }

  function screenChanged(s) {
    const t = lastScreen;
    return Math.abs(s.w - t.w) >= 2 || Math.abs(s.h - t.h) >= 2;
  }

  function lockPageScroll() {
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  }

  /**
   * 画布逻辑尺寸 = 当前可见区域，铺满屏幕（无 letterbox 黑边）。
   * 布局随宽高自适应，桌面与手机共用同一套 buildLayout。
   */
  function applyViewport(force) {
    lockPageScroll();
    const screen = getVisibleScreen();
    const lw = screen.w;
    const lh = screen.h;
    if (!force && !screenChanged(screen)) return false;
    lastScreen = { w: lw, h: lh, scale: 1 };

    stage.style.width = lw + 'px';
    stage.style.height = lh + 'px';
    stage.style.left = '0';
    stage.style.top = '0';
    stage.style.transform = 'none';

    canvas.style.width = lw + 'px';
    canvas.style.height = lh + 'px';

    const ratio = Math.min(window.devicePixelRatio || 1, IS_DESKTOP ? 2 : 2);
    const pw = Math.floor(lw * ratio);
    const ph = Math.floor(lh * ratio);
    if (canvas.width !== pw || canvas.height !== ph) {
      canvas.width = pw;
      canvas.height = ph;
    }
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    layout = buildLayout(lw, lh);
    syncDevLevelInput();
    return true;
  }

  function syncViewportNow() {
    applyViewport(true);
  }

  function onViewportChange() {
    if (viewportRaf) return;
    viewportRaf = requestAnimationFrame(() => {
      viewportRaf = 0;
      applyViewport(false);
    });
  }

  function scheduleResize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => applyViewport(false), 120);
  }

  function doResize() {
    applyViewport(true);
  }

  /** 自下而上排布；顶栏按实际绘制高度预留，棋盘不得与标题/Boss/血条重叠 */
  function buildLayout(w, h) {
    const safe = readSafeInsets();
    const narrow = w < 440;
    const compact = h < 720 || narrow;
    const pad = (compact ? 4 : 6) + safe.left;
    const padR = (compact ? 4 : 6) + safe.right;
    const contentW = w - pad - padR;
    const pvpPlay = isPvp() && state && !state.showPvpSetup;

    const headerTop = safe.top + (compact ? 2 : 4);
    const titleBlockH = compact ? 28 : 32;
    const headerGap = compact ? 3 : 4;
    const bossH = pvpPlay ? (compact ? 38 : 42) : (compact ? 48 : clamp(h * 0.082, 50, 60));
    const duelH = pvpPlay ? (compact ? 44 : 48) : (compact ? 52 : 56);
    const boardHeaderGap = pvpPlay ? (compact ? 4 : 5) : (compact ? 6 : 8);

    const battleLift = compact ? 16 : 22;
    const bossY = headerTop + titleBlockH + headerGap - battleLift;
    const duelY = bossY + bossH + headerGap;
    const headerBottom = duelY + duelH;
    const boardY = headerBottom + boardHeaderGap;

    const btnH = compact ? 38 : 44;
    const btnY = h - safe.bottom - (compact ? 4 : 6) - btnH;
    const playerH = pvpPlay ? (compact ? 34 : 38) : (compact ? 46 : clamp(h * 0.082, 50, 64));
    const playerGap = pvpPlay ? (compact ? 4 : 5) : (compact ? 6 : 8);
    const playerY = btnY - playerH - playerGap;
    let boardMaxH = Math.max(80, playerY - boardY - boardHeaderGap);
    if (pvpPlay) boardMaxH += compact ? 36 : 48;
    boardMaxH += battleLift * 0.65;

    const cellGap = compact ? 2 : 3;
    let cellSize = (contentW - cellGap * (BOARD_SIZE + 1)) / BOARD_SIZE;
    let boardSize = cellSize * BOARD_SIZE + cellGap * (BOARD_SIZE + 1);
    if (boardSize > boardMaxH) {
      cellSize = (boardMaxH - cellGap * (BOARD_SIZE + 1)) / BOARD_SIZE;
      boardSize = cellSize * BOARD_SIZE + cellGap * (BOARD_SIZE + 1);
    }
    cellSize = Math.max(16, cellSize);
    boardSize = cellSize * BOARD_SIZE + cellGap * (BOARD_SIZE + 1);
    const boardX = (w - boardSize) / 2;

    const newGameW = 56;
    const newGameH = 26;

    return {
      w, h, pad, padR, safe, compact,
      headerTop, titleBlockH, headerBottom, boardHeaderGap,
      boardSize, boardX, boardY, cellGap, cellSize,
      newGameBtn: { x: w - padR - newGameW, y: headerTop, w: newGameW, h: newGameH },
      boss: {
        x: pad, y: bossY, w: contentW, h: bossH,
        cx: w / 2, cy: bossY + bossH / 2
      },
      duel: { x: pad, y: duelY, w: contentW, h: duelH },
      player: {
        x: pad, y: playerY, w: contentW, h: playerH,
        cx: w / 2, cy: playerY + playerH / 2
      },
      button: { x: pad, y: btnY, w: contentW, h: btnH, pad: 14 },
      tutorialBtnGap: 8,
      tutorialPrevBtn: (() => {
        const gap = 8;
        const tw = (contentW - gap) / 2;
        return { x: pad, y: btnY, w: tw, h: btnH };
      })(),
      tutorialNextBtn: (() => {
        const gap = 8;
        const tw = (contentW - gap) / 2;
        return { x: pad + tw + gap, y: btnY, w: tw, h: btnH };
      })(),
      shuffleCardBtn: (() => {
        const cardW = compact ? 52 : 58;
        const cardH = compact ? 42 : 46;
        return {
          x: pad + 4,
          y: playerY + Math.max(2, (playerH - cardH) / 2),
          w: cardW,
          h: cardH
        };
      })(),
      audioBtn: {
        x: w - padR - 38,
        y: btnY - 42,
        w: 36,
        h: 36
      }
    };
  }

  function cellCenter(row, col) {
    const step = layout.cellSize + layout.cellGap;
    return {
      x: layout.boardX + layout.cellGap + col * step + layout.cellSize / 2,
      y: layout.boardY + layout.cellGap + row * step + layout.cellSize / 2
    };
  }

  function cellRect(row, col) {
    const step = layout.cellSize + layout.cellGap;
    return {
      x: layout.boardX + layout.cellGap + col * step,
      y: layout.boardY + layout.cellGap + row * step,
      s: layout.cellSize
    };
  }

  async function animateSwap(from, to, dur = 160) {
    fx.swap = { from, to, t: 0, dur };
    while (fx.swap.t < fx.swap.dur) {
      fx.swap.t += 16;
      await sleep(16);
    }
    fx.swap = null;
  }

  async function animateClear(cells, dur = 230) {
    fx.clearing = cells.map((cell) => ({
      row: cell.row,
      col: cell.col,
      tile: state.board[cell.row][cell.col] ? { ...state.board[cell.row][cell.col] } : null,
      scale: 1,
      alpha: 1
    }));
    const start = performance.now();
    while (performance.now() - start < dur) {
      const p = (performance.now() - start) / dur;
      fx.clearing.forEach((it) => {
        it.scale = 1 + 0.4 * easeOutCubic(p);
        it.alpha = 1 - p;
      });
      await sleep(16);
    }
    cells.forEach((cell) => {
      const c = cellCenter(cell.row, cell.col);
      burstParticles(c.x, c.y, ITEM_MAP[state.board[cell.row][cell.col]?.type || 'flame']?.color || '#fff', 5);
    });
    fx.clearing = [];
  }

  function beginFallAnimation(moves) {
    if (!moves.length) {
      fx.falls = [];
      return 0;
    }
    fx.falls = moves.map((m) => ({
      ...m,
      t: 0,
      dur: Math.min(280, 90 + m.distance * 28)
    }));
    return Math.max(...fx.falls.map((f) => f.dur));
  }

  async function waitFallAnimation(dur) {
    if (!dur) return;
    const start = performance.now();
    while (performance.now() - start < dur) {
      const elapsed = performance.now() - start;
      fx.falls.forEach((f) => { f.t = Math.min(f.dur, elapsed); });
      await sleep(16);
    }
    fx.falls = [];
  }

  async function animateFalls(moves) {
    const dur = beginFallAnimation(moves);
    await waitFallAnimation(dur);
  }

  function computeFalls(before, after) {
    const mask = state.boardMask;
    const moves = [];
    for (let col = 0; col < BOARD_SIZE; col++) {
      const slots = [];
      for (let r = BOARD_SIZE - 1; r >= 0; r--) {
        if (cellActive(r, col, mask)) slots.push(r);
      }
      const oldC = [];
      const newC = [];
      for (const r of slots) {
        if (before[r][col]) oldC.push({ row: r, tile: before[r][col] });
      }
      for (const r of slots) {
        if (after[r][col]) newC.push({ row: r, tile: after[r][col] });
      }
      newC.forEach((entry, idx) => {
        const targetRow = slots[idx];
        const src = oldC.find((o) => o.tile.id === entry.tile.id);
        if (src && src.row !== targetRow) {
          moves.push({ row: targetRow, col, distance: targetRow - src.row, tile: entry.tile });
        } else if (!src) {
          moves.push({ row: targetRow, col, distance: idx + 1, tile: entry.tile, isNew: true });
        }
      });
    }
    return moves;
  }

  /** 交换是否合法：须形成三连，或两个特殊棋组合交换 */
  function isValidSwapAfter(board, from, to) {
    const a = board[from.row][from.col];
    const b = board[to.row][to.col];
    if (!a || !b) return { valid: false, matches: [], bothSpecial: false };
    const matches = findMatches(board);
    const bothSpecial = !!(a.special && b.special);
    const valid = matches.length > 0 || bothSpecial;
    return { valid, matches, bothSpecial, a, b };
  }

  /** 对战：若当前玩家被冻结则跳过并换手，返回是否已跳过 */
  function skipPvpFrozenTurnIfNeeded() {
    if (!isPvp() || state.status !== 'playing') return false;
    const pl = getPvpPlayer(state.pvp.active);
    if (!pl || pl.frozenTurns <= 0) return false;
    pl.frozenTurns--;
    spawnPopup(layout.w / 2, layout.h * 0.42, `${pl.name} 被冻结，跳过回合`, '#9ce8ff', 14);
    state.pvp.active = pvpOpponentId(state.pvp.active);
    spawnPopup(layout.w / 2, layout.h * 0.38, `${getPvpPlayer(state.pvp.active).name} 回合`, '#ffe9a8', 15);
    return true;
  }

  async function trySwap(from, to) {
    if (inputLocked || state.status !== 'playing' || state.showTutorial) return;
    if (!adj(from, to)) return;
    if (!cellActive(from.row, from.col) || !cellActive(to.row, to.col)) return;

    const a0 = state.board[from.row][from.col];
    const b0 = state.board[to.row][to.col];
    if (!a0 || !b0 || tileLocked(a0) || tileLocked(b0)) return;

    if (isPvp()) {
      while (skipPvpFrozenTurnIfNeeded()) { /* 连续冻结时继续跳过 */ }
      if (state.status !== 'playing') return;
    }

    inputLocked = true;
    clearComboCarry();
    state.lastSwapMaxChain = 0;
    try {
      playSfx('swap');
      await animateSwap(from, to, 160);
      swap(state.board, from, to);

      const { valid, matches, bothSpecial } = isValidSwapAfter(state.board, from, to);
      if (!valid) {
        await animateSwap(from, to, 140);
        swap(state.board, from, to);
        return;
      }
      playSfx('match');
      if (!isPvp() && !isDevInvincible()) {
        const sparked = (state.mods?.sparkChance || 0) > 0 && Math.random() < state.mods.sparkChance;
        state.action = Math.max(0, state.action - 1);
        if (sparked) {
          state.action = Math.min(state.maxAction, state.action + 1);
          spawnPopup(layout.player.cx, layout.player.cy - 28, '疾风！行动保全', '#b8ffd0', 14);
        }
      }
      state.turn += 1;
      fx.playerShake = 80;

      const a = state.board[from.row][from.col];
      const b = state.board[to.row][to.col];
      const hasSpecial = !!(a?.special || b?.special);
      if (bothSpecial || (matches.length > 0 && hasSpecial)) {
        await runSpecialSwap(from, to);
      }
      await resolveBoard(matches);
      await endTurn();
      ensurePlayable();
    } finally {
      clearComboCarry();
      inputLocked = false;
    }
  }

  async function resolveBoard(firstMatches) {
    let chain = 1;
    let maxChain = 1;
    let matches = firstMatches.length ? firstMatches : findMatches(state.board);
    while (matches.length && chain <= 8) {
      maxChain = Math.max(maxChain, chain);
      const clearMap = emptyMap();
      const specials = [];

      matches.forEach((m) => {
        const mult = matchMult(m) * Math.min(1 + (chain - 1) * 0.2, 1.6) * (getActiveMods().chainMult || 1);
        const dmg = Math.floor(ITEM_MAP[m.type].damage * m.cells.length * mult);
        applyItem(m.type, m.cells.length, dmg, chain > 1);
        m.cells.forEach((cell) => {
          const t = state.board[cell.row][cell.col];
          if (t?.special) addSpecialClear(cell.row, cell.col, t.special, clearMap);
          clearMap[cell.row][cell.col] = true;
        });
        const sp = specialFromMatch(m);
        if (sp) specials.push({ row: m.cells[0].row, col: m.cells[0].col, type: m.type, special: sp });
      });

      const cells = cellsFromMap(clearMap);
      await animateClear(cells);
      clearMapApply(clearMap);
      const before = cloneBoard(state.board);
      gravityFill();
      const fallMoves = computeFalls(before, state.board);
      beginFallAnimation(fallMoves);
      const fallDur = fx.falls.length ? Math.max(...fx.falls.map((f) => f.dur)) : 0;
      await waitFallAnimation(fallDur);
      specials.forEach((s) => {
        if (cellActive(s.row, s.col)) {
          state.board[s.row][s.col] = createTile(s.type, s.special);
          fx.beams.push({ type: 'spawn', row: s.row, col: s.col, t: 0, dur: 320 });
        }
      });
      resolveComboMoment(chain, matches);
      matches = findMatches(state.board);
      chain += 1;
    }
    state.lastSwapMaxChain = maxChain;
  }

  async function runSpecialSwap(from, to) {
    playSfx('special');
    const a = state.board[from.row][from.col];
    const b = state.board[to.row][to.col];
    const clearMap = emptyMap();
    if (a?.special === 'rainbow' && b) fillType(b.type, clearMap);
    else if (b?.special === 'rainbow' && a) fillType(a.type, clearMap);
    else {
      if (a?.special) addSpecialClear(from.row, from.col, a.special, clearMap);
      if (b?.special) addSpecialClear(to.row, to.col, b.special, clearMap);
    }
    const cells = cellsFromMap(clearMap);
    applyClearDamage(clearMap, 1);
    await animateClear(cells);
    clearMapApply(clearMap);
    const before = cloneBoard(state.board);
    gravityFill();
    const fallMoves = computeFalls(before, state.board);
    beginFallAnimation(fallMoves);
    const fallDur = fx.falls.length ? Math.max(...fx.falls.map((f) => f.dur)) : 0;
    await waitFallAnimation(fallDur);
  }

  function applyClearDamage(clearMap, chain) {
    const counts = {};
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (!clearMap[r][c]) continue;
        const t = state.board[r][c];
        if (!t) continue;
        counts[t.type] = (counts[t.type] || 0) + 1;
      }
    }
    Object.keys(counts).forEach((type) => {
      applyItem(type, counts[type], Math.floor(ITEM_MAP[type].damage * counts[type] * 1.05), chain > 1);
    });
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    if (total > 0) {
      if (chain > 1) playSfx('combo', { chain });
      else playSfx('clear', { count: total });
    }
  }

  function levelDamageMult() {
    if (state.level <= 3) return 0.95;
    if (state.level <= 15) return 1;
    if (state.level <= 40) return 1.05;
    if (state.level <= 70) return 1.08;
    return 1.1;
  }

  function tryPhoenixRebirth() {
    const b = state?.boss;
    if (!b || b.kind !== 'phoenix' || b.rebirthDone || !b.rebirthPct) return;
    if (b.hp <= 0 || b.hp > b.maxHp * b.rebirthPct) return;
    b.rebirthDone = true;
    const heal = Math.floor(b.maxHp * (b.rebirthHeal || 0.2));
    healBoss(heal);
    if (layout) spawnPopup(layout.boss.cx, layout.boss.cy - 28, '涅槃重生', '#ff8844', 16);
    if (b.rebirthAsh) stoneTiles(b.rebirthAsh);
  }

  function bossReductionNow() {
    const b = state.boss;
    let reduction = Math.min(0.45, b.baseReduction + b.armor * 0.05);
    if (b.reductionBoost && b.hp <= b.maxHp * 0.5) reduction = Math.min(0.45, reduction + b.reductionBoost);
    return Math.max(0, reduction - (state.mods.bossReductionCut || 0));
  }

  function applyItem(type, count, rawDmg, chainBonus) {
    if (isPvp()) {
      const active = state.pvp.active;
      const opp = pvpOpponentId(active);
      const me = getPvpPlayer(active);
      const oppPl = getPvpPlayer(opp);
      const m = me.mods || {};
      let dmg = rawDmg * (m.damageMult || 1);
      if (type === 'flame') dmg += (m.flameBonus || 0) * count;
      if (m.focusBonus && oppPl.hp <= oppPl.maxHp * 0.5) dmg *= (1 + m.focusBonus);
      dmg = Math.max(1, Math.floor(dmg * (1 + oppPl.vulnerableBonus)));
      hurtPvpPlayer(opp, dmg, count >= 5 || chainBonus);
      if (type === 'flame' && count >= 4) {
        for (let i = 0; i < (count >= 5 ? 2 : 1); i++) oppPl.burns.push({ turns: 2 });
      }
      const freezeChance = (count >= 5 ? 0.5 : 0.25) + (m.freezeBonus || 0);
      if (type === 'ice' && count >= 4 && Math.random() < freezeChance) {
        oppPl.frozenTurns = 1;
        const cen = pvpActorCenter(opp);
        spawnPopup(cen.x, cen.y - 24, '冻结！', '#9ce8ff', 14);
      }
      if (type === 'life') {
        const lifeHeal = m.lifeMatchHeal || 0;
        if (lifeHeal > 0) healPvpPlayer(active, lifeHeal);
        if (count >= 5) healPvpPlayer(active, 8);
        else if (count >= 4) healPvpPlayer(active, 4);
      }
      if (type === 'shield') {
        me.shield = Math.min(40, me.shield + (count >= 5 ? 10 : count >= 4 ? 6 : 3));
      }
      if (type === 'thunder' && count >= 4) {
        const b = count >= 5 ? 0.3 : 0.2;
        oppPl.vulnerableBonus = Math.min(0.6, oppPl.vulnerableBonus + b);
        oppPl.vulnerableTurns = Math.max(oppPl.vulnerableTurns, count >= 5 ? 2 : 1);
        oppPl.vulnerableJustApplied = true;
      }
      return;
    }
    const reduction = bossReductionNow();
    const m = state.mods || {};
    let dmg = rawDmg * levelDamageMult() * (m.damageMult || 1);
    if (type === 'flame') dmg += (m.flameBonus || 0) * count;
    dmg = dmg * (1 + (m.extraDamage || 0));
    if (m.focusBonus && state.boss.hp <= state.boss.maxHp * 0.5) dmg *= (1 + m.focusBonus);
    dmg = Math.max(1, Math.floor(dmg * (1 + state.boss.vulnerableBonus) * (1 - reduction)));
    if (state.nextDamageBonus && dmg > 0) {
      dmg = Math.max(1, Math.floor(dmg * (1 + state.nextDamageBonus)));
      state.nextDamageBonus = 0;
    }
    hurtBoss(dmg, count >= 5 || chainBonus);
    if (type === 'flame' && count >= 4) for (let i = 0; i < (count >= 5 ? 2 : 1); i++) state.boss.burns.push({ turns: 2 });
    const freezeChance = (count >= 5 ? 0.5 : 0.25) + ((state.mods || {}).freezeBonus || 0);
    if (type === 'ice' && count >= 4 && Math.random() < freezeChance) state.boss.frozenTurns = 1;
    if (type === 'life') {
      const lifeHeal = m.lifeMatchHeal || 0;
      if (lifeHeal > 0) {
        state.hp = Math.min(state.maxHp, state.hp + lifeHeal);
        spawnPopup(layout.player.cx, layout.player.cy - 12, `+${lifeHeal}`, '#8ee8b8', 15);
        playSfx('heal');
      }
      if (count >= 4 && state.recoverCount < 4) {
        state.action = Math.min(state.maxAction, state.action + 1);
        state.recoverCount++;
        if (count >= 5) state.hp = Math.min(state.maxHp, state.hp + 8);
      }
    }
    if (type === 'shield') {
      state.shield = Math.min(40, state.shield + (count >= 5 ? 10 : count >= 4 ? 6 : 3));
      playSfx('shield');
    }
    if (type === 'thunder' && count >= 4) {
      const b = count >= 5 ? 0.3 : 0.2;
      state.boss.vulnerableBonus = Math.min(0.6, state.boss.vulnerableBonus + b);
      state.boss.vulnerableTurns = Math.max(state.boss.vulnerableTurns, count >= 5 ? 2 : 1);
      state.boss.vulnerableJustApplied = true;
    }
  }

  async function endTurn() {
    if (isPvp()) return endTurnPvp();

    if (state.boss.hp <= 0) {
      onLevelVictory();
      state.status = 'win';
      fx.bossHit = 600;
      openStarResult();
      return;
    }

    await tryRegenStonePurgeAfterPlayerTurn(state.mods);

    if (state.boss.burns.length) {
      const burnBase = 6 + ((state.mods || {}).burnBonus || 0);
      const dmg = Math.floor(state.boss.burns.length * burnBase * (1 + state.boss.vulnerableBonus * 0.5));
      hurtBoss(dmg);
      state.boss.burns = state.boss.burns.map((b) => ({ turns: b.turns - 1 })).filter((b) => b.turns > 0);
    }
    if (state.boss.hp <= 0) {
      onLevelVictory();
      state.status = 'win';
      openStarResult();
      return;
    }
    if (state.boss.frozenTurns > 0) {
      state.boss.frozenTurns--;
    } else {
      const m = state.mods || {};
      let raw = state.boss.counter;
      if (m.counterReducePct > 0) raw = Math.max(0, Math.floor(raw * (1 - m.counterReducePct)));
      if (m.counterReduce > 0) raw = Math.max(0, raw - m.counterReduce);
      const hpBefore = state.hp;
      dealBossDamageToPlayer(raw);
      if (m.thornsDmg && state.boss.hp > 0 && state.hp < hpBefore) {
        hurtBoss(m.thornsDmg);
        spawnPopup(layout.boss.cx, layout.boss.cy + 16, `反刺 -${m.thornsDmg}`, '#c8a8ff', 14);
      }
      bossSkill();
      if (state.boss.kind === 'queen') tickFireHazardDamage();
      fx.bossShake = 120;
    }
    tickVuln();
    expireBuffTurnShield();
    const mEnd = state.mods || {};
    if (mEnd.turnShield && state.boss.hp > 0) {
      const before = state.shield;
      state.shield = Math.min(40, state.shield + mEnd.turnShield);
      const gained = state.shield - before;
      if (gained > 0) spawnPopup(layout.player.cx, layout.player.cy + 10, `回合护盾 +${gained}`, '#ffe9a8', 14);
    }
    if (isDevInvincible() && state.status === 'playing') {
      state.hp = state.maxHp;
      if (state.action <= 0) state.action = state.maxAction;
      fx.displayPlayerHp = state.hp;
    }
    if (state.action <= 0 && state.boss.hp > 0 && !isDevInvincible()) {
      if (state.status !== 'lose') playSfx('lose');
      state.status = 'lose';
    }
    if (state.hp <= 0 && state.boss.hp > 0 && !isDevInvincible()) {
      if (state.status !== 'lose') playSfx('lose');
      state.status = 'lose';
    }
    saveGame();
  }

  function tickPvpVuln(p) {
    if (p.vulnerableTurns <= 0) return;
    if (p.vulnerableJustApplied) {
      p.vulnerableJustApplied = false;
      return;
    }
    p.vulnerableTurns--;
    if (p.vulnerableTurns <= 0) p.vulnerableBonus = 0;
  }

  async function endTurnPvp() {
    const active = state.pvp.active;
    const opp = pvpOpponentId(active);
    const oppPl = getPvpPlayer(opp);

    if (oppPl.burns.length) {
      const mePl = getPvpPlayer(active);
      const burnBase = 6 + (mePl?.mods?.burnBonus || 0);
      const dmg = Math.floor(oppPl.burns.length * burnBase);
      hurtPvpPlayer(opp, dmg);
      oppPl.burns = oppPl.burns.map((b) => ({ turns: b.turns - 1 })).filter((b) => b.turns > 0);
    }
    if (oppPl.hp <= 0) {
      state.status = 'win';
      state.pvp.winner = active;
      playSfx('win');
      saveGame();
      return;
    }

    await tryRegenStonePurgeAfterPlayerTurn(getPvpPlayer(active)?.mods);

    tickPvpVuln(oppPl);
    tickPvpVuln(getPvpPlayer(active));

    const mePl = getPvpPlayer(active);

  function findMatches(board) {
    const matches = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
      let s = 0;
      for (let c = 1; c <= BOARD_SIZE; c++) {
        const cur = c < BOARD_SIZE ? board[r][c] : null;
        const prev = board[r][c - 1];
        if (!cur || !prev || cur.type !== prev.type) {
          if (c - s >= 3 && prev) matches.push(makeMatch(prev.type, r, s, r, c - 1));
          s = c;
        }
      }
    }
    for (let c = 0; c < BOARD_SIZE; c++) {
      let s = 0;
      for (let r = 1; r <= BOARD_SIZE; r++) {
        const cur = r < BOARD_SIZE ? board[r][c] : null;
        const prev = board[r - 1][c];
        if (!cur || !prev || cur.type !== prev.type) {
          if (r - s >= 3 && prev) matches.push(makeMatch(prev.type, s, c, r - 1, c));
          s = r;
        }
      }
    }
    return mergeCross(matches);
  }

  function makeMatch(type, r1, c1, r2, c2) {
    const cells = [];
    for (let r = r1; r <= r2; r++) for (let c = c1; c <= c2; c++) cells.push({ row: r, col: c });
    return { type, cells, horizontal: r1 === r2, vertical: c1 === c2 };
  }

  function mergeCross(matches) {
    const used = matches.map(() => false);
    const out = [];
    for (let i = 0; i < matches.length; i++) {
      if (used[i]) continue;
      const cur = matches[i];
      const map = new Map(cur.cells.map((c) => [`${c.row}_${c.col}`, c]));
      let h = cur.horizontal, v = cur.vertical;
      used[i] = true;
      for (let j = i + 1; j < matches.length; j++) {
        if (used[j] || matches[j].type !== cur.type) continue;
        if (!matches[j].cells.some((c) => map.has(`${c.row}_${c.col}`))) continue;
        matches[j].cells.forEach((c) => map.set(`${c.row}_${c.col}`, c));
        h = h || matches[j].horizontal;
        v = v || matches[j].vertical;
        used[j] = true;
      }
      out.push({ type: cur.type, cells: [...map.values()], horizontal: h, vertical: v, cross: h && v });
    }
    return out;
  }

  function matchMult(m) {
    if (m.cross) return 1.8;
    if (m.cells.length >= 6) return 2.4;
    if (m.cells.length >= 5) return 2;
    if (m.cells.length >= 4) return 1.4;
    return 1;
  }

  function specialFromMatch(m) {
    if (m.cross) return 'bomb';
    if (m.cells.length >= 5) return 'rainbow';
    if (m.cells.length >= 4) return m.horizontal ? 'row' : 'col';
    return null;
  }

  function emptyMap() {
    return Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(false));
  }

  function cellsFromMap(map) {
    const cells = [];
    for (let r = 0; r < BOARD_SIZE; r++) for (let c = 0; c < BOARD_SIZE; c++) if (map[r][c]) cells.push({ row: r, col: c });
    return cells;
  }

  function addSpecialClear(row, col, sp, map) {
    if (sp === 'row') {
      for (let c = 0; c < BOARD_SIZE; c++) if (cellActive(row, c)) map[row][c] = true;
      fx.beams.push({ type: 'row', row, col, t: 0, dur: 280 });
    }
    if (sp === 'col') {
      for (let r = 0; r < BOARD_SIZE; r++) if (cellActive(r, col)) map[r][col] = true;
      fx.beams.push({ type: 'col', row, col, t: 0, dur: 280 });
    }
    if (sp === 'bomb') {
      for (let r = row - 1; r <= row + 1; r++) {
        for (let c = col - 1; c <= col + 1; c++) {
          if (cellActive(r, c)) map[r][c] = true;
        }
      }
      fx.beams.push({ type: 'bomb', row, col, t: 0, dur: 280 });
    }
  }

  function fillType(type, map) {
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (cellActive(r, c) && state.board[r][c]?.type === type) map[r][c] = true;
      }
    }
    fx.beams.push({ type: 'rainbow', row: 0, col: 0, t: 0, dur: 300 });
  }

  function clearMapApply(map) {
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (!map[r][c]) continue;
        const t = state.board[r][c];
        if (t?.hazard === 'fire') onFireHazardCleared();
        if (t && state.boss.phantomMax > 0) {
          state.boss.phantomHp = Math.max(0, state.boss.phantomHp - 8);
        }
        state.board[r][c] = null;
      }
    }
  }

  function gravityFill() {
    const mask = state.boardMask;
    for (let c = 0; c < BOARD_SIZE; c++) {
      const slots = [];
      for (let r = BOARD_SIZE - 1; r >= 0; r--) {
        if (cellActive(r, c, mask)) slots.push(r);
      }
      const tiles = [];
      for (const r of slots) {
        if (state.board[r][c]) tiles.push(state.board[r][c]);
      }
      let i = 0;
      for (const r of slots) {
        state.board[r][c] = tiles[i++] || createTile(ITEMS[Math.floor(Math.random() * 5)].id);
      }
    }
  }

  function cloneBoard(b) {
    return b.map((row) => row.map((t) => (t ? { ...t } : null)));
  }

  function countMoves(board, mask = state?.boardMask) {
    let n = 0;
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (!cellActive(r, c, mask) || !board[r][c]) continue;
        if (c + 1 < BOARD_SIZE && cellActive(r, c + 1, mask) && board[r][c + 1] && canSwap(board, { row: r, col: c }, { row: r, col: c + 1 })) n++;
        if (r + 1 < BOARD_SIZE && cellActive(r + 1, c, mask) && board[r + 1][c] && canSwap(board, { row: r, col: c }, { row: r + 1, col: c })) n++;
      }
    }
    return n;
  }

  function canSwap(board, a, b) {
    if (!cellActive(a.row, a.col) || !cellActive(b.row, b.col)) return false;
    if (!board[a.row][a.col] || !board[b.row][b.col]) return false;
    if (tileLocked(board[a.row][a.col]) || tileLocked(board[b.row][b.col])) return false;
    swap(board, a, b);
    const ok = isValidSwapAfter(board, a, b).valid;
    swap(board, a, b);
    return ok;
  }

  function swap(board, a, b) {
    const t = board[a.row][a.col];
    board[a.row][a.col] = board[b.row][b.col];
    board[b.row][b.col] = t;
  }

  function adj(a, b) {
    return Math.abs(a.row - b.row) + Math.abs(a.col - b.col) === 1;
  }

  function inBoard(r, c) {
    return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE;
  }

  function pointFromEvent(e) {
    const t = (e.touches && e.touches.length ? e.touches[0] : null)
      || (e.changedTouches && e.changedTouches.length ? e.changedTouches[0] : null)
      || e;
    const rect = canvas.getBoundingClientRect();
    const lw = layout?.w || rect.width;
    const lh = layout?.h || rect.height;
    const sx = lw / Math.max(1, rect.width);
    const sy = lh / Math.max(1, rect.height);
    return {
      x: (t.clientX - rect.left) * sx,
      y: (t.clientY - rect.top) * sy
    };
  }

  function cellAt(x, y) {
    if (!layout) return null;
    const step = layout.cellSize + layout.cellGap;
    const col = Math.floor((x - layout.boardX - layout.cellGap * 0.5) / step);
    const row = Math.floor((y - layout.boardY - layout.cellGap * 0.5) / step);
    if (!inBounds(row, col) || !cellActive(row, col)) return null;
    const cellX = layout.boardX + layout.cellGap + col * step;
    const cellY = layout.boardY + layout.cellGap + row * step;
    const margin = layout.cellGap * 0.55;
    if (x < cellX - margin || x > cellX + layout.cellSize + margin
      || y < cellY - margin || y > cellY + layout.cellSize + margin) return null;
    return { row, col };
  }

  /** 根据松手位置与拖动方向解析交换目标（格缝吸附 + 方向点积，避免 A→B 无反应） */
  function resolveSwapTarget(from, release, start) {
    if (!from || !cellActive(from.row, from.col)) return null;

    const direct = cellAt(release.x, release.y);
    if (direct && adj(from, direct)) return direct;

    const dx = release.x - start.x;
    const dy = release.y - start.y;
    const dragLen = Math.hypot(dx, dy);
    if (dragLen < MIN_DRAG) return null;

    const ux = dx / dragLen;
    const uy = dy / dragLen;
    const fromC = cellCenter(from.row, from.col);
    const neighbors = [
      { row: from.row - 1, col: from.col },
      { row: from.row + 1, col: from.col },
      { row: from.row, col: from.col - 1 },
      { row: from.row, col: from.col + 1 }
    ];

    let best = null;
    let bestDot = 0.25;
    for (const n of neighbors) {
      if (!cellActive(n.row, n.col)) continue;
      const toC = cellCenter(n.row, n.col);
      const nx = toC.x - fromC.x;
      const ny = toC.y - fromC.y;
      const len = Math.hypot(nx, ny) || 1;
      const dot = ux * (nx / len) + uy * (ny / len);
      if (dot > bestDot) {
        bestDot = dot;
        best = n;
      }
    }
    return best;
  }

  /** 选关：导航按钮在按下时响应，关卡格子在抬起时确认 */
  function hitLevelSelectPointerDown(p) {
    const ui = getLevelSelectLayout();
    if (!ui) return true;
    const pad = 10;
    const hit = (r) => p.x >= r.x - pad && p.x <= r.x + r.w + pad && p.y >= r.y - pad && p.y <= r.y + r.h + pad;
    if (hit(ui.back)) {
      levelSelectPress = null;
      closeLevelSelect();
      return true;
    }
    if (ui.page > 0 && hit(ui.pagePrev)) {
      levelSelectPress = null;
      levelSelectPage--;
      return true;
    }
    if (ui.page < ui.pageCount - 1 && hit(ui.pageNext)) {
      levelSelectPress = null;
      levelSelectPage++;
      return true;
    }
    const cell = hitLevelSelectCellAt(p);
    if (cell) {
      levelSelectPress = { level: cell.level, x: p.x, y: p.y, t: Date.now() };
    } else {
      levelSelectPress = null;
    }
    return true;
  }

  function tryConfirmLevelSelect(p) {
    if (!state?.showLevelSelect || !levelSelectPress) return false;
    const press = levelSelectPress;
    levelSelectPress = null;
    const elapsed = Date.now() - press.t;
    const dx = p.x - press.x;
    const dy = p.y - press.y;
    if (elapsed < LEVEL_SELECT_MIN_MS) return false;
    if (dx * dx + dy * dy > LEVEL_SELECT_MOVE_TOL * LEVEL_SELECT_MOVE_TOL) return false;
    const cell = hitLevelSelectCellAt(p);
    if (cell && cell.level !== press.level) return false;
    if (!cell) {
      const ui = getLevelSelectLayout();
      const orig = ui?.cells.find((c) => c.level === press.level);
      if (!orig) return false;
      const pad = LEVEL_SELECT_CELL_PAD;
      if (!(p.x >= orig.x - pad && p.x <= orig.x + orig.w + pad
        && p.y >= orig.y - pad && p.y <= orig.y + orig.h + pad)) return false;
    }
    if (!isLevelUnlocked(press.level)) {
      playSfx('click');
      return true;
    }
    startCampaignAtLevel(press.level);
    return true;

      const row = Math.floor(i / cols);
      const rowCount = Math.min(cols, n - row * cols);
      const rowW = rowCount * cardW + (rowCount - 1) * gap;
      const rowX = (layout.w - rowW) / 2;
      rects.push({
        x: rowX + col * (cardW + gap),
        y: startY + row * (cardH + gap),
        w: cardW,
        h: cardH,
        buff,
        idx: i
      });
    });
    layout._pvpCardGridH = gridH;
    return rects;
  }

  function getPvpBuffConfirmBtn() {
    const baseY = layout.safe.top + 124 + (layout._pvpCardGridH || 200) + 18;
    const cx = layout.w / 2;
    return { x: cx - 84, y: baseY, w: 168, h: 40 };
  }

  function getPvpShapeRects() {
    if (!layout) return [];
    const cols = 5;
    const gap = 6;
    const pad = layout.pad;
    const w = (layout.w - pad - layout.padR - gap * (cols - 1)) / cols;
    const h = 32;
    const startY = layout.safe.top + 112;
    return PVP_SHAPE_IDS.map((id, i) => ({
      id,
      x: pad + (i % cols) * (w + gap),
      y: startY + Math.floor(i / cols) * (h + gap),
      w,
      h
    }));
  }

  function getPvpHpControlLayout() {
    if (!layout) return null;
    const rects = getPvpShapeRects();
    if (!rects.length) return null;
    const last = rects[rects.length - 1];
    const cx = layout.w / 2;
    const y = last.y + last.h + 16;
    const btnW = 44;
    const btnH = 38;
    const valW = 96;
    const gap = 10;
    return {
      y,
      minus: { x: cx - valW / 2 - gap - btnW, y, w: btnW, h: btnH },
      plus: { x: cx + valW / 2 + gap, y, w: btnW, h: btnH },
      value: { x: cx - valW / 2, y, w: valW, h: btnH }
    };
  }

  function getPvpShapeConfirmBtn() {
    const hpUi = getPvpHpControlLayout();
    const rects = getPvpShapeRects();
    if (!rects.length) return null;
    const cx = layout.w / 2;
    const y = hpUi ? hpUi.y + hpUi.minus.h + 20 : rects[rects.length - 1].y + rects[rects.length - 1].h + 22;
    return { x: cx - 84, y, w: 168, h: 40 };
  }

  function drawPvpBuffCards(choices, title, pickedIds) {
    const cx = layout.w / 2;
    ctx.fillStyle = THEME.text;
    ctx.font = withMixedFont(18, 'bold');
    ctx.textAlign = 'center';
    ctx.fillText(title, cx, layout.safe.top + 96);
    ctx.font = withMixedFont(12);
    ctx.fillStyle = THEME.textMuted;
    ctx.fillText(`五选三 · 已选 ${pickedIds.length}/${PVP_BUFF_PICK_COUNT}`, cx, layout.safe.top + 116);
    const cards = getPvpSetupCardRects(choices);
    cards.forEach(({ x, y, w, h, buff }) => {
      const selected = pickedIds.includes(buff.id);
      const g = ctx.createLinearGradient(x, y, x, y + h);
      g.addColorStop(0, selected ? '#7a62b8' : '#5a4a88');
      g.addColorStop(1, '#2a2238');
      roundRect(x, y, w, h, 12, g);
      ctx.strokeStyle = selected ? 'rgba(255,230,120,0.95)' : 'rgba(255,220,120,0.45)';
      ctx.lineWidth = selected ? 2.5 : 1.5;
      ctx.stroke();
      if (selected) {
        ctx.fillStyle = '#ff5544';
        ctx.beginPath();
        ctx.arc(x + w - 8, y + 8, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px sans-serif';
        ctx.fillText('✓', x + w - 8, y + 11);
      }
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = withEmojiFont(22);
      ctx.fillText(buff.emoji, x + w / 2, y + 36);
      ctx.font = withMixedFont(11, 'bold');
      ctx.fillText(buff.name, x + w / 2, y + 58);
      ctx.font = withMixedFont(9);
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      ctx.fillText(buff.tip || '', x + w / 2, y + h - 10);
    });
    const btn = getPvpBuffConfirmBtn();
    const ready = pickedIds.length === PVP_BUFF_PICK_COUNT;
    roundRect(btn.x, btn.y, btn.w, btn.h, 10, ready ? '#e85d4a' : THEME.btnGhost);
    ctx.fillStyle = ready ? '#fff' : THEME.btnGhostText;
    ctx.font = withMixedFont(14, 'bold');
    ctx.fillText(ready ? '确认选择' : `还需 ${PVP_BUFF_PICK_COUNT - pickedIds.length} 个`, btn.x + btn.w / 2, btn.y + btn.h / 2 + 4);
    return btn;
  }

  function drawPvpSetup() {
    const cx = layout.w / 2;
    const setup = state.pvpSetup;
    ctx.fillStyle = THEME.text;
    ctx.font = withMixedFont(22, 'bold');
    ctx.textAlign = 'center';
    ctx.fillText('双人对战设置', cx, layout.safe.top + 52);
    if (setup.phase === 'shape') {
      ctx.font = withMixedFont(14);
      ctx.fillStyle = THEME.textMuted;
      ctx.fillText('选择棋盘阵形', cx, layout.safe.top + 78);
      getPvpShapeRects().forEach((r) => {
        const active = setup.shape === r.id;
        roundRect(r.x, r.y, r.w, r.h, 8, active ? '#6a52c4' : '#3d3558');
        ctx.strokeStyle = active ? '#ffe9a8' : 'rgba(255,255,255,0.25)';
        ctx.lineWidth = active ? 2 : 1;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = withMixedFont(10, 'bold');
        const label = BOARD_SHAPE_LABELS[r.id] || '满盘';
        ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2 + 3);
      });
      const hpUi = getPvpHpControlLayout();
      if (hpUi) {
        setup.hpControl = hpUi;
